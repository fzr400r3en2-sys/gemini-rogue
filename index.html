<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0c1a">
<title>Gemini Rogue</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --bg: #0d0c1a;
  --bg2: #161528;
  --bg3: #1f1d36;
  --fg: #e6e6f0;
  --dim: #8a89a3;
  --accent: #ffce5e;
  --hp-good: #58d77a;
  --hp-mid: #f0c14b;
  --hp-bad: #ef5a5a;
  --red: #ef5a5a;
  --green: #58d77a;
  --blue: #5fa8ff;
  --magenta: #c879ff;
  --cyan: #5fd7e6;
  --border: #3a3760;
}
html, body {
  margin: 0; padding: 0;
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: "Hiragino Sans", "ヒラギノ角ゴシック", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  font-size: 16px;
  line-height: 1.5;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}
button, input {
  -webkit-appearance: none;
  appearance: none;
}
body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
#game {
  display: flex;
  flex-direction: column;
  flex: 1;
  height: 100%;
  min-height: 0;
  max-width: 540px;
  width: 100%;
  margin: 0 auto;
  padding: 8px;
  gap: 8px;
}
.panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}
.panel-title {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

/* === ステータス === */
#status-panel { flex-shrink: 0; }
.status-grid {
  display: grid;
  grid-template-columns: auto 1fr auto 1fr;
  gap: 4px 10px;
  font-size: 13px;
}
.status-grid .lbl { color: var(--dim); }
.status-grid .val { color: var(--fg); font-weight: 500; }
.hp-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
  grid-column: span 4;
}
.hp-bar > div {
  height: 100%;
  transition: width 0.3s, background-color 0.3s;
}
.effects {
  grid-column: span 4;
  font-size: 11px;
  color: var(--magenta);
  margin-top: 2px;
}
.mini-goal {
  grid-column: span 4;
  font-size: 11px;
  color: var(--cyan);
  margin-top: 2px;
  overflow-wrap: anywhere;
}
.floor-tag {
  background: var(--accent);
  color: #2a1a00;
  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 12px;
}

/* === ナラティブ === */
#narrative {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: auto;
}
.story {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
  animation: fadeIn 0.25s ease-out;
}
.story.title { font-size: 12px; color: var(--dim); border-left-color: var(--accent); padding: 6px 12px; }
.story.combat { border-left-color: var(--red); }
.story.victory { border-left-color: var(--green); background: linear-gradient(90deg, rgba(88,215,122,0.15), var(--bg2)); }
.story.danger { border-left-color: var(--red); color: var(--red); }
.story.heal { border-left-color: var(--green); color: var(--green); }
.story.gold { border-left-color: var(--accent); color: var(--accent); }
.story.shop { border-left-color: var(--cyan); color: var(--cyan); }
.story.dim { color: var(--dim); border-left-color: var(--border); }
.story.boss {
  border-left-color: var(--magenta);
  background: linear-gradient(135deg, rgba(200,121,255,0.15), var(--bg2));
  text-align: center;
  font-size: 16px;
}
.story h3 {
  margin: 0 0 4px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}
/* 末尾の余白で「最後のログ」が中途半端に隠れないようにする */
#narrative::after {
  content: "";
  flex: 0 0 1px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* === 戦闘パネル === */
.combat-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 2px 6px;
  background: var(--bg3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
}
.combat-bar .vs { color: var(--dim); margin: 0 4px; }
.mhp { color: var(--red); }

/* === アクション === */
#actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.btn {
  width: 100%;
  min-height: 48px;
  padding: 10px 14px;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  background: var(--bg3);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.05s, background 0.15s;
  text-align: left;
  line-height: 1.35;
  overflow-wrap: anywhere;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}
.btn:active { transform: scale(0.98); background: #2a2745; }
.btn.primary { background: linear-gradient(180deg, #4b3aaf, #38298a); border-color: #5b4ad0; }
.btn.danger  { background: linear-gradient(180deg, #a73a3a, #802a2a); border-color: #d05a5a; }
.btn.small   { min-height: 36px; padding: 6px 10px; font-size: 13px; }
.btn .num { color: var(--accent); margin-right: 8px; font-weight: 700; }
.btn .desc { color: var(--dim); font-size: 11px; margin-top: 2px; display: block; }

input.text-input {
  width: 100%;
  padding: 10px 12px;
  font-size: 16px;
  font-family: inherit;
  background: var(--bg2);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  outline: none;
}
input.text-input:focus { border-color: var(--accent); }

/* === タイトル === */
.title-logo {
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(120deg, var(--accent), var(--magenta));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.title-sub { color: var(--dim); font-size: 13px; }
.version-tag { color: var(--dim); font-size: 11px; margin-top: 4px; opacity: 0.8; }
/* === 開発確認用デバッグバー（?debug=1 のときだけ表示） === */
#debug-bar {
  position: fixed;
  bottom: env(safe-area-inset-bottom, 6px);
  right: 6px;
  z-index: 9999;
  display: none;
  flex-direction: column;
  gap: 3px;
  background: rgba(20, 8, 0, 0.92);
  color: #ffd45e;
  border: 1px solid #ffd45e;
  border-radius: 8px;
  padding: 6px 8px;
  font-size: 11px;
  max-width: 220px;
  max-height: 70vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#debug-bar.visible { display: flex; }
#debug-bar.collapsed > *:not(h4):not(.dbg-toggle) { display: none; }
#debug-bar h4 {
  margin: 0;
  font-size: 11px;
  color: #ffd45e;
  font-weight: 700;
  letter-spacing: 0.05em;
}
#debug-bar .dbg-row { display: flex; flex-wrap: wrap; gap: 3px; }
#debug-bar button {
  font-size: 11px;
  padding: 3px 6px;
  min-height: 26px;
  background: #2a1a05;
  color: #ffd45e;
  border: 1px solid #6a4a10;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
}
#debug-bar button:active { background: #3a2a10; }
#debug-bar button.dbg-warn { color: #ff8a8a; border-color: #884; }

/* === 終了画面・記録カード === */
.endcard {
  text-align: center;
  padding: 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.endcard h1 {
  margin: 0 0 16px;
  font-size: 26px;
  background: linear-gradient(120deg, var(--accent), var(--magenta));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.endcard h1.dead {
  background: linear-gradient(120deg, var(--red), #ff8a8a);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.endcard h2 {
  margin: 0 0 10px;
  font-size: 18px;
  color: var(--accent);
}
.endcard h3 {
  margin: 14px 0 6px;
  font-size: 13px;
  color: var(--cyan);
  text-align: left;
  letter-spacing: 0.05em;
}
.endcard .reason {
  margin: 6px 0 14px;
  padding: 8px 12px;
  background: var(--bg3);
  border-radius: 8px;
  font-size: 13px;
  color: var(--dim);
}
.endcard table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  table-layout: fixed;
}
.endcard td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  overflow-wrap: anywhere;
  word-break: break-word;
}
.endcard td:first-child { color: var(--dim); text-align: left; width: 38%; }
.endcard td:last-child  { text-align: right; font-weight: 500; }
.endcard tr.ach-row td { padding: 4px 10px; font-size: 12px; }
.score { font-size: 22px; font-weight: 700; color: var(--accent); }

/* === 終了カード/記録画面 視覚補強 === */
.endcard h3.depth-h3 { color: var(--magenta); }
.endcard .section-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  margin: 10px 0 6px;
}
.endcard .section-card.depth { border-left: 3px solid var(--magenta); }
.endcard .section-card h3 { margin: 0 0 4px; }
.endcard .section-card table { font-size: 13px; }
.endcard .replay-line {
  margin: 8px 0 4px;
  padding: 8px 12px;
  background: linear-gradient(90deg, rgba(255,206,94,0.10), var(--bg3));
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  font-size: 13px;
  font-style: italic;
  color: var(--fg);
  text-align: left;
  line-height: 1.5;
}
.endcard .hint-line {
  margin: 4px 0 8px;
  padding: 6px 10px;
  background: rgba(95,168,255,0.08);
  border-left: 2px solid var(--blue);
  border-radius: 4px;
  font-size: 12px;
  color: var(--blue);
  text-align: left;
}
.endcard .eval-tag {
  display: inline-block;
  font-size: 12px;
  color: var(--accent);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 10px;
  margin: 4px 0;
}
.badge-list {
  display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 8px;
}
.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg3);
  color: var(--accent);
  border: 1px solid var(--border);
}

/* === 実績トースト === */
#toast-container {
  position: fixed;
  top: env(safe-area-inset-top);
  left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  z-index: 1000;
  padding: 8px;
  gap: 6px;
}
.ach-toast {
  display: flex;
  gap: 10px;
  align-items: center;
  background: linear-gradient(135deg, #ffce5e, #c879ff);
  color: #1a0d2e;
  border-radius: 12px;
  padding: 10px 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.45);
  max-width: 92vw;
  width: 320px;
  opacity: 0;
  transform: translateY(-30px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: auto;
}
.ach-toast.visible { opacity: 1; transform: translateY(0); }
.ach-icon { font-size: 28px; line-height: 1; }
.ach-title { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; opacity: 0.7; }
.ach-name { font-size: 16px; font-weight: 700; line-height: 1.2; }
.ach-desc { font-size: 11px; opacity: 0.85; }

/* iPhone safe-area + scrollbar tidy */
#narrative::-webkit-scrollbar { width: 4px; }
#narrative::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-height: 600px) { .title-logo { font-size: 22px; } }
@media (max-width: 430px) {
  #game { padding: 6px; gap: 6px; }
  .panel { border-radius: 8px; padding: 8px 10px; }
  .story { padding: 9px 10px; font-size: 14px; }
  .status-grid { gap: 3px 8px; font-size: 12px; }
  .combat-bar { font-size: 12px; padding: 7px 9px; }
  .btn { min-height: 48px; padding: 10px 12px; font-size: 15px; border-radius: 8px; }
  .btn.small { min-height: 44px; padding: 8px 10px; }
  .endcard { padding: 12px; border-radius: 8px; }
  .endcard h1 { font-size: 22px; }
  .endcard table { font-size: 13px; }
  .endcard td { padding: 6px 6px; }
  .endcard td:first-child { width: 34%; }
  .score { font-size: 20px; }
}
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="game">
  <div id="status-panel" class="panel" style="display:none;">
    <div class="panel-title"><span class="floor-tag" id="floor-tag">B1F</span> &nbsp; <span id="char-summary"></span></div>
    <div class="status-grid" id="status-grid"></div>
  </div>
  <div id="narrative"></div>
  <div id="actions"></div>
</div>

<script>
"use strict";

// ====================================================================
// データ
// ====================================================================
const FINAL_FLOOR = 20;
const BOSS_FLOORS = new Set([5, 10, 15, 20]);
const APP_VERSION = "v20260510-rogue-plus8";
// 開発確認用：URLに ?debug=1 が付いているときだけ有効化する。
// 通常プレイでは false 固定で、UIも出ない。
const DEBUG_MODE = (() => {
  try { return new URLSearchParams(location.search).get("debug") === "1"; }
  catch { return false; }
})();

const FORGE_COSTS = [0, 60, 100, 160, 240, 340];
const STORY_FORGE_LIMIT = 3;
const ENDLESS_FORGE_LIMIT = 5;

const ITEMS = {
  "ポーション":     { category: "consumable", effect: "heal",      power: 25, price:  30, desc: "HPを25回復" },
  "ハイポーション": { category: "consumable", effect: "heal",      power: 60, price:  80, desc: "HPを60回復" },
  "エリクサー":     { category: "consumable", effect: "full_heal", power:  0, price: 200, desc: "HPを全回復" },

  "煙玉":           { category: "consumable", effect: "escape",    power:  0, price:  40, desc: "戦闘から確実に逃走" },
  "魔法の巻物":     { category: "consumable", effect: "magic",     power: 30, price:  70, desc: "敵に30の固定ダメージ" },
  "賢者の石":       { category: "consumable", effect: "level_up",  power:  0, price: 500, desc: "即座にレベルアップ" },
  "木の棒":         { category: "weapon", atk:  2, price:   20, desc: "攻撃力+2" },
  "鉄の剣":         { category: "weapon", atk:  6, price:  120, desc: "攻撃力+6" },
  "鋼の剣":         { category: "weapon", atk: 12, price:  300, desc: "攻撃力+12" },
  "炎の剣":         { category: "weapon", atk: 18, price:  600, desc: "攻撃力+18・たまに炎ダメージ" },

  "鎖帷子":         { category: "armor", defense:  7, price:  220, desc: "防御力+7" },

  "聖なる鎧":       { category: "armor", defense: 18, price: 1000, desc: "防御力+18・毒無効" },
};

const MONSTERS = {
  "スライム":     { name: "スライム",     hp: 12, atk:  4, defense: 1, exp:  6, gold:  5, drops: [["ポーション", 0.15]],                                flavor: "ぷるぷる震える青い塊。", tags: [] },
  "コウモリ":     { name: "コウモリ",     hp:  8, atk:  5, defense: 0, exp:  5, gold:  4, drops: [["毒消し草", 0.10]],                                  flavor: "鋭い爪で襲いかかってくる。", tags: [] },
  "ゴブリン":     { name: "ゴブリン",     hp: 18, atk:  7, defense: 2, exp: 10, gold: 12, drops: [["木の棒", 0.08], ["ポーション", 0.10]],              flavor: "緑色の小鬼。下卑た笑みを浮かべる。", tags: [] },
  "オーク":       { name: "オーク",       hp: 30, atk: 10, defense: 4, exp: 18, gold: 22, drops: [["鉄の剣", 0.05], ["ポーション", 0.20]],              flavor: "筋骨隆々の獣人戦士。", tags: [] },
  "スケルトン":   { name: "スケルトン",   hp: 24, atk: 11, defense: 3, exp: 16, gold: 18, drops: [["革の鎧", 0.07]],                                    flavor: "カタカタと骨を鳴らす死霊。", tags: ["undead"] },
  "ダイアウルフ": { name: "ダイアウルフ", hp: 28, atk: 13, defense: 2, exp: 20, gold: 20, drops: [["毒消し草", 0.15]],                                  flavor: "赤い目を輝かせた巨狼。", tags: [] },
  "トロル":       { name: "トロル",       hp: 55, atk: 16, defense: 6, exp: 35, gold: 45, drops: [["ハイポーション", 0.20], ["鎖帷子", 0.05]],          flavor: "再生する皮膚を持つ巨人。", tags: [] },
  "ゾンビ":       { name: "ゾンビ",       hp: 40, atk: 14, defense: 4, exp: 30, gold: 30, drops: [["毒消し草", 0.30]],                                  flavor: "腐臭を放つ死者。毒を持つ。", tags: ["undead", "poison"] },
  "ダークエルフ": { name: "ダークエルフ", hp: 45, atk: 20, defense: 5, exp: 38, gold: 55, drops: [["魔法の巻物", 0.15], ["鋼の剣", 0.04]],              flavor: "影に紛れる弓使い。", tags: [] },
  "ミノタウロス": { name: "ミノタウロス", hp: 80, atk: 24, defense: 8, exp: 55, gold: 80, drops: [["鋼の剣", 0.10], ["鋼の鎧", 0.06]],                  flavor: "迷宮の主の眷属。", tags: [] },
  "リッチ":       { name: "リッチ",       hp: 70, atk: 28, defense: 7, exp: 60, gold: 100, drops: [["魔法の巻物", 0.30], ["エリクサー", 0.05]],         flavor: "不死の魔術師。", tags: ["undead"] },
  "ワイバーン":   { name: "ワイバーン",   hp: 90, atk: 26, defense: 10, exp: 65, gold: 110, drops: [["竜殺しの槍", 0.03], ["ハイポーション", 0.20]],    flavor: "鋭い爪と尾を持つ亜竜。", tags: ["dragon"] },
  "スライム王":   { name: "スライム王",   hp: 80, atk: 12, defense: 5, exp: 60, gold: 120, drops: [["ハイポーション", 1.0]],                            flavor: "巨大な王冠を被った金色のスライム。", tags: [] },
  "ゴブリン将軍": { name: "ゴブリン将軍", hp: 160, atk: 22, defense: 10, exp: 140, gold: 300, drops: [["鋼の剣", 1.0], ["力の薬", 1.0]],                flavor: "赤い甲冑の歴戦の戦士。", tags: [] },
  "古龍":         { name: "古龍",         hp: 300, atk: 34, defense: 14, exp: 280, gold: 600, drops: [["聖なる鎧", 1.0], ["エリクサー", 1.0]],           flavor: "千年を生きた翠の竜。", tags: ["dragon"] },

const SAVE_VERSION = 1;
const SAVE_KEY    = `gemini-rogue:save:v${SAVE_VERSION}`;
const RECORDS_KEY = `gemini-rogue:records:v${SAVE_VERSION}`;
const ACH_KEY     = `gemini-rogue:achievements:v${SAVE_VERSION}`;
const META_KEY    = `gemini-rogue:meta:v${SAVE_VERSION}`;

function lsAvailable() {
  try {
    const k = "__gr_test__";
    localStorage.setItem(k, "1");
    localStorage.removeItem(k);
    return true;
  } catch { return false; }
}
const LS_OK = lsAvailable();

function loadJSON(key, fallback) {
  if (!LS_OK) return fallback;
  try {
    const raw = localStorage.getItem(key);
    if (raw == null) return fallback;
    const v = JSON.parse(raw);
    if (v == null) return fallback;
    return v;
  } catch (e) {
    console.warn("[storage] load failed:", key, e);
    try { localStorage.removeItem(key); } catch {}
    return fallback;
  }
}
function saveJSON(key, value) {
  if (!LS_OK) return;
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.warn("[storage] save failed:", key, e); }
}
function removeKey(key) {
  if (!LS_OK) return;
  try { localStorage.removeItem(key); } catch {}
}

// ---- セーブデータ ----
function saveGame() {
  if (!player || player.hp <= 0) return;
  if (runStats) runStats.mode = player.mode || "story";
  saveJSON(SAVE_KEY, {
    version: SAVE_VERSION,
    player: player,
    runStats: runStats,
    savedAt: Date.now(),
  });
}
function loadSave() {
  const data = loadJSON(SAVE_KEY, null);
  if (!data || data.version !== SAVE_VERSION || !data.player || typeof data.player.hp !== "number") {
    if (data) removeKey(SAVE_KEY);
    return null;
  }
  return data;
}
function hasSave()   { return !!loadSave(); }
function clearSave() { removeKey(SAVE_KEY); }

  highestScore: 0,
  clears: 0,

  classBest:   { "戦士": 0, "盗賊": 0, "魔導士": 0 },
  classClears: { "戦士": 0, "盗賊": 0, "魔導士": 0 },
  byDiff: {

  },

  endlessBestFloor:     0,

  endlessBestBossKills: 0,

  },
  endlessRuns:          0,
  endlessDeaths:        0,
  endlessLastResult:    null,
  lastResult: null,
};
function loadRecords() {
  const r = loadJSON(RECORDS_KEY, null);
  const def = JSON.parse(JSON.stringify(DEFAULT_RECORDS));
  if (!r || typeof r !== "object") return def;
  const merged = {
    ...def,
    ...r,
    classBest:   { ...def.classBest,   ...(r.classBest   || {}) },
    classClears: { ...def.classClears, ...(r.classClears || {}) },
    byDiff: {
      story:     { ...def.byDiff.story,     ...((r.byDiff && r.byDiff.story)     || {}) },
      normal:    { ...def.byDiff.normal,    ...((r.byDiff && r.byDiff.normal)    || {}) },
      challenge: { ...def.byDiff.challenge, ...((r.byDiff && r.byDiff.challenge) || {}) },
    },
    endlessBestByClass: { ...def.endlessBestByClass, ...(r.endlessBestByClass || {}) },
    endlessBestByDifficulty: {
      story:     { ...def.endlessBestByDifficulty.story,     ...((r.endlessBestByDifficulty && r.endlessBestByDifficulty.story)     || {}) },
      normal:    { ...def.endlessBestByDifficulty.normal,    ...((r.endlessBestByDifficulty && r.endlessBestByDifficulty.normal)    || {}) },
      challenge: { ...def.endlessBestByDifficulty.challenge, ...((r.endlessBestByDifficulty && r.endlessBestByDifficulty.challenge) || {}) },
    },
  };
  return merged;
}
function saveRecords(r) { saveJSON(RECORDS_KEY, r); }
function hasClearedStory() {
  const r = loadRecords();
  const a = loadAchievements();
  return (r.clears || 0) > 0 || !!a.savior;
}

function recordRunResult(kind, score, reason) {
  const r = loadRecords();
  const fl  = (player && player.floor) || 1;
  const cls = (player && player.cls)   || "戦士";
  const diff = (player && player.difficulty && DIFFICULTIES[player.difficulty]) ? player.difficulty : DEFAULT_DIFFICULTY;
  const isEndless = (player && player.mode === "endless");

  // 強化フラグ
  const meta = loadMeta();
  const hasUpgrades = Object.values(meta.upgrades).some(v => v > 0);
  const mmSpent = runStats ? (runStats.memoryMerchantPurchases || []).reduce((s, p) => s + (p.cost || 0), 0) : 0;

  // 共通の lastResult ペイロード
  const payload = {
    kind, reason: reason || "",
    name: player.name, cls, difficulty: diff, mode: player.mode || "story",
    floor: fl, level: player.level, score,
    kills:     runStats ? runStats.kills           : 0,
    maxDamage: runStats ? runStats.maxDamage       : 0,
    gold:      runStats ? runStats.totalGoldGained : 0,
    earnedShards: runStats ? (runStats.earnedShards || 0) : 0,
    title:     runStats ? (runStats.title || "")   : "",
    depthBossKills: runStats ? (runStats.depthBossKills || 0) : 0,
    classEventSuccess: runStats ? (runStats.classEventSuccess || {warrior:0,rogue:0,mage:0}) : {warrior:0,rogue:0,mage:0},
    classActivity: classActivityRows(),
    classFeatureTriggers: runStats ? (runStats.classFeatureTriggers || 0) : 0,
    growthSummary: (player.classUpgrades && Object.keys(player.classUpgrades).length > 0)
      ? Object.entries(player.classUpgrades).map(([k,v]) => `${k} Lv${v}`).join(" / ") : "",
    memoryMerchantPurchases: runStats ? (runStats.memoryMerchantPurchases || []) : [],
    // plus6
    memoryEffectsOwned: (player && Array.isArray(player.memoryEffects)) ? player.memoryEffects.slice() : [],
    eliteEncounters: runStats ? (runStats.eliteEncounters || 0) : 0,
    eliteKills:      runStats ? (runStats.eliteKills || 0) : 0,
    eliteLootCount:  runStats ? (runStats.eliteLootCount || 0) : 0,
    memoryMerchantSpent: mmSpent,
    blessingChoices: runStats ? (runStats.blessingChoices || []) : [],
    blessingCount: runStats ? (runStats.blessingCount || 0) : 0,
    forgeWeaponCount: runStats ? (runStats.forgeWeaponCount || 0) : 0,
    forgeArmorCount: runStats ? (runStats.forgeArmorCount || 0) : 0,
    forgeGoldSpent: runStats ? (runStats.forgeGoldSpent || 0) : 0,
    maxWeaponEnhance: runStats ? (runStats.maxWeaponEnhance || 0) : 0,
    maxArmorEnhance: runStats ? (runStats.maxArmorEnhance || 0) : 0,
    weaponEnhance: player.weaponEnhance || 0,
    armorEnhance: player.armorEnhance || 0,
    miniGoal: snapshotMiniGoal(),
    evaluation: determineRunEvaluation(kind),
    replay: buildReplayLine(),
    deathHint: buildDeathHint(kind),
    hasUpgrades,
    weapon: player.weapon, armor: player.armor,
    date: Date.now(),
  };

  if (isEndless) {
    // 深層探索専用集計（本編記録は触らない）
    if (fl > (r.endlessBestFloor || 0)) r.endlessBestFloor = fl;
    if (score > (r.endlessBestScore || 0)) r.endlessBestScore = score;
    const k = runStats ? runStats.kills : 0;
    if (k > (r.endlessBestKills || 0)) r.endlessBestKills = k;
    const bk = runStats ? (runStats.depthBossKills || 0) : 0;
    if (bk > (r.endlessBestBossKills || 0)) r.endlessBestBossKills = bk;
    if (fl > (r.endlessBestByClass[cls] || 0)) r.endlessBestByClass[cls] = fl;
    const ebd = r.endlessBestByDifficulty[diff];
    if (ebd) {
      if (fl > ebd.highestFloor) ebd.highestFloor = fl;
      if (score > ebd.highestScore) ebd.highestScore = score;
      ebd.runs = (ebd.runs || 0) + 1;
      if (kind === "loss") ebd.deaths = (ebd.deaths || 0) + 1;
    }
    r.endlessRuns = (r.endlessRuns || 0) + 1;
    if (kind === "loss") r.endlessDeaths = (r.endlessDeaths || 0) + 1;
    r.endlessLastResult = payload;
  } else {
    // 本編記録
    if (fl > r.highestFloor) r.highestFloor = fl;
    if (score > r.highestScore) r.highestScore = score;
    if (fl > (r.classBest[cls] || 0)) r.classBest[cls] = fl;
    if (kind === "win") {
      r.clears += 1;
      r.classClears[cls] = (r.classClears[cls] || 0) + 1;
    } else {
      r.deaths += 1;
    }
    const bd = r.byDiff[diff];
    if (bd) {
      if (fl > bd.highestFloor) bd.highestFloor = fl;
      if (score > bd.highestScore) bd.highestScore = score;
      if (kind === "win") bd.clears += 1; else bd.deaths += 1;
    }
    r.lastResult = payload;
  }

  saveRecords(r);
  return r;
}

  if (typeof out.fleeSuccessCount!== "number") out.fleeSuccessCount = 0;
  if (typeof out.scrollUseCount  !== "number") out.scrollUseCount  = 0;

  if (typeof out.eliteKills !== "number") out.eliteKills = 0;

  [
    "classFeatureTriggers",

    "rogueTrapAvoids", "rogueEscapes", "rogueGoodLoots", "rogueDiscounts",
    "mageScrollBoosts", "mageScrollSaves", "mageEventInsights",
    "blessingCount", "forgeWeaponCount", "forgeArmorCount", "forgeGoldSpent",

  if (player && player.cls === "魔導士" && rs.mageScrollBoosts === undefined) out.mageScrollBoosts = out.scrollUseCount || 0;
  if (rs.classFeatureTriggers === undefined) {

const rand    = (n) => Math.floor(Math.random() * n);
const randInt = (a, b) => a + rand(b - a + 1);
const choice  = (arr) => arr[rand(arr.length)];
function weightedChoice(pairs) {
  const total = pairs.reduce((s, p) => s + p[1], 0);
  let r = Math.random() * total;
  for (const [v, w] of pairs) { r -= w; if (r <= 0) return v; }
  return pairs[pairs.length - 1][0];
}
function floorTier(f) {
  if (f <= 3)  return 1;

}

// === 深層探索モード ===
function isEndlessMode() { return player && player.mode === "endless"; }
function isEndlessBossFloor(f) { return f > 20 && (f % 5) === 0; }
function isBossBattleFloor(f) {
  return isEndlessMode() ? isEndlessBossFloor(f) : BOSS_FLOORS.has(f);
}
// 深層ボスは既存4ボスをローテーション。階に応じて表示名を変える。
const DEPTH_BOSS_ROTATION = ["スライム王", "ゴブリン将軍", "古龍", "魔王ザロス"];
const DEPTH_BOSS_NAMES = {
  "スライム王":   "深淵のスライム王",
  "ゴブリン将軍": "亡霊ゴブリン将軍",
  "古龍":         "腐敗した古龍",
  "魔王ザロス":   "魔王の残響",
};
function depthBossKeyFor(floor) {
  // 25→0, 30→1, 35→2, 40→3, 45→0,...
  const i = Math.floor((floor - 25) / 5) % DEPTH_BOSS_ROTATION.length;
  return DEPTH_BOSS_ROTATION[(i + DEPTH_BOSS_ROTATION.length) % DEPTH_BOSS_ROTATION.length];
}
// plus8: 深層スケーリングを3段階に分割
// 21〜30F: 入門区間（緩い）  31〜40F: ビルド完成区間（中） 41F以降: 本格深層
// 連続性を保ちつつ40Fを「壁だが越えられる節目」にする。
// 累積HP倍率: f30=1.45 / f40=2.00 / f50=2.60（旧: f30=1.60 / f40=2.20 / f50=2.80）
// 累積ATK倍率: f30=1.32 / f40=1.70 / f50=2.15（旧: f30=1.40 / f40=1.80 / f50=2.20）
function depthScaleMultipliers(floor) {
  if (floor <= 20) return { hp: 1, atk: 1 };
  if (floor <= 30) {
    return {
      hp:  1.00 + (floor - 20) * 0.045,
      atk: 1.00 + (floor - 20) * 0.032,
    };
  }
  if (floor <= 40) {
    return {
      hp:  1.45 + (floor - 30) * 0.055,
      atk: 1.32 + (floor - 30) * 0.038,
    };
  }
  return {
    hp:  2.00 + (floor - 40) * 0.060,
    atk: 1.70 + (floor - 40) * 0.045,
  };
}
function scaleMonsterForDepth(m, floor, mode) {
  if (mode !== "endless" || floor <= 20) return m;
  const mul = depthScaleMultipliers(floor);
  const depth = floor - 20;
  m.hp  = Math.max(1, Math.floor(m.hp  * mul.hp));
  m.atk = Math.max(1, Math.floor(m.atk * mul.atk));
  m.defense += Math.floor(floor / 10);
  // 報酬は据え置き（線形）：プレイヤー側の成長余地を確保
  m.exp  = Math.max(1, Math.floor(m.exp  * (1 + depth * 0.05)));
  m.gold = Math.max(1, Math.floor(m.gold * (1 + depth * 0.05)));
  return m;
}
function makeEndlessBoss(floor) {
  const bossKey = depthBossKeyFor(floor);
  const m = makeMonster(bossKey);
  if (DEPTH_BOSS_NAMES[bossKey]) m.name = DEPTH_BOSS_NAMES[bossKey];
  return m;
}

function makeMonster(name) {
  const m = JSON.parse(JSON.stringify(MONSTERS[name]));
  const d = diffCfg();
  m.hp  = Math.max(1, Math.floor(m.hp  * d.enemyHP));
  m.atk = Math.max(1, Math.floor(m.atk * d.enemyAtk));
  // 深層モード時は階層に応じた追加スケール
  if (player && player.mode === "endless") {
    scaleMonsterForDepth(m, player.floor, "endless");
  }
  return m;
}

    level: 1, exp: 0, floor: 1,
    hp: c.hp, max_hp: c.hp,
    base_atk: c.atk, base_def: c.defense,
    gold: c.gold,
    inventory: [...c.start],
    weapon: null, armor: null,
    weaponEnhance: 0, armorEnhance: 0,
    effects: [],
    classUpgrades: {},      // {鉄壁:N, 反撃術:N, ...} 取得済みLv
    memoryEffects: [],      // この冒険中に取得した記憶効果のIDリスト
  };
  for (const it of [...p.inventory]) {
    const info = ITEMS[it];
    if (info.category === "weapon" && !p.weapon) {
      p.weapon = it; p.inventory.splice(p.inventory.indexOf(it), 1);
    } else if (info.category === "armor" && !p.armor) {
      p.armor = it;  p.inventory.splice(p.inventory.indexOf(it), 1);
    }
  }
  return p;
}
function pAtk(p) {
  let a = p.base_atk + (p.weapon && ITEMS[p.weapon] ? ITEMS[p.weapon].atk : 0) + (p.weaponEnhance || 0);
  for (const e of p.effects) if (e.name === "buff_atk") a += e.power;
  return a;
}
function pDef(p) {
  let d = p.base_def + (p.armor && ITEMS[p.armor] ? ITEMS[p.armor].defense : 0) + (p.armorEnhance || 0);
  for (const e of p.effects) if (e.name === "buff_def") d += e.power;
  return d;
}
function hasEffect(p, name) { return p.effects.some(e => e.name === name); }
function addEffect(p, name, turns, power = 0) {
  const ex = p.effects.find(e => e.name === name);
  if (ex) { ex.turns = Math.max(ex.turns, turns); ex.power = Math.max(ex.power, power); return; }
  p.effects.push({ name, turns, power });
}
function tickEffects(p) {
  const msgs = [];
  const surv = [];
  for (const e of p.effects) {
    if (e.name === "poison") {
      if (p.armor === "聖なる鎧") { msgs.push("聖なる鎧が毒を浄化した。"); continue; }
      applyDamage(p, 2, "毒");
      msgs.push("毒で2のダメージ。");
    }
    e.turns -= 1;
    if (e.turns > 0) surv.push(e);
    else msgs.push(`[${effLabel(e.name)}]の効果が切れた。`);
  }
  p.effects = surv;
  if (p.hp < 0) p.hp = 0;
  return msgs;
}
function effLabel(n) { return ({ poison: "毒", buff_atk: "攻↑", buff_def: "防↑" })[n] || n; }
function needExp(p) { return p.level * 20 + (p.level - 1) * 5; }
function gainExp(p, exp) {
  const msgs = [];
  p.exp += exp;
  while (p.exp >= needExp(p)) {
    p.exp -= needExp(p);
    p.level += 1;
    p.max_hp += 8;
    p.hp = p.max_hp;
    p.base_atk += 2;
    p.base_def += 1;
    msgs.push(`★ レベルアップ！ Lv${p.level} (HP+8 / 攻+2 / 防+1)`);
    if (p.level >= 10) unlockAch("level_master");
    // クラス成長選択をキューに積む（メインループでawait消化）
    if (GROWTH_TRIGGER_LEVELS.indexOf(p.level) >= 0 && runStats) {
      runStats.pendingGrowth = runStats.pendingGrowth || [];
      runStats.pendingGrowth.push(p.level);
    }
  }
  return msgs;
}
function heal(p, amt) {
  const before = p.hp;
  p.hp = Math.min(p.max_hp, p.hp + amt);
  return p.hp - before;
}
function addGold(p, g) {
  if (g <= 0) return;
  p.gold += g;
  trackGoldGain(g);
}

// ---- ダメージ適用（旅の護符チェックを集約） ----
// すべての player 側ダメージを必ずこの関数経由にすることで、
// 1冒険1回の致命傷耐えロジックを副作用なく差し込める。
function applyDamage(p, amount, source) {
  if (amount <= 0) return 0;
  if (source) setLastDamage(source);
  // 旅の護符：致命傷を1回だけHP1で耐える
  if (p === player && runStats && runStats.amuletAvailable && (p.hp - amount) <= 0) {
    p.hp = 1;
    runStats.amuletAvailable = false;
    tell("✦ 旅の護符が砕け散った！ HP1で踏みとどまった。", "heal");
    return amount;
  }
  p.hp = Math.max(0, p.hp - amount);
  return amount;
}

// ---- 記憶効果ヘルパ (plus6) ----
function memoryLimit() {
  const mode = (player && player.mode === "endless") ? "endless" : "story";
  return MEMORY_LIMIT[mode];
}
function hasMemory(id) {
  if (!player || !Array.isArray(player.memoryEffects)) return false;
  return player.memoryEffects.indexOf(id) >= 0;
}
function canAddMemory() {
  if (!player) return false;
  const arr = player.memoryEffects || [];
  return arr.length < memoryLimit();
}
function memoryDef(id) {
  return MEMORY_EFFECTS.find(e => e.id === id) || null;
}
function addMemoryEffect(id, source = "祝福") {
  const def = memoryDef(id);
  if (!def || !canAddMemory() || hasMemory(id)) return false;
  player.memoryEffects = player.memoryEffects || [];
  player.memoryEffects.push(id);
  if (runStats) {
    runStats.memoryEffects = runStats.memoryEffects || [];
    runStats.memoryEffects.push({ id: def.id, name: def.name, floor: player.floor, source });
  }
  tell(`✦ 迷宮の記憶があなたに宿った。${def.name}！`, "gold");
  return true;
}
// 知識/魔法系イベントの良結果で「洞察の記憶」を試みる
function triggerInsightMemory() {
  if (!hasMemory("insight")) return;
  if (Math.random() < 0.5) {
    const g = heal(player, 2);
    if (g > 0) tell("洞察の記憶が小さな恵みを見つけた！ (HP+2)", "shop");
  } else {
    addGold(player, 10);
    tell("洞察の記憶が小さな恵みを見つけた！ (+10G)", "shop");
  }
}

// ---- エリート敵ヘルパ (plus6) ----
function rollEliteAffix() {
  if (!player || isBossBattleFloor(player.floor)) return null;
  // 1F〜2Fでは出さない（理不尽防止）
  if (player.floor <= 2) return null;
  const isEndless = isEndlessMode();
  let rate = isEndless ? 0.09 : 0.05;
  const diff = currentDifficulty();
  if (diff === "challenge") rate += 0.02;
  else if (diff === "story") rate = Math.max(0.02, rate - 0.02);
  if (Math.random() >= rate) return null;
  const pool = ELITE_AFFIXES.filter(a => !a.depthOnly || isEndless);
  return pool.length ? choice(pool) : null;
}
function maybeApplyElite(m) {
  if (!m) return m;
  if (window.__debugForceElite) {
    window.__debugForceElite = false;
    const isEndless = isEndlessMode();
    const pool = ELITE_AFFIXES.filter(a => !a.depthOnly || isEndless);
    const affix = pool.length ? choice(pool) : null;
    if (affix) applyEliteAffix(m, affix);
    return m;
  }
  const affix = rollEliteAffix();
  if (affix) applyEliteAffix(m, affix);
  return m;
}
function applyEliteAffix(m, affix) {
  if (!m || !affix) return;
  m.elite = affix.id;
  m.eliteAffix = affix;
  m.name = affix.name + m.name;
  m.hp  = Math.max(1, Math.floor(m.hp  * (affix.hpMul  || 1)));
  m.atk = Math.max(1, Math.floor(m.atk * (affix.atkMul || 1)));
  m.defense = (m.defense || 0) + (affix.defAdd || 0);
  m.exp  = Math.max(1, Math.floor(m.exp  * (affix.expMul  || 1)));
  m.gold = Math.max(1, Math.floor(m.gold * (affix.goldMul || 1)));
  if (affix.addTags && Array.isArray(affix.addTags)) {
    m.tags = (m.tags || []).slice();
    for (const t of affix.addTags) if (m.tags.indexOf(t) < 0) m.tags.push(t);
  }
  if (affix.extraDrops && Array.isArray(affix.extraDrops)) {
    m.drops = (m.drops || []).concat(affix.extraDrops);
  }
  if (runStats) runStats.eliteEncounters = (runStats.eliteEncounters || 0) + 1;
}

// ---- 強化適用（新規開始時に1度だけ呼ぶ） ----
function applyUpgrades(p) {
  const meta = loadMeta();
  const u = meta.upgrades;
  // 旅支度
  for (let i = 0; i < (u.potion || 0); i++) p.inventory.push("ポーション");
  // 体力修練
  const hpb = (u.vitality || 0) * 5;
  if (hpb > 0) { p.max_hp += hpb; p.hp += hpb; }
  // 小銭袋
  if ((u.purse || 0) > 0) p.gold += (u.purse || 0) * 20;
  // 旅の護符はrunStatsで管理
  if (runStats) runStats.amuletAvailable = (u.amulet || 0) > 0;
}

// ---- クラス補正ヘルパ ----
const ROGUE_BUY_RATE  = 0.9;   // 仕入れ -10%
const ROGUE_SELL_RATE = 1.1;   // 売値 +10%
function buyPrice(item) {
  const base = ITEMS[item].price;
  let mult = 1.0;
  if (player && player.cls === "盗賊") mult *= ROGUE_BUY_RATE;
  // 商人の紹介状：通常商人で初購入だけ10%引き
  if (runStats && runStats.merchantIntroAvailable) mult *= 0.9;
  // 紹介状＋盗賊で重なっても最低70%まで
  if (mult < 0.70) mult = 0.70;
  return Math.max(1, Math.floor(base * mult));
}
function sellPrice(item) {
  const base = Math.floor(ITEMS[item].price / 2);
  if (player && player.cls === "盗賊") return Math.floor(base * ROGUE_SELL_RATE);
  return base;
}
function equipLabel(slot) {
  if (!player) return "なし";
  const name = slot === "weapon" ? player.weapon : player.armor;
  if (!name) return "なし";
  const plus = slot === "weapon" ? (player.weaponEnhance || 0) : (player.armorEnhance || 0);
  return `${name}${plus > 0 ? ` +${plus}` : ""}`;
}
function itemPlusLabel(name, plus = 0) {
  return name ? `${name}${plus > 0 ? ` +${plus}` : ""}` : "—";
}
function runStatValue(stat) {
  if (!runStats || typeof runStats[stat] !== "number") return 0;
  return runStats[stat];
}
function addRunStat(stat, amount = 1, check = true) {
  if (!runStats || !stat || amount === 0) return;
  if (typeof runStats[stat] !== "number") runStats[stat] = 0;
  runStats[stat] += amount;
  if (check) checkMiniGoalProgress();
}
function addClassFeatureStat(stat, amount = 1) {
  if (!runStats) return;
  addRunStat(stat, amount, false);
  addRunStat("classFeatureTriggers", amount, false);
  checkMiniGoalProgress();
}
function assignMiniGoal() {
  if (!player || !runStats) return;
  const goals = MINI_GOALS[player.cls] || [];
  if (!goals.length) return;
  const base = choice(goals);
  const reward = choice(MINI_GOAL_REWARDS)();
  runStats.miniGoal = { ...base, reward, completed: false, rewarded: false };
  runStats.miniGoalCompleted = false;
  runStats.miniGoalRewarded = false;
}
function miniGoalProgress(goal = runStats && runStats.miniGoal) {
  if (!goal) return 0;
  return Math.min(goal.target || 0, runStatValue(goal.stat));
}
function miniGoalText() {
  const goal = runStats && runStats.miniGoal;
  if (!goal) return "";
  const done = runStats.miniGoalCompleted || goal.completed;
  return done
    ? `ミニ目標: ${goal.text} 達成済み`
    : `ミニ目標: ${goal.text} ${miniGoalProgress(goal)}/${goal.target}`;
}
function miniGoalRewardText(goal) {
  const r = goal && goal.reward;
  if (!r) return "";
  if (r.type === "gold") return `${r.amount}G`;
  if (r.type === "item") return r.item;
  return r.label || "";
}
function grantMiniGoalReward(goal) {
  if (!goal || !goal.reward || !player) return;
  const r = goal.reward;
  if (r.type === "gold") addGold(player, r.amount || 0);
  else if (r.type === "item" && ITEMS[r.item]) player.inventory.push(r.item);
}
function checkMiniGoalProgress() {
  if (!runStats || !runStats.miniGoal || runStats.miniGoalRewarded) return;
  const goal = runStats.miniGoal;
  if (miniGoalProgress(goal) < goal.target) return;
  goal.completed = true;
  goal.rewarded = true;
  runStats.miniGoalCompleted = true;
  runStats.miniGoalRewarded = true;
  grantMiniGoalReward(goal);
  tell(`ミニ目標達成！ ${miniGoalRewardText(goal)} を得た。`, "gold");
}
function forgeLimit() {
  return isEndlessMode() ? ENDLESS_FORGE_LIMIT : STORY_FORGE_LIMIT;
}
function getEnhance(slot) {
  return slot === "weapon" ? (player.weaponEnhance || 0) : (player.armorEnhance || 0);
}
function setEnhance(slot, value) {
  if (slot === "weapon") player.weaponEnhance = value;
  else player.armorEnhance = value;
}
function hasForgeTarget(slot) {
  const name = slot === "weapon" ? player.weapon : player.armor;
  const info = name ? ITEMS[name] : null;
  return !!(info && info.category === slot);
}
function forgeCost(slot, discount = 1) {
  const next = getEnhance(slot) + 1;
  const base = FORGE_COSTS[next] || 9999;
  let mult = discount;
  // 盗賊：鍛冶屋費用 -10%（既存のイベント側 discount と乗算で適用）
  if (player && player.cls === "盗賊") mult *= 0.9;
  return Math.max(1, Math.floor(base * mult));
}
function canEnhance(slot, discount = 1, free = false) {
  if (!player || !hasForgeTarget(slot)) return false;
  if (getEnhance(slot) >= forgeLimit()) return false;
  return free || player.gold >= forgeCost(slot, discount);
}
function enhanceEquipment(slot, opts = {}) {
  const free = !!opts.free;
  const discount = typeof opts.discount === "number" ? opts.discount : 1;
  const source = opts.source || "forge";
  if (!canEnhance(slot, discount, free)) return false;
  const cost = free ? 0 : forgeCost(slot, discount);
  if (!free) player.gold -= cost;
  const next = getEnhance(slot) + 1;
  setEnhance(slot, next);
  if (runStats) {
    if (slot === "weapon") runStats.maxWeaponEnhance = Math.max(runStats.maxWeaponEnhance || 0, next);
    else runStats.maxArmorEnhance = Math.max(runStats.maxArmorEnhance || 0, next);
    if (source !== "blessing") {
      if (slot === "weapon") addRunStat("forgeWeaponCount", 1, false);
      else addRunStat("forgeArmorCount", 1, false);
      addRunStat("forgeGoldSpent", cost, false);
    }
  }
  renderStatus();
  return true;
}

const $status      = document.getElementById("status-panel");
const $statusGrid  = document.getElementById("status-grid");
const $charSummary = document.getElementById("char-summary");
const $floorTag    = document.getElementById("floor-tag");
const $narrative   = document.getElementById("narrative");
const $actions     = document.getElementById("actions");
const $toastWrap   = document.getElementById("toast-container");

let player = null;

function renderStatus() {
  if (!player) { $status.style.display = "none"; return; }
  $status.style.display = "";
  $floorTag.textContent = `B${player.floor}F`;
  $charSummary.textContent = `${player.name} (${player.cls}) Lv${player.level}`;

  const hpRatio = player.hp / player.max_hp;
  const hpColor = hpRatio > 0.5 ? "var(--hp-good)" : hpRatio > 0.25 ? "var(--hp-mid)" : "var(--hp-bad)";

  const fx = player.effects.length
    ? `<div class="effects">状態: ${player.effects.map(e => `${effLabel(e.name)}(${e.turns})`).join(", ")}</div>`
    : "";
  const mg = (runStats && runStats.miniGoal)
    ? `<div class="mini-goal">${escapeHtml(miniGoalText())}</div>`
    : "";
  // plus6: 記憶効果（あれば1〜2行に収まる）
  const memArr = (player.memoryEffects || []).map(id => {
    const def = memoryDef(id); return def ? def.name : id;
  });
  const me = memArr.length
    ? `<div class="effects" style="color:var(--magenta); grid-column: span 4;">記憶: ${escapeHtml(memArr.join(" / "))}</div>`
    : "";

  $statusGrid.innerHTML = `
    <span class="lbl">HP</span><span class="val" style="color:${hpColor}">${player.hp}/${player.max_hp}</span>
    <span class="lbl">EXP</span><span class="val">${player.exp}/${needExp(player)}</span>
    <span class="lbl">攻/防</span><span class="val">${pAtk(player)} / ${pDef(player)}</span>
    <span class="lbl">所持金</span><span class="val" style="color:var(--accent)">${player.gold}G</span>
    <span class="lbl">武器</span><span class="val">${escapeHtml(equipLabel("weapon"))}</span>
    <span class="lbl">防具</span><span class="val">${escapeHtml(equipLabel("armor"))}</span>
    <span class="lbl">所持品</span><span class="val" style="grid-column: span 3; font-size:11px;">${player.inventory.length ? compactInv(player.inventory) : "空"}</span>
    <div class="hp-bar"><div style="width:${hpRatio*100}%; background:${hpColor};"></div></div>
    ${me}
    ${mg}
    ${fx}
  `;
}
function compactInv(inv) {
  const counts = {};
  for (const it of inv) counts[it] = (counts[it] || 0) + 1;
  return Object.entries(counts).map(([k, v]) => v > 1 ? `${k}×${v}` : k).join(", ");
}

function clearNarrative() { $narrative.innerHTML = ""; }

// iOS Safariでも確実に最下部までスクロールするための関数。
// rAFを2段重ねしレイアウト確定後にscrollTopを更新、
// さらにsetTimeoutで保険をかける。
function scrollNarrativeToBottom() {
  const go = () => { $narrative.scrollTop = $narrative.scrollHeight + 9999; };
  go();
  requestAnimationFrame(() => {
    go();
    requestAnimationFrame(go);
  });
  setTimeout(go, 80);
  setTimeout(go, 200);
}

function tellRaw(html, cls = "") {
  const div = document.createElement("div");
  div.className = "story " + cls;
  div.innerHTML = html;
  $narrative.appendChild(div);
  while ($narrative.children.length > 60) $narrative.removeChild($narrative.firstChild);
  scrollNarrativeToBottom();
}
function tell(text, cls = "") { tellRaw(escapeHtml(text), cls); }
function tellTitle(t)         { tellRaw(escapeHtml(t), "title"); }
function tellEvent(title, body, cls = "") {
  tellRaw(`<h3>${escapeHtml(title)}</h3>${escapeHtml(body)}`, cls);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
}

function setActions(html) { $actions.innerHTML = html; }
function clearActions()   { $actions.innerHTML = ""; }

function ask(options, opts = {}) {
  return new Promise(resolve => {
    const cls = opts.danger ? "danger" : "";
    $actions.innerHTML = options.map((o, i) => {
      const label = typeof o === "string" ? o : o.label;
      const desc  = typeof o === "object" && o.desc ? `<span class="desc">${escapeHtml(o.desc)}</span>` : "";
      const dis   = typeof o === "object" && o.disabled ? "disabled style='opacity:0.4;'" : "";
      return `<button class="btn ${cls}" data-i="${i}" ${dis}><span class="num">${i+1}</span>${escapeHtml(label)}${desc}</button>`;
    }).join("");
    $actions.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => {
        if (b.hasAttribute("disabled")) return;
        clearActions();
        resolve(parseInt(b.dataset.i, 10));
      }, { once: true });
    });
    // 行動表示直後にも最下部へスクロール（行動が画面外にあると気づかれない対策）
    scrollNarrativeToBottom();
  });
}

function askText(placeholder = "") {
  return new Promise(resolve => {
    $actions.innerHTML = `
      <input class="text-input" id="ti" placeholder="${escapeHtml(placeholder)}" autocomplete="off">
      <button class="btn primary" id="ti-ok">決定</button>
    `;
    const inp = document.getElementById("ti");
    const ok  = document.getElementById("ti-ok");
    inp.focus();
    const submit = () => { const v = inp.value; clearActions(); resolve(v); };
    ok.addEventListener("click", submit, { once: true });
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    scrollNarrativeToBottom();
  });
}

function pause(label = "次へ") {
  return new Promise(resolve => {
    $actions.innerHTML = `<button class="btn primary">${escapeHtml(label)}</button>`;
    $actions.querySelector("button").addEventListener("click", () => { clearActions(); resolve(); }, { once: true });
    scrollNarrativeToBottom();
  });
}

// 実績トースト
function showAchievementToast(def) {
  const el = document.createElement("div");
  el.className = "ach-toast";
  el.innerHTML = `
    <div class="ach-icon">🏆</div>
    <div>
      <div class="ach-title">実績解除</div>
      <div class="ach-name">${escapeHtml(def.name)}</div>
      <div class="ach-desc">${escapeHtml(def.desc)}</div>
    </div>
  `;
  $toastWrap.appendChild(el);
  requestAnimationFrame(() => el.classList.add("visible"));
  setTimeout(() => {
    el.classList.remove("visible");

  }, 3500);
}

// ====================================================================
// アイテム使用
// ====================================================================
function removeOne(arr, x) { const i = arr.indexOf(x); if (i >= 0) arr.splice(i, 1); }

function useItem(p, item, inCombat = false, target = null, canFlee = true) {
  const info = ITEMS[item];
  if (!info) return [false, "その品は壊れて使えない。"];
  if (info.category === "weapon") {
    const old = p.weapon;
    const lost = old && (p.weaponEnhance || 0) > 0;
    p.weapon = item; p.weaponEnhance = 0; removeOne(p.inventory, item);
    if (old) p.inventory.push(old);
    return [true, `${item} を装備した。${old ? `（${old} を外した）` : ""}${lost ? " 強化された武器を手放した。" : ""}`];
  }
  if (info.category === "armor") {
    const old = p.armor;
    const lost = old && (p.armorEnhance || 0) > 0;
    p.armor = item; p.armorEnhance = 0; removeOne(p.inventory, item);
    if (old) p.inventory.push(old);
    return [true, `${item} を装備した。${old ? `（${old} を外した）` : ""}${lost ? " 強化された防具を手放した。" : ""}`];
  }
  switch (info.effect) {
    case "heal": {
      const g = heal(p, info.power); removeOne(p.inventory, item);
      return [true, `${item} を使った。HPが ${g} 回復した。`];
    }
    case "full_heal": {
      const g = heal(p, p.max_hp); removeOne(p.inventory, item);
      return [true, `エリクサーの輝き！ HPが ${g} 回復した。`];
    }
    case "cure_poison": {
      if (hasEffect(p, "poison")) {
        p.effects = p.effects.filter(e => e.name !== "poison");
        removeOne(p.inventory, item);
        return [true, "毒消し草を噛んだ。毒が消えた。"];
      }
      return [false, "今は毒に侵されていない。"];
    }
    case "buff_atk": addEffect(p, "buff_atk", 5, info.power); removeOne(p.inventory, item); return [true, "力の薬！ 5ターン攻撃力が上昇した。"];
    case "buff_def": addEffect(p, "buff_def", 5, info.power); removeOne(p.inventory, item); return [true, "鉄壁の薬！ 5ターン防御力が上昇した。"];
    case "escape":
      if (!inCombat) return [false, "戦闘中にしか使えない。"];
      // ボス戦・スフィンクス戦など canFlee=false ではそもそも使えない（誤タップで煙玉消費しない）
      if (!canFlee) return [false, "この戦いからは逃げられない！ 煙玉は無効だ。"];
      removeOne(p.inventory, item);
      return [true, "煙玉を投げつけた！ 視界が遮られる。"];
    case "magic": {
      if (!inCombat || !target) return [false, "戦闘中にしか使えない。"];
      const isMage = p.cls === "魔導士";
      const ampLv  = isMage ? Math.min(4, growthLv("魔力増幅")) : 0;
      // 魔導士+木の棒シナジー
      const wandBonus = (isMage && p.weapon === "木の棒") ? 5 : 0;
      const power = info.power + (isMage ? 10 : 0) + ampLv * 5 + wandBonus;
      target.hp  -= power;
      trackDamageDealt(power);
      addRunStat("scrollUseCount");
      if (isMage) addClassFeatureStat("mageScrollBoosts");
      // 魔導節約：基礎20% + Lv*10%（上限60%）
      const saveLv  = isMage ? Math.min(4, growthLv("魔導節約")) : 0;
      const conserveRate = isMage ? Math.min(0.60, 0.20 + saveLv * 0.10) : 0;
      const conserve = isMage && Math.random() < conserveRate;
      if (!conserve) removeOne(p.inventory, item);
      else if (runStats) addClassFeatureStat("mageScrollSaves");
      // 巻物術師実績
      if (isMage && runStats && (runStats.scrollUseCount + runStats.mageScrollSaves) >= 5) {
        unlockAch("mage_scrollmaster");
      }
      let tail = "";
      if (wandBonus > 0) {
        if (runStats) runStats.equipmentSynergyTriggers += 1;
        tail += "  木の棒を杖代わりに掲げた。";
      }
      if (isMage) tail += "  魔導士の詠唱が巻物の力を高めた！";
      if (conserve) tail += "  巻物は崩れずに残った。";
      // 記憶効果「詠唱の記憶」: 30% で HP+3（巻物消費・温存とは独立）
      if (hasMemory("incantation") && Math.random() < 0.30) {
        const g = heal(p, 3);
        if (g > 0) tail += "  詠唱の記憶が巻物に力を添えた！ (HP+3)";
      }
      return [true, `魔法の巻物が炸裂！ ${target.name} に ${power} のダメージ！${tail}`];
    }
    case "level_up": {
      p.exp = needExp(p);
      const msgs = gainExp(p, 0);
      removeOne(p.inventory, item);
      return [true, "賢者の石が砕けた！ " + msgs.join(" ")];
    }
  }
  return [false, "何も起こらなかった。"];
}

async function openInventory(inCombat = false, target = null, canFlee = true) {
  if (player.inventory.length === 0) {
    tell("所持品は空だ。", "dim");
    return null;
  }
  const items = [...new Set(player.inventory)];
  const opts = items.map(it => {
    const cnt = player.inventory.filter(x => x === it).length;
    const info = ITEMS[it];
    return { label: `${it}${cnt > 1 ? ` ×${cnt}` : ""}`, desc: info.desc };
  });
  opts.push({ label: "やめる" });
  const idx = await ask(opts);
  if (idx === opts.length - 1) return null;
  const item = items[idx];
  const [consumed, msg] = useItem(player, item, inCombat, target, canFlee);
  tell(msg, consumed ? "shop" : "dim");
  renderStatus();
  // 戦闘中のアイテム使用は combat() の終了時に saveGame() するため
  // ここでは戦闘外のアイテム使用のみ保存する（戦闘ターン中保存は避ける）
  if (consumed && !inCombat) saveGame();
  // null は「キャンセル」、false は「選んだが使えなかった」。
  // ボス戦の煙玉失敗などを無料ターンスキップにしないため区別する。
  return consumed ? item : false;
}

// ====================================================================
// 戦闘
// ====================================================================
function calcDamage(atk, def, variance = 0.25) {
  const base   = Math.max(1, atk - Math.floor(def / 2));
  const spread = Math.max(1, Math.floor(base * variance));
  return Math.max(1, base + randInt(-spread, spread));
}

async function combat(m, canFlee = true) {
  tellEvent(`⚔ ${m.name} が現れた`, `${m.flavor}\nHP ${m.hp}  攻撃 ${m.atk}  防御 ${m.defense}`, "combat");
  let turn = 0;
  while (m.hp > 0 && player.hp > 0) {
    turn += 1;
    const hpR = player.hp / player.max_hp;
    const hpColor = hpR > 0.5 ? "var(--hp-good)" : hpR > 0.25 ? "var(--hp-mid)" : "var(--hp-bad)";
    tellRaw(`<div class="combat-bar">
        <span>ターン ${turn}</span>
        <span class="vs">⚔</span>
        <span><span class="mhp">${m.name} HP ${m.hp}</span></span>
        <span class="vs">vs</span>
        <span style="color:${hpColor}">あなた ${player.hp}/${player.max_hp}</span>
      </div>`);

    const opts = [
      { label: "攻撃" },
      { label: "防御", desc: "次のダメージ半減" },
      { label: "アイテム" },
    ];
    if (canFlee) opts.push({ label: "逃げる" });
    const idx = await ask(opts);

    let defending = false, skipEnemy = false;

    if (idx === 0) {
      const crit = Math.random() < 0.10;
      let dmg = calcDamage(pAtk(player), m.defense);
      if (m.tags.includes("dragon") && player.weapon === "竜殺しの槍") {
        dmg *= 2; tell("竜殺しの槍が輝く！", "shop");
      }
      // 炎の剣：魔導士装備で発動率UP
      const fireRate = (player.cls === "魔導士") ? 0.45 : 0.30;
      if (player.weapon === "炎の剣" && Math.random() < fireRate) {
        dmg += 6;
        if (player.cls === "魔導士") runStats.equipmentSynergyTriggers += 1;
        tell("炎の刃が燃え上がる！", "danger");
      }
      if (crit) { dmg = Math.floor(dmg * 1.8); tell("会心の一撃！", "shop"); }
      m.hp -= dmg;
      trackDamageDealt(dmg);
      tell(`あなたの攻撃 → ${m.name} に ${dmg} ダメージ。`);
      // 盗賊+木の棒：10%でひるませる
      if (player.cls === "盗賊" && player.weapon === "木の棒" && m.hp > 0 && Math.random() < 0.10) {
        skipEnemy = true;
        runStats.equipmentSynergyTriggers += 1;
        tell(`怯みの一撃！ ${m.name} は反撃できない。`, "shop");
      }
    } else if (idx === 1) {
      defending = true;
      addRunStat("defendingTimes");
      if (player.cls === "戦士") {
        addClassFeatureStat("warriorDefends");
        // HP残量が3割以下の時は粘りを強調するログに切替
        const lowHp = player.max_hp > 0 && (player.hp / player.max_hp) <= 0.30;
        tell(lowHp ? "戦士の構え！ 食いしばる！" : "戦士の構え！", "shop");
      } else {
        tell("構えを取った。", "shop");
      }
    } else if (idx === 2) {
      const consumed = await openInventory(true, m, canFlee);
      if (consumed === null) skipEnemy = true;
      // 煙玉が成立するのは canFlee=true 時のみ。canFlee=false なら useItem が消費せず
      // ガード済みなので、ここに "煙玉" の consumed が届かない（保険として canFlee 確認）
      else if (consumed === "煙玉" && canFlee) {
        if (player.cls === "盗賊") { addClassFeatureStat("rogueEscapes"); tell("盗賊の足さばき！", "shop"); }
        tell(`${m.name} を撒いて逃げ切った！`, "shop");
        addRunStat("fleeSuccessCount");
        // 記憶効果「遁走の記憶」: 逃走成功でHP+2
        if (hasMemory("swift_flee")) {
          const g = heal(player, 2);
          if (g > 0) tell("遁走の記憶が息を整えた！ (HP+2)", "shop");
        }
        saveGame();
        return false;
      }
      else if (m.hp <= 0) break;
    } else if (idx === 3) {
      const isRogue = player.cls === "盗賊";
      // 盗賊+革の鎧：+5%
      const armorBonus = (isRogue && player.armor === "革の鎧") ? 0.05 : 0;
      const ashiSabaki = isRogue ? Math.min(0.40, 0.10 * growthLv("足さばき")) : 0;
      const raw = 0.4 + player.level * 0.03 + (isRogue ? 0.20 : 0) + armorBonus + ashiSabaki;
      // 難易度別の逃走率上限：物語95% / 標準90% / 挑戦85%
      const cap = ({ story: 0.95, normal: 0.90, challenge: 0.85 })[currentDifficulty()];
      const chance = Math.min(cap, raw);
      if (Math.random() < chance) {
        if (isRogue) { addClassFeatureStat("rogueEscapes"); tell("盗賊の足さばき！", "shop"); }
        if (armorBonus > 0) { runStats.equipmentSynergyTriggers += 1; tell("革の鎧が音を抑え、滑るように離脱した。", "shop"); }
        tell(`${m.name} を撒いて逃げ切った！`, "shop");
        addRunStat("fleeSuccessCount");
        // 盗賊：逃げ際に30%で隠し持ちから5〜15Gを抜き取る（小さな副収入）
        if (isRogue && Math.random() < 0.30) {
          const g = randInt(5, 15);
          addGold(player, g);
          addClassFeatureStat("rogueDiscounts");
          tell(`盗賊の交渉術！ 隠し持ちから ${g}G を拾った。`, "gold");
        }
        // 記憶効果「遁走の記憶」: 逃走成功でHP+2
        if (hasMemory("swift_flee")) {
          const g = heal(player, 2);
          if (g > 0) tell("遁走の記憶が息を整えた！ (HP+2)", "shop");
        }
        saveGame();
        return false;
      }
      tell("逃げられなかった！", "danger");
    }

    if (skipEnemy) continue;
    if (m.hp <= 0) break;

    if (Math.random() < 0.10) {
      tell(`${m.name} の攻撃は外れた！`);
    } else {
      let edmg = calcDamage(m.atk, pDef(player));
      if (defending) {
        edmg = Math.max(1, Math.floor(edmg / 2));
        // 戦士成長「鉄壁」：Lv毎 -2
        if (player.cls === "戦士") {
          const tessei = growthLv("鉄壁");
          if (tessei > 0) edmg = Math.max(1, edmg - 2 * tessei);
          // 戦士+鋼の鎧：防御時 -2 追加
          if (player.armor === "鋼の鎧") {
            edmg = Math.max(1, edmg - 2);
            runStats.equipmentSynergyTriggers += 1;
          }
          tell("戦士の構えが衝撃を受け止めた。", "shop");
        }
        // 記憶効果「鉄壁の記憶」：防御時の被ダメ -1（控えめ、無敵化しない）
        if (hasMemory("iron_wall")) {
          const before = edmg;
          edmg = Math.max(1, edmg - 1);
          if (edmg < before) tell("鉄壁の記憶が守りを固めた！", "shop");
        }
        // ボス戦は最低2ダメ保証（防御無双による作業化防止）
        if (isBossBattleFloor(player.floor)) edmg = Math.max(2, edmg);
      }
      // 戦士+聖なる鎧：ボス戦の初撃 -5
      if (player.cls === "戦士" && player.armor === "聖なる鎧"
          && isBossBattleFloor(player.floor) && turn === 1) {
        edmg = Math.max(1, edmg - 5);
        runStats.equipmentSynergyTriggers += 1;
        tell("聖なる鎧が初撃の力を吸収した。", "shop");
      }
      applyDamage(player, edmg, m.name);
      tell(`${m.name} の攻撃 → あなたに ${edmg} ダメージ。`, "danger");
      if (m.tags.includes("poison") && !hasEffect(player, "poison") && Math.random() < 0.35) {
        if (player.armor !== "聖なる鎧") {
          addEffect(player, "poison", 4);
          tell("あなたは毒に侵された！", "danger");
        }
      }
      // 戦士の反撃：防御選択中・敵が攻撃を当てた直後
      // ベース30% + 反撃術Lv*10%（最大70%）、ボス戦時は更に+5%（戦士の粘り）。
      // 上限0.80でクランプして暴走を防ぐ。ダメは通常攻撃の50%。
      if (defending && player.cls === "戦士" && m.hp > 0 && player.hp > 0) {
        const baseCRate = 0.30 + Math.min(0.40, growthLv("反撃術") * 0.10);
        const bossBonus = isBossBattleFloor(player.floor) ? 0.05 : 0;
        const cRate = Math.min(0.80, baseCRate + bossBonus);
        if (Math.random() < cRate) {
          let cdmg = Math.max(1, Math.floor(calcDamage(pAtk(player), m.defense) * 0.5));
          // 戦士+鋼の剣：反撃ダメ +2
          if (player.weapon === "鋼の剣") {
            cdmg += 2;
            runStats.equipmentSynergyTriggers += 1;
          }
          // 記憶効果「反撃の記憶」：1〜3 or floor(level/3) の追加ダメ（控えめ）
          if (hasMemory("counter_strike")) {
            const memBonus = Math.max(1, Math.min(3, Math.floor(player.level / 3)));
            cdmg += memBonus;
            tell("反撃の記憶が刃を押し返した！", "shop");
          }
          m.hp -= cdmg;
          trackDamageDealt(cdmg);
          addClassFeatureStat("warriorCounters");
          tell(`戦士の反撃！ ${m.name} に ${cdmg} ダメージ。`, "shop");
        }
      }
    }
    for (const msg of tickEffects(player)) tell(msg, "dim");
    renderStatus();
  }

  if (player.hp <= 0) return false;

  trackKill();
  const lines = [`${m.name} を倒した！`, `経験値 ${m.exp} と ${m.gold}G を得た。`];
  addGold(player, m.gold);
  for (const msg of gainExp(player, m.exp)) lines.push(msg);
  for (const [item, prob] of m.drops) {
    if (Math.random() < prob) { player.inventory.push(item); lines.push(`${m.name} は ${item} を落とした！`); }
  }
  tellEvent("勝利！", lines.join("\n"), "victory");
  renderStatus();
  saveGame();
  return true;
}

async function eventMonster() {
  let pool = FLOOR_POOL[floorTier(player.floor)];
  if (Math.random() < 0.12 && FLOOR_POOL[floorTier(player.floor) + 1]) {
    pool = FLOOR_POOL[floorTier(player.floor) + 1];
    tell("…なにか強い気配がする。", "danger");
  }
  const m = makeMonster(choice(pool));
  // plus6: 通常敵に低確率でエリート修飾語を付与
  maybeApplyElite(m);
  const eliteTag = m.elite ? "✦ エリート" : "モンスター";
  tellEvent(eliteTag, `${choice(EVENT_FLAVOR.monster)}\n${m.name} と遭遇した！`, "combat");
  const idx = await ask(["戦う", { label: "様子を見て逃げる", desc: "階層が深いほど低下" }]);
  if (idx === 1) {
    const chance = Math.max(0.25, 0.7 - player.floor * 0.02);
    if (Math.random() < chance) {
      if (player.cls === "盗賊") { addClassFeatureStat("rogueEscapes"); tell("盗賊の足さばき！", "shop"); }
      tell("そっと後退し、気付かれずに通り抜けた。", "shop");
      return;
    }
    tell("気付かれた！", "danger");
  }
  const won = await combat(m);
  // plus6: エリート撃破時の戦利品3択
  if (won && m.elite) {
    if (runStats) runStats.eliteKills = (runStats.eliteKills || 0) + 1;
    tell("✦ エリートを撃破した！", "shop");
    await maybeOfferEliteLoot(m);
  }
}

async function eventTreasure() {
  tellEvent("宝箱", `${choice(EVENT_FLAVOR.treasure)}\n古びた宝箱が部屋の中央に置かれている。`);
  const idx = await ask([
    "開ける",
    { label: "罠を疑って蹴り倒す", desc: "罠回避だが破損リスク" },
    "立ち去る",
  ]);
  if (idx === 2) return;
  addRunStat("treasureOpens");
  let trapped = Math.random() < 0.20 + player.floor * 0.01;
  // 盗賊補正：察知率は基礎50%+「罠抜け」Lv*10% (上限90%)
  if (trapped && player.cls === "盗賊") {
    const detectRate = Math.min(0.90, 0.50 + growthLv("罠抜け") * 0.10);
    if (Math.random() < detectRate) {
      trapped = false;
      addClassFeatureStat("rogueTrapAvoids");
      tell("盗賊の勘が働いた！", "shop");
    }
  }
  if (idx === 1) {
    if (trapped) { tell("蹴り倒した宝箱から針が飛び出すが、当たらなかった！", "shop"); trapped = false; }
    else if (Math.random() < 0.4) { tell("中身が壊れてしまった…", "dim"); return; }
  }
  if (trapped) {
    const dmg = randInt(5, 12);
    applyDamage(player, dmg, "宝箱の罠");
    tell(`宝箱は罠だった！ ${dmg} のダメージ。`, "danger");
    if (player.hp <= 0) return;
  }
  const rolls = 1 + (Math.random() < 0.3 ? 1 : 0);
  const gained = [];
  for (let i = 0; i < rolls; i++) {
    const it = weightedChoice(TREASURE_POOL);
    player.inventory.push(it);
    gained.push(it);
  }
  // 盗賊「目利き」: Lv*15%で高品質アイテム追加（上限50%）
  if (player.cls === "盗賊") {
    const upRate = Math.min(0.50, 0.10 + growthLv("目利き") * 0.15);
    if (Math.random() < upRate) {
      const goodPool = [["ハイポーション", 0.40], ["魔法の巻物", 0.30], ["鋼の剣", 0.15], ["鎖帷子", 0.10], ["エリクサー", 0.05]];
      const extra = weightedChoice(goodPool);
      player.inventory.push(extra);
      gained.push(extra);
      addClassFeatureStat("rogueGoodLoots");
      tell("盗賊の目利き！", "shop");
    }
  }
  const gold = randInt(5, 15) * player.floor;
  addGold(player, gold);
  tell(`${gold}G と ${gained.join(", ")} を手に入れた！`, "gold");
}

async function eventTrap() {
  const t = choice(TRAP_TYPES);
  tellEvent("罠", `${choice(EVENT_FLAVOR.trap)}\nこれは…${t.name}か？`);
  let idx = await ask([
    { label: "慎重に避ける", desc: "成功率: 防御依存" },
    { label: "走って駆け抜ける", desc: "半ダメージ" },
    { label: `アイテムで対処`, desc: `所持品 ${player.inventory.length} 個` },
  ]);
  if (idx === 2) {
    await openInventory(false);
    idx = await ask([{ label: "慎重に避ける" }, { label: "駆け抜ける" }]);
  }
  // 盗賊「罠抜け」：基礎成功率に+5%/Lv（上限90%）
  let sr = Math.min(0.85, 0.45 + pDef(player) * 0.02);
  if (player.cls === "盗賊" && growthLv("罠抜け") > 0) {
    sr = Math.min(0.95, sr + growthLv("罠抜け") * 0.05);
  }
  let actual;
  if (idx === 0) {
    if (Math.random() < sr) {
      tell(`${t.desc} だがあなたは見切って避けた！`, "shop");
      if (player.cls === "盗賊") {
        addClassFeatureStat("rogueTrapAvoids");
        tell("盗賊の勘が働いた！", "shop");
      }
      gainExp(player, 3); renderStatus();
      return;
    }
    tell(t.desc, "danger");
    actual = t.dmg;
  } else {
    tell(`${t.desc} 駆け抜けた！`, "danger");
    actual = Math.floor(t.dmg / 2);
  }
  if (t.kind === "phys") {
    // 盗賊+鎖帷子：物理罠ダメ -2
    if (player.cls === "盗賊" && player.armor === "鎖帷子") {
      actual = Math.max(1, actual - 2);
      runStats.equipmentSynergyTriggers += 1;
    }
    applyDamage(player, actual, t.name);
    tell(`${actual} のダメージ。`, "danger");
  } else if (t.kind === "poison") {
    if (player.armor === "聖なる鎧") tell("聖なる鎧が霧を弾いた。", "shop");
    else { addEffect(player, "poison", 5); setLastDamage(t.name); tell("毒に侵された！", "danger"); }
  } else if (t.kind === "curse") {
    const loss = Math.min(player.gold, randInt(10, 30));
    player.gold -= loss;
    tell(`呪いで ${loss}G が消失した！`, "danger");
  }
}

async function eventMerchant() {
  tellEvent("行商人", "フードを被った行商人が荷物を広げている。\n「ふむ、生きて帰れる客は久しぶりだ。何を見ていく？」", "shop");
  if (player.cls === "盗賊") {
    tell("「お、盗賊か。話の分かる客は値段の話も分かるってもんだ。」（仕入れ-10% / 売値+10%）", "shop");
  }
  let pool = ["ポーション", "ハイポーション", "毒消し草", "力の薬", "煙玉", "魔法の巻物", "鉄の剣", "鋼の剣", "革の鎧", "鎖帷子"];
  if (player.floor >= 8)  pool = pool.concat(["炎の剣", "鋼の鎧", "エリクサー"]);
  if (player.floor >= 14) pool = pool.concat(["竜殺しの槍", "聖なる鎧"]);
  const stock = Array.from({ length: 5 }, () => choice(pool));
  // 盗賊「目利き」: 5品中の指定数を高品質枠に置換（最大2枠まで）
  // 偏りすぎ防止のため、プール拡張ではなく「枠の置換」方式に変更
  if (player.cls === "盗賊" && growthLv("目利き") > 0) {
    const goods = ["ハイポーション","エリクサー","魔法の巻物","鎖帷子"];
    const replaces = Math.min(2, growthLv("目利き") >= 3 ? 2 : 1);
    for (let i = 0; i < replaces; i++) stock[i] = choice(goods);
    tell("「目利きの客には、いい物を用意してある」", "shop");
  }

  while (true) {
    const opts = stock.map(it => {
      const bp = buyPrice(it);
      return {
        label: `${it}  ${bp}G`,
        desc: ITEMS[it].desc,
        disabled: player.gold < bp,
      };
    });
    opts.push({ label: `売る`, desc: `所持品 ${player.inventory.length} 個` });
    opts.push({ label: "立ち去る" });
    const idx = await ask(opts);
    if (idx === opts.length - 1) { tell("「またのご来店を。生きてればな。」"); return; }
    if (idx === opts.length - 2) {
      if (player.inventory.length === 0) { tell("売れる物が無い。", "dim"); continue; }
      const items = [...new Set(player.inventory)];
      const sopts = items.map(it => ({ label: `${it} → ${sellPrice(it)}G` }));
      sopts.push({ label: "やめる" });
      const j = await ask(sopts);
      if (j === sopts.length - 1) continue;
      const sold = items[j];
      const sp = sellPrice(sold);
      removeOne(player.inventory, sold);
      addGold(player, sp);
      tell(`${sold} を ${sp}G で売却した。`, "gold");
      renderStatus();
      saveGame();
      continue;
    }
    const item = stock[idx];
    const price = buyPrice(item);
    if (player.gold < price) { tell("「金が足りないようだな。」", "danger"); continue; }
    player.gold -= price;
    player.inventory.push(item);
    stock.splice(idx, 1);
    tell(`${item} を ${price}G で購入した。`, "gold");
    if (player.cls === "盗賊" && price < ITEMS[item].price) {
      addClassFeatureStat("rogueDiscounts");
      tell("盗賊の目利き！", "shop");
    }
    // 記憶効果「商才の記憶」: 消耗品購入で25%・5〜10G 返却（鍛冶屋には非適用）
    if (hasMemory("merchant_eye") && ITEMS[item].category === "consumable" && Math.random() < 0.25) {
      const refund = Math.min(price, randInt(5, 10));
      addGold(player, refund);
      tell(`商才の記憶が小銭を呼び戻した！ (+${refund}G)`, "shop");
    }
    // 商人の紹介状は初購入で消費
    if (runStats.merchantIntroAvailable) {
      runStats.merchantIntroAvailable = false;
      tell("(紹介状の効果はここまでだ。)", "dim");
    }
    renderStatus();
    saveGame();
    if (stock.length === 0) { tell("「これで打ち止めだ。気をつけてな。」"); return; }
  }
}

  const isMage = player.cls === "魔導士";

    if (isMage && player.armor === "聖なる鎧") {

      tell("聖なる鎧が泉の悪意を吸収した。", "shop");

  else {

    if (isMage && !runStats.mageEventGuardUsed && Math.random() < 0.25) {

function forgeOption(slot, discount = 1) {
  const label = slot === "weapon" ? "武器を強化する" : "防具を強化する";
  if (!hasForgeTarget(slot)) return { label, desc: "装備なし", disabled: true };
  const cur = getEnhance(slot);
  const limit = forgeLimit();
  if (cur >= limit) return { label: `${label}（+${cur}）`, desc: `上限 +${limit}`, disabled: true };
  const cost = forgeCost(slot, discount);
  return {
    label: `${label}  +${cur}→+${cur + 1}  ${cost}G`,
    desc: `${slot === "weapon" ? equipLabel("weapon") : equipLabel("armor")} を強化`,
    disabled: player.gold < cost,
  };
}

function blessingOptions(isEndless = false) {
  const pool = BLESSINGS
    .filter(b => b.id !== "forge" || canEnhance("weapon", 1, true) || canEnhance("armor", 1, true))
    .map(b => [b, isEndless && b.endlessWeight ? b.endlessWeight : b.weight]);
  const picked = [];
  const work = [...pool];
  while (picked.length < 3 && work.length > 0) {
    const b = weightedChoice(work);
    picked.push(b);
    const pos = work.findIndex(([x]) => x.id === b.id);
    if (pos >= 0) work.splice(pos, 1);
  }
  return picked;
}
function applyBlessing(b) {
  if (!b || !player) return "";
  if (b.id === "sword") {
    player.base_atk += 1;
    return "攻撃が1上がった。";
  }
  if (b.id === "shield") {
    player.base_def += 1;
    return "防御が1上がった。";
  }
  if (b.id === "life") {
    player.max_hp += 5;
    player.hp = Math.min(player.max_hp, player.hp + 5);
    return "最大HPとHPが5上がった。";
  }
  if (b.id === "merchant") {
    addGold(player, 50);
    return "50Gを得た。";
  }
  if (b.id === "apothecary") {
    player.inventory.push("ポーション");
    return "ポーションを得た。";
  }
  if (b.id === "escape") {
    player.inventory.push("煙玉");
    return "煙玉を得た。";
  }
  if (b.id === "wisdom") {
    player.inventory.push("魔法の巻物");
    return "魔法の巻物を得た。";
  }
  if (b.id === "forge") {
    const slots = ["weapon", "armor"].filter(s => canEnhance(s, 1, true));
    const slot = slots.length === 2
      ? (getEnhance("weapon") <= getEnhance("armor") ? "weapon" : "armor")
      : slots[0];
    if (!slot) return "鍛える装備がなかった。";
    enhanceEquipment(slot, { free: true, source: "blessing" });
    return `${slot === "weapon" ? equipLabel("weapon") : equipLabel("armor")} が強化された。`;
  }
  return "";
}
async function offerBlessingChoice(sourceLabel) {
  const isEndless = isEndlessMode();
  const options = blessingOptions(isEndless);
  if (options.length === 0) return;
  // plus6: 記憶効果の上限に空きがあれば、低確率で1枠を記憶効果候補に置換
  // 本編 20% / 深層 40%（深層は出やすめ）
  if (canAddMemory()) {
    const memoryRate = isEndless ? 0.40 : 0.20;
    if (Math.random() < memoryRate) {
      const owned = player.memoryEffects || [];
      const candidates = MEMORY_EFFECTS.filter(e => owned.indexOf(e.id) < 0);
      if (candidates.length > 0) {
        const def = choice(candidates);
        // 末尾の祝福を記憶効果に置換
        options[options.length - 1] = {
          id: "memory:" + def.id,
          name: `記憶効果: ${def.name}`,
          desc: def.desc,
          isMemory: true,
          memoryDef: def,
        };
      }
    }
  }
  tellEvent("✦ 記憶の祝福", `${sourceLabel}の記憶が形を成す。1つ選べ。`, "shop");
  const idx = await ask(options.map(b => ({ label: b.name, desc: b.desc })));
  const chosen = options[idx];
  let result = "";
  if (chosen.isMemory) {
    addMemoryEffect(chosen.memoryDef.id, sourceLabel);
  } else {
    result = applyBlessing(chosen);
  }
  if (runStats) {
    runStats.blessingChoices.push({ id: chosen.id, name: chosen.name, floor: player.floor, source: sourceLabel });
    addRunStat("blessingCount", 1, false);
  }
  if (result) tell(`${chosen.name}を選んだ。${result}`, "gold");
  renderStatus();
  saveGame();
}

        ? (getEnhance("weapon") <= getEnhance("armor") ? "weapon" : "armor")
        : slots[0];
      if (!slot) return "鍛える装備がなかった。";
      enhanceEquipment(slot, { free: true, source: "milestone" });
      return `${slot === "weapon" ? equipLabel("weapon") : equipLabel("armor")} が強化された。`;
    } });
  }
  const options = [];
  const work = [...pool];
  while (options.length < 3 && work.length) {
    const i = rand(work.length);
    options.push(work.splice(i, 1)[0]);
  }
  tellEvent(sourceLabel, "深層の記憶が三つに分かれている。", "shop");
  const idx = await ask(options.map(b => ({ label: b.name, desc: b.desc })));
  const chosen = options[idx];
  const result = chosen.apply();
  if (runStats) {
    runStats.blessingChoices.push({ id: chosen.id, name: chosen.name, floor: player.floor, source: sourceLabel });
    addRunStat("blessingCount", 1, false);
  }
  tell(`${chosen.name}を選んだ。${result}`, "gold");
  renderStatus();
  saveGame();
}

// plus6: エリート撃破後の戦利品3択
function buildEliteLootPool(m) {
  const pool = [];
  const goldAmt = randInt(30, 60);
  pool.push({ id: "loot_gold",   label: `GOLD +${goldAmt}`, apply: () => { addGold(player, goldAmt); return `${goldAmt}G を得た。`; } });
  pool.push({ id: "loot_potion", label: "ポーション ×1", apply: () => { player.inventory.push("ポーション"); return "ポーションを得た。"; } });
  pool.push({ id: "loot_smoke",  label: "煙玉 ×1",       apply: () => { player.inventory.push("煙玉"); return "煙玉を得た。"; } });
  pool.push({ id: "loot_scroll", label: "魔法の巻物 ×1",  apply: () => { player.inventory.push("魔法の巻物"); return "魔法の巻物を得た。"; } });
  // 鍛冶上限を尊重して武具+1（出せる時のみ候補）
  if (canEnhance("weapon", 1, true)) pool.push({ id: "loot_forge_w", label: "武器 +1（鍛冶）", apply: () => { enhanceEquipment("weapon", { free: true, source: "elite_loot" }); return `${equipLabel("weapon")} に強化された。`; } });
  if (canEnhance("armor", 1, true))  pool.push({ id: "loot_forge_a", label: "防具 +1（鍛冶）", apply: () => { enhanceEquipment("armor",  { free: true, source: "elite_loot" }); return `${equipLabel("armor")} に強化された。`; } });
  // 小祝福
  pool.push({ id: "loot_atk", label: "攻撃 +1",    apply: () => { player.base_atk += 1; return "攻撃が1上がった。"; } });
  pool.push({ id: "loot_def", label: "防御 +1",    apply: () => { player.base_def += 1; return "防御が1上がった。"; } });
  pool.push({ id: "loot_hp",  label: "最大HP +3",  apply: () => { player.max_hp += 3; player.hp = Math.min(player.max_hp, player.hp + 3); return "最大HPが3上がった。"; } });
  // 記憶効果（上限に空きがある時のみ）
  if (canAddMemory()) {
    const owned = player.memoryEffects || [];
    const candidates = MEMORY_EFFECTS.filter(e => owned.indexOf(e.id) < 0);
    if (candidates.length > 0) {
      const def = choice(candidates);
      pool.push({
        id: "loot_memory:" + def.id,
        label: `記憶効果: ${def.name}`,
        apply: () => { addMemoryEffect(def.id, "エリート戦利品"); return ""; },
        isMemory: true,
      });
    }
  }
  return pool;
}
async function maybeOfferEliteLoot(m) {
  const isEndless = isEndlessMode();
  // plus7: 報酬密度の調整（本編40→35%、深層60→50%、深層affix +15→+10pp）

async function offerGrowthChoice(level) {
  const list = CLASS_GROWTH[player.cls];
  if (!list) return;
  // 上限到達済みは選択肢から除外する（残ってる項目だけ提示）
  const candidates = list.filter(g => (player.classUpgrades[g.id] || 0) < g.maxLv);
  if (candidates.length === 0) return;
  tellEvent(`✦ クラス成長 (Lv${level})`, `${player.cls}としての歩みが深まる。1つ選べ。`, "shop");
  const opts = candidates.map(g => {
    const cur = player.classUpgrades[g.id] || 0;
    const maxTag = (g.maxLv === 99) ? "" : ` (現Lv${cur}/${g.maxLv})`;
    return { label: `${g.id}${maxTag}`, desc: g.desc };
  });
  const idx = await ask(opts);
  const chosen = candidates[idx];
  player.classUpgrades[chosen.id] = (player.classUpgrades[chosen.id] || 0) + 1;
  // 武勇は即時HP/最大HP+10
  if (chosen.id === "武勇") {
    player.max_hp += 10;
    player.hp += 10;
  }
  runStats.classGrowthChoices.push({ level, id: chosen.id });
  tell(`✦ ${chosen.id} を習得！ (現Lv${player.classUpgrades[chosen.id]})`, "heal");
  // 4回成長で実績
  if (runStats.classGrowthChoices.length >= 4) unlockAch("class_growth_master");
  saveGame();
  renderStatus();
}
async function processGrowthQueue() {
  if (!runStats || !runStats.pendingGrowth) return;
  while (runStats.pendingGrowth.length > 0 && player.hp > 0) {

    await offerGrowthChoice(lvl);

}
