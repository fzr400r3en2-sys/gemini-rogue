// 記憶の商人
// ====================================================================
function generateMemoryMerchantStock() {
  const hasCleared = hasClearedStory();
  const isChallenge = player && player.difficulty === "challenge";
  const allowRare = hasCleared || isChallenge;
  const allowSage = hasCleared;
  const pickWeighted = (pool) => {
    if (pool.length === 0) return null;
    return weightedChoice(pool.map(p => [p, p.weight]));
  };
  const weapons = MM_WEAPONS.concat(allowRare ? MM_WEAPONS_RARE : []);
  const armors  = MM_ARMORS.concat(allowRare ? MM_ARMORS_RARE : []);
  const specials = MM_SPECIALS.concat(allowSage ? MM_SPECIALS_SAGE : []);
  const cons = MM_CONSUMABLES;

  const stock = [];
  stock.push(pickWeighted(weapons));
  stock.push(pickWeighted(armors));
  // 消耗品2枠（重複は許容するが、なるべく異なるものを優先）
  const c1 = pickWeighted(cons);
  let c2 = pickWeighted(cons);
  for (let tries = 0; tries < 4 && c2.item === c1.item; tries++) c2 = pickWeighted(cons);
  stock.push(c1);
  stock.push(c2);
  stock.push(pickWeighted(specials));
  return stock.filter(Boolean);
}

// 購入アイテムをプレイヤーへ反映する。shards 減算はここでは行わない。
function applyMemoryMerchantPurchase(it) {
  const info = ITEMS[it.item];
  if (info && info.category === "weapon") {
    const curAtk = player.weapon ? (ITEMS[player.weapon].atk || 0) : -1;
    if (info.atk > curAtk) {
      const old = player.weapon;
      const lost = old && (player.weaponEnhance || 0) > 0;
      player.weapon = it.item;
      player.weaponEnhance = 0;
      if (old) player.inventory.push(old);
      if (lost) tell("強化された武器を手放した。", "dim");
    } else {
      player.inventory.push(it.item);
    }
  } else if (info && info.category === "armor") {
    const curDef = player.armor ? (ITEMS[player.armor].defense || 0) : -1;
    if (info.defense > curDef) {
      const old = player.armor;
      const lost = old && (player.armorEnhance || 0) > 0;
      player.armor = it.item;
      player.armorEnhance = 0;
      if (old) player.inventory.push(old);
      if (lost) tell("強化された防具を手放した。", "dim");
    } else {
      player.inventory.push(it.item);
    }
  } else if (info && info.category === "consumable") {
    const qty = it.qty || 1;
    for (let i = 0; i < qty; i++) player.inventory.push(it.item);
  } else if (it.item === "幸運の小袋") {
    const lucky = ["ポーション", "毒消し草", "煙玉", "魔法の巻物", "力の薬", "鉄壁の薬"];
    for (let i = 0; i < 2; i++) player.inventory.push(choice(lucky));
  } else if (it.item === "商人の紹介状") {
    runStats.merchantIntroAvailable = true;
  }
}

async function showMemoryMerchant() {
  const meta0 = loadMeta();
  // shards も既購入もリロール痕跡もない＝初プレイユーザは静かにスキップ
  if ((meta0.shards || 0) === 0
      && meta0.memoryMerchant.currentStock.length === 0
      && meta0.memoryMerchant.purchasedItems.length === 0
      && !meta0.memoryMerchant.rerolled) {
    return;
  }

  // 在庫初期化
  let meta = loadMeta();
  let mm = meta.memoryMerchant;
  if (!Array.isArray(mm.currentStock) || mm.currentStock.length === 0) {
    mm.currentStock = generateMemoryMerchantStock();
    saveMeta(meta);
  }
  // リロード復元：既に購入済みなら player に再適用
  if (Array.isArray(mm.purchasedItems) && mm.purchasedItems.length > 0) {
    for (const p of mm.purchasedItems) {
      applyMemoryMerchantPurchase(p);
      runStats.memoryMerchantPurchases.push({ item: p.item, qty: p.qty || 1, cost: p.cost });
    }
    tell(`(前回ここで選んだ品を引き継いだ：${mm.purchasedItems.map(p => p.item).join(", ")})`, "dim");
    saveGame();
  }

  tellEvent("📦 記憶の商人", "「次の冒険の支度はどうするね？ 記憶の欠片で売ってやるよ。」", "shop");

  while (true) {
    meta = loadMeta();
    mm = meta.memoryMerchant;
    tell(`💎 残: ${meta.shards}　購入: ${mm.purchasedCount}/2${mm.purchasedGear ? "（武具購入済）" : ""}`, "shop");

    const opts = mm.currentStock.map((it) => {
      const isGear = (it.slot === "weapon" || it.slot === "armor");
      const reason = (meta.shards < it.cost) ? "（欠片不足）"
                   : (mm.purchasedCount >= 2) ? "（購入上限）"
                   : (isGear && mm.purchasedGear) ? "（武具購入済）"
                   : "";
      const dis = reason !== "";
      const qtyTag = (it.qty && it.qty > 1) ? `×${it.qty}` : "";
      const baseDesc = it.desc || (ITEMS[it.item] && ITEMS[it.item].desc) || "";
      return {
        label: `${it.item}${qtyTag}　${it.cost}欠片`,
        desc: baseDesc + reason,
        disabled: dis,
      };
    });
    opts.push({
      label: `🔄 リロール  1欠片`,
      desc: mm.rerolled ? "（既に使用済み）" : (meta.shards < 1 ? "（欠片不足）" : "在庫を入れ替える（1冒険1回）"),
      disabled: mm.rerolled || meta.shards < 1,
    });
    opts.push({ label: "🚶 買わずに出発", desc: "迷宮へ向かう" });

    const idx = await ask(opts);

    if (idx === opts.length - 1) {
      // 出発：商人の状態をクリーンアップ
      wipeMemoryMerchant();
      saveGame();
      tell("「達者でな」", "shop");
      break;
    } else if (idx === opts.length - 2) {
      // リロール
      meta.shards -= 1;
      mm.currentStock = generateMemoryMerchantStock();
      mm.rerolled = true;
      saveMeta(meta);
      tell("商品が入れ替わった。", "shop");
      continue;
    } else {
      // 購入
      const it = mm.currentStock[idx];
      meta.shards -= it.cost;
      mm.purchasedCount += 1;
      if (it.slot === "weapon" || it.slot === "armor") mm.purchasedGear = true;
      mm.purchasedItems = mm.purchasedItems || [];
      mm.purchasedItems.push({ ...it });
      mm.currentStock.splice(idx, 1);
      saveMeta(meta);
      applyMemoryMerchantPurchase(it);
      runStats.memoryMerchantPurchases.push({ item: it.item, qty: it.qty || 1, cost: it.cost });
      saveGame();
      const qtyTag = (it.qty && it.qty > 1) ? `×${it.qty}` : "";
      tell(`✦ ${it.item}${qtyTag} を ${it.cost}欠片で購入した。`, "gold");
      if (mm.purchasedCount >= 2) {
        tell("「これで2品。あとは生きて戻ってくることだ」", "shop");
      }
    }
  }
}

function determineTitle() {
  if (!runStats || !player) return "";
  const cls = player.cls;
  const cs = runStats;
  // 深層モード時は深層専用称号を優先
  if (player.mode === "endless") {
    if (player.floor >= 100) return "無限の挑戦者";
    if ((cs.depthBossKills || 0) >= 5) return "残響を砕く者";
    if (player.floor >= 50) return "深淵を覗く者";
    if (player.floor >= 30) return "果てなき探索者";
    if (player.floor >= 21) return "深層への一歩";
  }
  if (cls === "戦士") {
    if (cs.warriorCounters >= 8) return "反撃の戦士";
    if (cs.defendingTimes  >= 12) return "鉄壁の戦士";
    if (cs.classEventSuccess.warrior >= 1) return "決闘の戦士";
  } else if (cls === "盗賊") {
    if (cs.fleeSuccessCount >= 8) return "影渡り";
    if ((cs.classEventSuccess.rogue + cs.rogueTrapAvoids) >= 6) return "宝探し";
    if (cs.classEventSuccess.rogue >= 1) return "鍵師";
  } else if (cls === "魔導士") {
    if (cs.scrollUseCount >= 6) return "巻物術師";
    if ((cs.classEventSuccess.mage) >= 1) return "賢者";
    if (cs.mageScrollSaves >= 4) return "節約の魔導士";
  }
  return "";
}

  if (runStats) runStats.title = determineTitle();

    let succ = 0.50 + growthLv("罠抜け") * 0.07 + growthLv("目利き") * 0.05;
    succ = Math.min(0.92, succ);
    if (Math.random() < succ) {
      runStats.classEventSuccess.rogue += 1;
      const items = ["ハイポーション", "魔法の巻物", "鋼の剣", "鎖帷子", "エリクサー"];
      const item = choice(items);
      player.inventory.push(item);
      const g = randInt(40, 80) + player.floor * 10;
      addGold(player, g);
      addClassFeatureStat("rogueGoodLoots");
      tell("盗賊の目利き！", "shop");
      tell(`鍵が開いた！ ${item} と ${g}G を入手！`, "gold");
      unlockAch("rogue_lockmaster");
      checkClassEventMaster();
    } else {
      const dmg = randInt(8, 15);
      applyDamage(player, dmg, "鍵師の罠");
      tell(`鍵を間違えた！ 鋭い針が出て ${dmg} のダメージ。`, "danger");
    }
  } else {
    const succ = Math.min(0.95, 0.7 + growthLv("罠抜け") * 0.08);
    if (Math.random() < succ) {
      runStats.classEventSuccess.rogue += 1;
      const item = weightedChoice([["ポーション",0.5],["毒消し草",0.3],["煙玉",0.2]]);
      player.inventory.push(item);
      const g = randInt(15, 30) + player.floor * 3;
      addGold(player, g);
      addClassFeatureStat("rogueTrapAvoids");
      tell("盗賊の勘が働いた！", "shop");
      tell(`罠を外した。${item} と ${g}G を回収。`, "shop");
    } else {
      const dmg = randInt(3, 6);
      applyDamage(player, dmg, "古い罠");
      tell(`罠の解除に失敗。${dmg} のダメージ。`, "danger");
    }
  }
}

function fmtDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function titleScreen() {
  $status.style.display = "none";
  while (true) {
    clearNarrative();
    tellRaw(`
      <div style="text-align:center;border:none;background:transparent;padding:14px 0;">
        <div class="title-logo">Gemini Rogue</div>
        <div class="title-sub">〜 全${FINAL_FLOOR}階の迷宮で魔王ザロスを討て 〜</div>
        <div class="version-tag">${APP_VERSION}</div>
      </div>
    `);
    if (!LS_OK) tell("⚠ ローカル保存が利用できない環境です。セーブと記録は保持されません。", "danger");

    const meta = loadMeta();
    if (meta.shards > 0 || meta.totalShards > 0) {
      tell(`💎 記憶の欠片: ${meta.shards}（累計 ${meta.totalShards}）`, "shop");
    }

    const save = loadSave();
    const hasCleared = hasClearedStory();

    const opts = [{ label: "はじめから", desc: save ? "現在のセーブは破棄される" : "新しい冒険を始める" }];
    if (save) {
      const p = save.player;
      const dl = (p.difficulty && DIFFICULTIES[p.difficulty]) ? DIFFICULTIES[p.difficulty].label : "挑戦";
      const modeTag = (p.mode === "endless") ? "深層" : "本編";
      opts.push({
        label: "続きから",
        desc: `[${modeTag}] ${p.name}(${p.cls}/${dl}) Lv${p.level} B${p.floor}F  保存 ${fmtDate(save.savedAt)}`,
      });
    } else {
      opts.push({ label: "続きから", desc: "セーブデータなし", disabled: true });
    }
    // 深層探索：本編クリア後に解放
    if (hasCleared) {
      opts.push({ label: "🌑 深層探索", desc: "B21Fから果てなき深層へ。死亡まで続く。" });
    } else {
      opts.push({ label: "🔒 深層探索", desc: "本編を1度クリアすると解放", disabled: true });
    }
    opts.push({ label: "冒険記録",   desc: "実績・最高記録を見る" });
    opts.push({ label: "記憶の強化", desc: `欠片で永続強化（所持 ${meta.shards}）` });
    opts.push({ label: "記録を消す", desc: "セーブのみ／全記録を選択" });

    const idx = await ask(opts);
    if (idx === 0) {
      if (save) {
        clearNarrative();
        tellEvent("⚠ 上書き確認", "現在のセーブを破棄して新しい冒険を始める。良いか？", "danger");
        const c = await ask([{ label: "破棄して開始" }, { label: "やめる" }]);
        if (c !== 0) continue;
      }
      const ok = await startNewGame("story");
      if (ok) return "new";
    } else if (idx === 1) {
      const ok = await resumeGame();
      if (ok) return "resume";
    } else if (idx === 2) {
      // 深層探索（未解放時はdisabledなのでここに来ないが、二重チェック）
      if (!hasCleared) continue;
      if (save) {
        clearNarrative();
        tellEvent("⚠ 上書き確認", "現在のセーブを破棄して深層探索を始める。良いか？", "danger");
        const c = await ask([{ label: "破棄して開始" }, { label: "やめる" }]);
        if (c !== 0) continue;
      }
      const ok = await startNewGame("endless");
      if (ok) return "new";
    } else if (idx === 3) {
      await showRecords();
    } else if (idx === 4) {
      await showUpgradeShop();
    } else if (idx === 5) {
      await deleteMenu();
    }
  }
}

async function startNewGame(mode = "story") {
  clearSave();
  // 新規開始時は念のため記憶の商人の一時状態もクリア（前回の出発で消し漏れ対策）
  wipeMemoryMerchant();
  clearNarrative();
  if (mode === "endless") {
    tellEvent("深層探索", "魔王の残響が呼んでいる。光無き深層へ。", "boss");
  }
  tellTitle("主人公の名前を入力");
  const name = (await askText("冒険者")).trim() || "冒険者";
  tellTitle("クラス選択");
  const opts = Object.entries(CLASSES).map(([k, v]) => ({
    label: k,
    desc: `${v.desc}　HP${v.hp}/攻${v.atk}/防${v.defense}/${v.gold}G`,
  }));
  const idx = await ask(opts);
  const cls = Object.keys(CLASSES)[idx];

  // 難易度選択
  tellTitle("難易度選択");
  const dKeys = Object.keys(DIFFICULTIES);
  const dOpts = dKeys.map(k => {
    const d = DIFFICULTIES[k];
    const detail = `敵HP×${d.enemyHP}/敵攻×${d.enemyAtk}/階回復${Math.round(d.floorHeal*100)}%/スコア×${d.scoreMul}`;
    return { label: d.label, desc: `${d.desc}　(${detail})` };
  });
  const dIdx = await ask(dOpts);
  const difficulty = dKeys[dIdx];

  player = newPlayer(name, cls);
  player.difficulty = difficulty;
  player.mode = mode;
  if (mode === "endless") player.floor = 21;
  runStats = newRunStats(mode);
  if (mode === "endless") {
    // 深層は21Fから始まるので、5/10/15F到達ボーナスは既達扱い（不正な+6欠片防止）
    runStats.shardMarks = { 5: true, 10: true, 15: true };
  }
  assignMiniGoal();
  // 強化適用
  applyUpgrades(player);
  // 商人画面中のリロードでも購入済み装備・アイテムを復元できるように先に保存する。
  saveGame();

  // 適用結果を簡潔に通知
  const meta = loadMeta();
  const u = meta.upgrades;
  const upMsgs = [];
  if (u.potion)   upMsgs.push(`旅支度 Lv${u.potion}：ポーション+${u.potion}`);
  if (u.vitality) upMsgs.push(`体力修練 Lv${u.vitality}：最大HP+${u.vitality*5}`);
  if (u.purse)    upMsgs.push(`小銭袋 Lv${u.purse}：所持金+${u.purse*20}G`);
  if (u.amulet)   upMsgs.push("旅の護符：1冒険1回、致命傷をHP1で耐える");

  clearNarrative();
  const intro = (mode === "endless")
    ? `${name}（${cls}）は B21F の深層から這い上がるべく踏み出した。`
    : `${name}（${cls}）は ${DIFFICULTIES[difficulty].label} の迷宮へ向かった。`;
  tellEvent("冒険の始まり", intro);
  if (upMsgs.length) tell("✦ 記憶の強化が発動: " + upMsgs.join(" / "), "shop");
  if (runStats.miniGoal) tell(`ミニ目標: ${runStats.miniGoal.text}（報酬: ${miniGoalRewardText(runStats.miniGoal)}）`, "shop");

  // 記憶の商人（欠片で開始準備を整える機会）— 深層探索でも使える
  await showMemoryMerchant();

  await pause(mode === "endless" ? "深層へ降りる" : "迷宮に入る");
  return true;
}

async function resumeGame() {
  const data = loadSave();
  if (!data) {
    tell("セーブデータが見つからない。", "danger");
    await pause("戻る");
    return false;
  }
  try {
    player   = data.player;
    normalizePlayer(player);
    runStats = normalizeRunStats(data.runStats);
    runStats.mode = player.mode;
    if (typeof player.hp !== "number" || player.hp <= 0) throw new Error("invalid save");
    // 旧セーブ互換：difficultyが無い／未知の値ならchallenge扱い（既存プレイ感維持）
    if (!player.difficulty || !DIFFICULTIES[player.difficulty]) player.difficulty = DEFAULT_DIFFICULTY;
    // 旧セーブで階を進めていた場合、その階の欠片マークを既得扱いにする
    // （retroactive grantはしない＝悪用防止）
    const f = player.floor;
    runStats.shardMarks = runStats.shardMarks || {};
    if (f >= 5  && runStats.shardMarks[5]  === undefined) runStats.shardMarks[5]  = true;
    if (f >= 10 && runStats.shardMarks[10] === undefined) runStats.shardMarks[10] = true;
    if (f >= 15 && runStats.shardMarks[15] === undefined) runStats.shardMarks[15] = true;
    // normalize後の補完済みデータを保存して、次回読込でも整合を保つ
    saveGame();
    // 進行中セーブからの再開では記憶の商人を再表示しないため、一時状態を片付ける。
    wipeMemoryMerchant();
    clearNarrative();
    const dl = DIFFICULTIES[player.difficulty].label;
    tellEvent("冒険の再開", `${player.name}（${player.cls}/${dl}）は B${player.floor}F で目を覚ました。`);
    await pause("続ける");
    return true;
  } catch (e) {
    console.warn("resume failed", e);
    clearSave();
    wipeMemoryMerchant();
    tell("セーブデータが破損していたため初期化した。", "danger");
    await pause("戻る");
    return false;
  }
}

async function showUpgradeShop() {
  while (true) {
    const meta = loadMeta();
    clearNarrative();
    let html = `<div class="endcard">
      <h2>💎 記憶の強化</h2>
      <table>
        <tr><td>所持欠片</td><td class="score">${meta.shards}</td></tr>
        <tr><td>累計獲得</td><td>${meta.totalShards}</td></tr>
      </table>
      <p style="margin-top:6px; font-size:11px; color:var(--dim);">
        死亡しても欠片は失われない。次の冒険までに強化を購入できる。
      </p>
    </div>`;
    tellRaw(html);

    const opts = UPGRADES.map(u => {
      const lv = meta.upgrades[u.id] || 0;
      const maxed = lv >= u.maxLv;
      const cost = maxed ? null : u.costs[lv];
      const lvLabel = `Lv${lv}/${u.maxLv}`;
      const label = `${u.name}  ${lvLabel}${maxed ? "  (最大)" : `  →${cost}欠片`}`;
      const desc  = u.desc;
      const disabled = maxed || meta.shards < cost;
      return { label, desc, disabled };
    });
    opts.push({ label: "戻る" });
    const idx = await ask(opts);
    if (idx === opts.length - 1) return;
    const u = UPGRADES[idx];
    const lv = meta.upgrades[u.id] || 0;
    if (lv >= u.maxLv) continue;
    const cost = u.costs[lv];
    if (meta.shards < cost) continue;
    meta.shards -= cost;
    meta.upgrades[u.id] = lv + 1;
    saveMeta(meta);
    tell(`${u.name} Lv${lv+1} を習得した！（残り欠片 ${meta.shards}）`, "shop");
    await pause("続ける");
  }
}

function countInventory(name) {
  return player && Array.isArray(player.inventory) ? player.inventory.filter(x => x === name).length : 0;
}
function determineRunEvaluation(kind = "loss") {
  if (!runStats || !player) return "探索者";
  if (player.mode === "endless" && player.floor >= 30) return "深層の挑戦者";
  if ((runStats.forgeWeaponCount || 0) + (runStats.forgeArmorCount || 0) >= 3) return "鍛冶好き";
  if ((runStats.scrollUseCount || 0) + (runStats.mageScrollBoosts || 0) >= 3) return "巻物使い";
  if ((runStats.rogueEscapes || 0) >= 3 || (runStats.fleeSuccessCount || 0) >= 3) return "逃げ足の達人";
  if ((runStats.treasureOpens || 0) >= 3 || (runStats.totalGoldGained || 0) >= 600) return "強欲な旅人";
  if ((runStats.defendingTimes || 0) + (runStats.warriorCounters || 0) >= 5) return "慎重な探索者";
  if ((runStats.kills || 0) >= Math.max(5, player.floor - 1) || kind === "win") return "正面突破";
  return "慎重な探索者";
}
function buildReplayLine() {
  if (!player || !runStats) return "";
  const isEndless = player.mode === "endless";
  const stage = isEndless ? "深層" : "迷宮";
  const forged = (runStats.forgeWeaponCount || 0) + (runStats.forgeArmorCount || 0);
  const blessed = (runStats.blessingChoices || []).length;
  const owned = (player.memoryEffects || []);
  // plus7: クラス固有の高シグナル（鍛冶連発/反撃多用/逃走多用等）を先に判定し、
  // 記憶効果は「他に強い成果がない時」のフォールバックに格下げした。
  if ((runStats.eliteKills || 0) >= 3) {
    return `数々の強敵を退け、その足跡は深く刻まれた。`;
  }
  if (player.cls === "戦士") {
    if (forged >= 2) return `戦士は剣を鍛え、${stage}の影に挑んだ。`;
    if ((runStats.warriorCounters || 0) >= 5) return `戦士は反撃を磨き、迫る牙を退けた。`;
    if ((runStats.warriorBossKills || 0) >= 2) return `戦士はボスの首を獲り、勇名を響かせた。`;
    if (blessed >= 3) return `戦士は祝福を重ね、迷宮の試練を越えた。`;
  } else if (player.cls === "盗賊") {
    if ((runStats.rogueEscapes || 0) >= 4 || (runStats.fleeSuccessCount || 0) >= 4)
      return `盗賊は煙に紛れ、危地を幾度もすり抜けた。`;
    if ((runStats.rogueTrapAvoids || 0) >= 3) return `盗賊は罠を避け、宝を抱えて${stage}を駆けた。`;
    if ((runStats.rogueGoodLoots || 0) + (runStats.rogueDiscounts || 0) >= 4)
      return `盗賊は目利きを利かせ、${stage}の値を見抜いた。`;
    if ((runStats.totalGoldGained || 0) >= 600) return `盗賊は金貨を積み上げ、影を渡った。`;
  } else if (player.cls === "魔導士") {
    if ((runStats.scrollUseCount || 0) >= 5) return `魔導士は巻物を解き放ち、敵を焼き尽くした。`;
    if ((runStats.mageScrollSaves || 0) >= 3) return `魔導士は節約の術で、巻物の力を残した。`;
    if ((runStats.mageEventInsights || 0) >= 3) return `魔導士は叡智で${stage}の謎を読み解いた。`;
    if (forged >= 2) return `魔導士は杖を整え、深い記憶へ降りていった。`;
  }
  // クラス固有シグナルなし → 記憶効果の有無で文を変える
  if (owned.length > 0) {
    const def = memoryDef(owned[owned.length - 1]);
    const name = def ? def.name : owned[owned.length - 1];
    if (player.cls === "戦士"   && (owned.includes("counter_strike") || owned.includes("iron_wall")))
      return `戦士は${name}を宿し、${stage}の敵を押し返した。`;
    if (player.cls === "盗賊"   && (owned.includes("merchant_eye")   || owned.includes("swift_flee")))
      return `盗賊は${name}を頼りに、${stage}を駆け抜けた。`;
    if (player.cls === "魔導士" && (owned.includes("incantation")    || owned.includes("insight")))
      return `魔導士は${name}をまとい、${stage}の力を引き出した。`;
    return `${player.cls}は${name}を抱え、${stage}を歩んだ。`;
  }
  // 既定フォールバック
  if (player.cls === "戦士")   return `戦士は剣を握り、B${player.floor}Fまで歩を進めた。`;
  if (player.cls === "盗賊")   return `盗賊は静かに歩み、B${player.floor}Fまで駆けた。`;
  if (player.cls === "魔導士") return `魔導士は呪文を唱え、B${player.floor}Fまで進んだ。`;
  return `${player.name}は${stage}のB${player.floor}Fまで歩んだ。`;
}
function buildDeathHint(kind) {
  if (kind === "win" || !player || !runStats) return "";
  const healing = countInventory("ポーション") + countInventory("ハイポーション") + countInventory("エリクサー");
  if (healing === 0) return "回復手段が尽きていた。";
  if (player.mode === "endless" && (player.armorEnhance || 0) === 0) return "防具強化も検討するとよいかもしれない。";
  if ((player.gold || 0) >= 250) return "GOLDを使い切れなかった。";
  if (countInventory("煙玉") > 0 && !isBossBattleFloor(player.floor)) return "逃走手段を残したまま倒れた。";
  if (isBossBattleFloor(player.floor)) return "ボス戦への備えが不足していたかもしれない。";
  if ((player.weaponEnhance || 0) === 0) return "鍛冶屋で武器を鍛える機会も活かしたい。";
  if (countInventory("毒消し草") === 0 && hasEffect(player, "poison")) return "毒消し草の備えも忘れずに。";
  if ((runStats.blessingChoices || []).length === 0 && player.floor >= 5) return "ボス勝利後の祝福3択も活用したい。";
  return "次は回復と逃走の余裕を残したい。";
}
function classActivityRows() {

function snapshotMiniGoal() {
  const goal = runStats && runStats.miniGoal;
  if (!goal) return null;
  return {
    text: goal.text,
    progress: miniGoalProgress(goal),
    target: goal.target,
    completed: !!(runStats.miniGoalCompleted || goal.completed),
    reward: miniGoalRewardText(goal),

function computeScore(kind) {
  const base = kind === "win"
    ? player.gold + player.level * 100 + player.max_hp * 5
    : player.gold + player.level * 50 + player.floor * 30;
  return Math.floor(base * diffCfg().scoreMul);
}

// plus7: 調整用ランサマリー（?debug=1 のときだけ終了カードから取得できる）
function buildRunSummary(kind, score, reason) {
  if (!player || !runStats) return null;
  const owned = (player.memoryEffects || []).map(id => {
    const def = memoryDef(id); return def ? def.name : id;
  });
  const lootChoices = (runStats.eliteLootChoices || []).map(c => c.label);
  // plus8: 深層調整確認用の数値
  const mul = depthScaleMultipliers(player.floor);
  const milestoneFloors = (runStats && runStats.milestoneFloors)
    ? Object.keys(runStats.milestoneFloors).filter(k => runStats.milestoneFloors[k]).map(Number).sort((a,b)=>a-b)
    : [];
  return {
    version: APP_VERSION,
    mode: player.mode,
    class: player.cls,
    difficulty: player.difficulty,
    result: kind,
    floor: player.floor,
    score,
    kills: runStats.kills || 0,
    bossKills: runStats.warriorBossKills || 0,
    depthBossKills: runStats.depthBossKills || 0,
    eliteEncounters: runStats.eliteEncounters || 0,
    eliteKills: runStats.eliteKills || 0,
    eliteLootCount: runStats.eliteLootCount || 0,
    eliteLootChoices: lootChoices,
    memoryEffects: owned,
    blessingCount: runStats.blessingCount || 0,
    forgeWeaponCount: runStats.forgeWeaponCount || 0,
    forgeArmorCount: runStats.forgeArmorCount || 0,
    forgeGoldSpent: runStats.forgeGoldSpent || 0,
    goldEnd: player.gold || 0,
    miniGoalAchieved: !!(runStats.miniGoalCompleted),
    evaluation: determineRunEvaluation(kind),
    replayLine: buildReplayLine(),
    deathHint: kind === "loss" ? buildDeathHint(kind) : "",
    // 深層調整確認用
    depthScaleHp:  Math.round(mul.hp  * 1000) / 1000,
    depthScaleAtk: Math.round(mul.atk * 1000) / 1000,
    depthMilestoneCount: milestoneFloors.length,
    depthMilestoneFloors: milestoneFloors,
    forgeCap: typeof forgeLimit === "function" ? forgeLimit() : null,
    currentWeaponEnhance: player.weaponEnhance || 0,
    currentArmorEnhance:  player.armorEnhance || 0,
    reason,
    date: new Date().toISOString(),
  };
}

  const hintLine = hint ? `<div class="hint-line">💡 ${escapeHtml(hint)}</div>` : "";
  const adventureBlock = (evalTag || replayLine || hintLine)
    ? `${evalTag}${replayLine}${hintLine}`
    : "";

  return `<div class="endcard">
    <h1 class="${titleClass}">${titleText}</h1>
    <div class="reason">${escapeHtml(reason)}</div>
    <div class="badge-list" style="margin-bottom:8px;">
      <span class="badge">難易度: ${dLabel}</span>
      ${modeTag}
      ${upgradeTag}
    </div>
    <table>
      <tr><td>勇者</td><td>${escapeHtml(player.name)} (${player.cls})</td></tr>
      <tr><td>到達階 / Lv</td><td>B${player.floor}F / Lv${player.level}</td></tr>
      <tr><td>HP</td><td>${player.hp}/${player.max_hp}</td></tr>
      <tr><td>装備</td><td>${escapeHtml(equipLabel("weapon"))} / ${escapeHtml(equipLabel("armor"))}</td></tr>
      <tr><td>所持金</td><td>${player.gold}G</td></tr>
      <tr><td>撃破数</td><td>${runStats.kills}体</td></tr>
      ${depthRow}
      <tr><td>最大ダメージ</td><td>${runStats.maxDamage}</td></tr>
      <tr><td>累計獲得G</td><td>${runStats.totalGoldGained}G</td></tr>
      <tr><td>総合スコア</td><td class="score">${score}</td></tr>
    </table>
    ${adventureBlock}
    ${miniBlock}
    ${memoryBlock}
    ${eliteBlock}
    ${growthBlock}
    ${skillsBlock}
    ${blessingBlock}
    ${forgeBlock}
    ${classEventBlock}
    ${mmBlock}
    ${titleBlock}
    ${shardBlock}
    ${badges}
    <p style="margin-top:14px; font-style:italic; color:var(--dim);">${tagline}</p>
    ${DEBUG_MODE ? `<div id="run-summary-block" style="margin-top:14px; padding:8px 10px; background:rgba(255,212,94,0.05); border:1px dashed #6a4a10; border-radius:8px; text-align:left;">
      <div style="font-size:11px; color:#ffd45e; margin-bottom:4px;">🛠 開発確認用：ランサマリー</div>
      <button id="run-summary-copy" style="font-size:11px; padding:4px 10px; background:#2a1a05; color:#ffd45e; border:1px solid #6a4a10; border-radius:4px;">📋 サマリーを表示＆コピー</button>
      <textarea id="run-summary-text" style="display:none; width:100%; min-height:160px; margin-top:6px; font-size:11px; font-family:monospace; background:#0d0c1a; color:#e6e6f0; border:1px solid #3a3760; border-radius:4px; padding:6px;" readonly></textarea>
    </div>` : ""}
  </div>`;
}

function attachRunSummaryHandler(kind, score, reason) {
  if (!DEBUG_MODE) return;
  const btn = document.getElementById("run-summary-copy");
  const ta  = document.getElementById("run-summary-text");
  if (!btn || !ta) return;
  btn.onclick = () => {
    const summary = buildRunSummary(kind, score, reason);
    const json = JSON.stringify(summary, null, 2);
    ta.value = json;
    ta.style.display = "block";
    console.log("[run summary]", summary);
    // Clipboard API（HTTPS時のみ動作。失敗時は textarea を手動コピー）
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(json).then(
          () => tell("ランサマリーをクリップボードへコピーした。", "shop"),
          () => tell("クリップボードコピー失敗。textarea から手動コピーで。", "dim")
        );
      } else {
        ta.focus(); ta.select();
        tell("textarea を選択した。手動でコピーしてほしい。", "dim");
      }
    } catch (e) {
      ta.focus(); ta.select();
      console.warn("[run summary] clipboard fail", e);
    }
  };
}

function captureNewAchievements(fn) {
  // unlockAch内でshowAchievementToastされる際、新規取得IDを記録するための簡易フック
  const orig = window.showAchievementToast;
  const captured = [];
  window.__newAchIds = captured;
  window.showAchievementToast = function (def) {
    captured.push(def.id);
    return orig.call(this, def);
  };
  try { fn(); } finally {
    window.showAchievementToast = orig;
  }
}

async function ending() {
  // 実績判定（unlockAch内で初回ならshardが+1される）
  captureNewAchievements(() => {
    unlockAch("savior");
    unlockAch({ "戦士": "warrior_clear", "盗賊": "rogue_clear", "魔導士": "mage_clear" }[player.cls]);
    // 標準以上のクリア限定実績
    if (player.difficulty === "normal" || player.difficulty === "challenge") {
      unlockAch({ "戦士": "warrior_clear_standard", "盗賊": "rogue_clear_standard", "魔導士": "mage_clear_standard" }[player.cls]);
    }
    const a = loadAchievements();
    if (a.warrior_clear && a.rogue_clear && a.mage_clear) unlockAch("all_classes");
  });
  // クリア固定ボーナス
  addShardsToRun("クリア達成", 5);
  // 累計欠片をメタへ確定反映
  addShards(runStats.earnedShards || 0);
  // 称号を確定して lastResult に保存できるようにする
  finalizeTitle();
  const reason = `魔王ザロスを討伐し、迷宮の闇を払った。`;
  recordRunResult("win", computeScore("win"), reason);
  clearSave();
  // 開始時商人の状態を念のためクリア（出発時にもクリア済だが二重で安全）
  wipeMemoryMerchant();

  $status.style.display = "none";
  clearNarrative(); clearActions();
  tellRaw(buildEndCard("win", reason));
  attachRunSummaryHandler("win", computeScore("win"), reason);
  $actions.innerHTML = `
    <button class="btn primary" id="btn-restart">もう一度遊ぶ</button>
    <button class="btn small" id="btn-records">冒険記録を見る</button>
  `;
  document.getElementById("btn-restart").onclick = () => location.reload();
  document.getElementById("btn-records").onclick = async () => {
    await showRecords();
    location.reload();
  };
  // メインループから抜けるためにフラグを投げる
  throw new Error("__GAMECLEAR__");
}

async function gameOver() {
  // 死亡時：これまで稼いだ欠片を確定でメタへ反映（クリアボーナスは無し）
  addShards(runStats ? (runStats.earnedShards || 0) : 0);
  finalizeTitle();
  const reason = runStats && runStats.lastDamageSource
    ? `${runStats.lastDamageSource} に倒された。`
    : `力尽きた。`;
  recordRunResult("loss", computeScore("loss"), reason);
  clearSave();
  wipeMemoryMerchant();

  clearNarrative(); clearActions();
  tellRaw(buildEndCard("loss", reason));
  attachRunSummaryHandler("loss", computeScore("loss"), reason);
  $actions.innerHTML = `
    <button class="btn primary" id="btn-restart">もう一度遊ぶ</button>
    <button class="btn small" id="btn-records">冒険記録を見る</button>
  `;
  document.getElementById("btn-restart").onclick = () => location.reload();
  document.getElementById("btn-records").onclick = async () => {
    await showRecords();
    location.reload();
  };
}

// ====================================================================
// メインループ
// ====================================================================
// ====================================================================
// 開発確認用デバッグバー（?debug=1 のときだけ生成）
// 通常プレイには一切表示・影響しない。
// ====================================================================
function initDebugBar() {
  if (!DEBUG_MODE) return;
  const bar = document.createElement("div");
  bar.id = "debug-bar";
  bar.className = "visible";
  bar.innerHTML = `
    <h4>🛠 開発確認用 (?debug=1)</h4>
    <button class="dbg-toggle" id="dbg-toggle">折りたたみ</button>
    <div class="dbg-row" id="dbg-floors">
      <span>floor →</span>
      <button data-floor="5">5</button>
      <button data-floor="10">10</button>
      <button data-floor="15">15</button>
      <button data-floor="20">20</button>
      <button data-floor="21">21</button>
      <button data-floor="25">25</button>
      <button data-floor="30">30</button>
    </div>
    <button id="dbg-gold">+100G</button>
    <button id="dbg-hp">Full HP</button>
    <div class="dbg-row">
      <button id="dbg-pot">+ポーション</button>
      <button id="dbg-smk">+煙玉</button>
      <button id="dbg-scr">+巻物</button>
    </div>
    <button id="dbg-forge" class="dbg-warn">⇒次階で鍛冶屋</button>
    <button id="dbg-bless" class="dbg-warn">⇒次階で祝福3択</button>
    <button id="dbg-mile"  class="dbg-warn">⇒次階で深層節目</button>
    <button id="dbg-elite" class="dbg-warn">⇒次戦闘をエリート化</button>
    <button id="dbg-mem-add">記憶効果を1つ付与</button>
    <button id="dbg-mem-clr">記憶効果クリア</button>
    <button id="dbg-loot"  class="dbg-warn">エリート戦利品3択</button>
    <button id="dbg-status">ステータス出力</button>
  `;
  document.body.appendChild(bar);
  const dlog = (msg) => tell(`[debug] ${msg}`, "shop");
  bar.querySelectorAll("[data-floor]").forEach(b => {
    b.onclick = () => {
      if (!player) { dlog("プレイ中ではない"); return; }
      player.floor = +b.dataset.floor;
      renderStatus();
      dlog(`floor=${player.floor} に変更（次階移行から反映）`);
    };
  });
  document.getElementById("dbg-gold").onclick = () => {
    if (!player) return;
    player.gold += 100;
    renderStatus();
    dlog("+100G");
  };
  document.getElementById("dbg-hp").onclick = () => {
    if (!player) return;
    player.hp = player.max_hp;
    renderStatus();
    dlog("Full HP");
  };
  document.getElementById("dbg-pot").onclick = () => {
    if (!player) return;
    player.inventory.push("ポーション");
    renderStatus();
    dlog("+ポーション");
  };
  document.getElementById("dbg-smk").onclick = () => {
    if (!player) return;
    player.inventory.push("煙玉");
    renderStatus();
    dlog("+煙玉");
  };
  document.getElementById("dbg-scr").onclick = () => {
    if (!player) return;
    player.inventory.push("魔法の巻物");
    renderStatus();
    dlog("+魔法の巻物");
  };
  document.getElementById("dbg-forge").onclick = () => {
    window.__debugQueueEvent = "forge";
    dlog("次イベントを鍛冶屋に置換予約");
  };
  document.getElementById("dbg-bless").onclick = () => {
    window.__debugQueueEvent = "blessing";
    dlog("次イベントを祝福3択に置換予約");
  };
  document.getElementById("dbg-mile").onclick = () => {
    window.__debugQueueEvent = "milestone";
    dlog("次イベントを深層節目に置換予約");
  };
  // plus6
  document.getElementById("dbg-elite").onclick = () => {
    window.__debugForceElite = true;
    dlog("次の通常戦闘をエリートにする予約");
  };
  document.getElementById("dbg-mem-add").onclick = () => {
    if (!player) { dlog("プレイ中ではない"); return; }
    if (!canAddMemory()) { dlog(`記憶効果上限到達 (${(player.memoryEffects||[]).length}/${memoryLimit()})`); return; }
    const owned = player.memoryEffects || [];
    const candidates = MEMORY_EFFECTS.filter(e => owned.indexOf(e.id) < 0);
    if (candidates.length === 0) { dlog("候補がない"); return; }
    const def = candidates[Math.floor(Math.random() * candidates.length)];
    addMemoryEffect(def.id, "debug");
    renderStatus();
  };
  document.getElementById("dbg-mem-clr").onclick = () => {
    if (!player) return;
    player.memoryEffects = [];
    renderStatus();
    dlog("記憶効果をクリア");
  };
  document.getElementById("dbg-loot").onclick = () => {
    window.__debugQueueEvent = "loot";
    dlog("次イベントをエリート戦利品3択に置換予約");
  };
  document.getElementById("dbg-status").onclick = () => {
    if (!player) { dlog("プレイ中ではない"); return; }
    const dump = {
      mode: player.mode, floor: player.floor,
      hp: `${player.hp}/${player.max_hp}`,
      gold: player.gold, atk: pAtk(player), def: pDef(player),
      weapon: equipLabel("weapon"), armor: equipLabel("armor"),
      kills: runStats ? runStats.kills : 0,
      depthBoss: runStats ? runStats.depthBossKills : 0,
      blessings: runStats ? (runStats.blessingChoices || []).length : 0,
      mini: (runStats && runStats.miniGoal) ? `${runStats.miniGoal.text} ${miniGoalProgress()}/${runStats.miniGoal.target}` : "なし",
    };
    dump.memories = (player.memoryEffects || []).map(id => (memoryDef(id) ? memoryDef(id).name : id)).join(",") || "なし";
    dump.elite = runStats ? `遭遇${runStats.eliteEncounters||0} 撃破${runStats.eliteKills||0} 戦利品${runStats.eliteLootCount||0}` : "—";
    console.log("[debug status]", dump);
    dlog(`mode=${dump.mode} F${dump.floor} HP${dump.hp} G${dump.gold} 攻防${dump.atk}/${dump.def}`);
    dlog(`武=${dump.weapon} 防=${dump.armor} 撃破${dump.kills} 深層B${dump.depthBoss} 祝福${dump.blessings}`);
    dlog(`記憶=${dump.memories} エリート=${dump.elite}`);
    dlog(`目標=${dump.mini}`);
  };
  document.getElementById("dbg-toggle").onclick = () => bar.classList.toggle("collapsed");
}
initDebugBar();

async function gameLoop() {
  try {
    await titleScreen();
    while (player.hp > 0) {
      saveGame();          // 各階の開始時に自動セーブ
      checkFloorAchievements();
      renderStatus();

      // ?debug=1 でキュー予約されたイベントは、通常イベントの代わりに1回だけ実行する
      // （ボス階の場合もここで上書きする＝ボス確認も flexible に）
      if (DEBUG_MODE && window.__debugQueueEvent) {
        const ev = window.__debugQueueEvent;
        window.__debugQueueEvent = null;
        try {
          if (ev === "forge") {
            await eventForge();
          } else if (ev === "blessing") {
            await offerBlessingChoice("debug");
          } else if (ev === "milestone") {
            // eventDepthMilestone のガードを避けて中身を直接呼ぶ
            const fns = [
              eventDepthCampfire,
              () => eventForge(0.8, "忘れられた鍛冶場"),
              () => offerMinorDepthBlessing("記憶の分岐路"),
            ];
            await fns[Math.floor(Math.random() * fns.length)]();
          } else if (ev === "loot") {
            // ガードを無視してエリート戦利品3択を強制呼出（plus6 デバッグ）
            const pool = buildEliteLootPool({ elite: "depth" });
            const opts = [];
            while (opts.length < 3 && pool.length > 0) {
              const i = Math.floor(Math.random() * pool.length);
              opts.push(pool.splice(i, 1)[0]);
            }
            if (opts.length > 0) {
              tellEvent("✦ [debug] エリート戦利品", "デバッグ呼出。1つ選べ。", "shop");
              const idx = await ask(opts.map(o => ({ label: o.label })));
              const chosen = opts[idx];
              const result = chosen.apply();
              if (runStats) {
                runStats.eliteLootChoices = runStats.eliteLootChoices || [];
                runStats.eliteLootChoices.push({ id: chosen.id, label: chosen.label, floor: player.floor });
                runStats.eliteLootCount = (runStats.eliteLootCount || 0) + 1;
                if (chosen.isMemory) runStats.eliteLootMemoryCount = (runStats.eliteLootMemoryCount || 0) + 1;
              }
              if (result) tell(result, "gold");
              renderStatus();
            }
          }
        } catch (de) { console.warn("[debug event failed]", de); }
      } else {
      // ボス階判定：本編は BOSS_FLOORS、深層は floor>20 かつ 5の倍数
      const bossFloor = isEndlessMode()
        ? isEndlessBossFloor(player.floor)
        : BOSS_FLOORS.has(player.floor);
      if (bossFloor) {
        await eventBoss();
      } else if (isMilestoneFloor(player.floor) && runStats.milestoneFloors && !runStats.milestoneFloors[player.floor]) {
        // 深層ボス直後の階（31/41/51F…）で節目イベントを1回だけ発火し、通常イベント抽選を置換
        await eventDepthMilestone();
      } else {
        // クラス専用イベント抽選：基礎7%、5階連続未発生で次階は25%（天井方式）
        const classFn = CLASS_EVENT_MAP[player.cls];
        const pity    = (runStats.classEventPity || 0);
        const rate    = (pity >= 5) ? 0.25 : 0.07;
        if (classFn && Math.random() < rate) {
          await classFn();
          runStats.classEventPity = 0;
        } else {
          await pickEvent()();
          if (classFn) runStats.classEventPity = pity + 1;
        }
      }
      }
      // イベント解決直後セーブ：HP/所持金/アイテム/EXP/装備の最新を反映
      if (player.hp > 0) saveGame();
      // クラス成長キューを消化（イベント中にレベルアップした分）
      if (player.hp > 0) await processGrowthQueue();
      if (player.hp > 0 && player.effects.length > 0) {
        for (const msg of tickEffects(player)) tell(msg, "dim");
        renderStatus();
      }
      if (player.hp <= 0) { await gameOver(); return; }

      while (true) {
        const idx = await ask([
          { label: "次の階へ進む" },
          { label: "アイテムを使う", desc: `所持品 ${player.inventory.length} 個` },
        ]);
        if (idx === 0) break;
        await openInventory(false);
      }
      player.floor += 1;

      // === 階移動時の難易度別回復 ===
      const heal_ratio = diffCfg().floorHeal;
      if (heal_ratio > 0) {
        const amt = Math.max(1, Math.floor(player.max_hp * heal_ratio));
        const actually = heal(player, amt);
        if (actually > 0) tell(`新たな階で気力が戻った。HPが ${actually} 回復した。`, "heal");
      }

      // === 階層到達による欠片（一度きり） ===
      const f = player.floor;
      const marks = runStats.shardMarks = runStats.shardMarks || {};
      if (f >= 5  && !marks[5])  { marks[5]  = true; addShardsToRun("B5F到達",  1); tell("✦ 記憶の欠片を1つ得た。", "shop"); }
      if (f >= 10 && !marks[10]) { marks[10] = true; addShardsToRun("B10F到達", 2); tell("✦ 記憶の欠片を2つ得た。", "shop"); }
      if (f >= 15 && !marks[15]) { marks[15] = true; addShardsToRun("B15F到達", 3); tell("✦ 記憶の欠片を3つ得た。", "shop"); }

      renderStatus();
    }
  } catch (e) {
    if (e && e.message === "__GAMECLEAR__") return;
    console.error(e);
    tell("予期せぬエラーが発生したのだ。", "danger");
    throw e;
  }
}

// 起動
gameLoop();
