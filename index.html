<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0c1a">
<title>Gemini Rogue</title>
<style>
*, *::before, *::after { box-sizing: border-box; }
:root {
  --bg: #0d0c1a;
  --bg2: #161528;
  --bg3: #1f1d36;
  --fg: #e6e6f0;
  --dim: #8a89a3;
  --accent: #ffce5e;
  --hp-good: #58d77a;
  --hp-mid: #f0c14b;
  --hp-bad: #ef5a5a;
  --red: #ef5a5a;
  --green: #58d77a;
  --blue: #5fa8ff;
  --magenta: #c879ff;
  --cyan: #5fd7e6;
  --border: #3a3760;
}
html, body {
  margin: 0; padding: 0;
  height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: "Hiragino Sans", "ヒラギノ角ゴシック", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  font-size: 16px;
  line-height: 1.5;
  overscroll-behavior: none;
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
}
button, input {
  -webkit-appearance: none;
  appearance: none;
}
body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
#game {
  display: flex;
  flex-direction: column;
  flex: 1;
  height: 100%;
  min-height: 0;
  max-width: 540px;
  width: 100%;
  margin: 0 auto;
  padding: 8px;
  gap: 8px;
}
.panel {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}
.panel-title {
  font-size: 12px;
  color: var(--dim);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

/* === ステータス === */
#status-panel { flex-shrink: 0; }
.status-grid {
  display: grid;
  grid-template-columns: auto 1fr auto 1fr;
  gap: 4px 10px;
  font-size: 13px;
}
.status-grid .lbl { color: var(--dim); }
.status-grid .val { color: var(--fg); font-weight: 500; }
.hp-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
  grid-column: span 4;
}
.hp-bar > div {
  height: 100%;
  transition: width 0.3s, background-color 0.3s;
}
.effects {
  grid-column: span 4;
  font-size: 11px;
  color: var(--magenta);
  margin-top: 2px;
}
.floor-tag {
  background: var(--accent);
  color: #2a1a00;
  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 12px;
}

/* === ナラティブ === */
#narrative {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: auto;
}
.story {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--cyan);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  white-space: pre-wrap;
  word-break: break-word;
  animation: fadeIn 0.25s ease-out;
}
.story.title { font-size: 12px; color: var(--dim); border-left-color: var(--accent); padding: 6px 12px; }
.story.combat { border-left-color: var(--red); }
.story.victory { border-left-color: var(--green); background: linear-gradient(90deg, rgba(88,215,122,0.15), var(--bg2)); }
.story.danger { border-left-color: var(--red); color: var(--red); }
.story.heal { border-left-color: var(--green); color: var(--green); }
.story.gold { border-left-color: var(--accent); color: var(--accent); }
.story.shop { border-left-color: var(--cyan); color: var(--cyan); }
.story.dim { color: var(--dim); border-left-color: var(--border); }
.story.boss {
  border-left-color: var(--magenta);
  background: linear-gradient(135deg, rgba(200,121,255,0.15), var(--bg2));
  text-align: center;
  font-size: 16px;
}
.story h3 {
  margin: 0 0 4px;
  font-size: 13px;
  color: var(--accent);
  font-weight: 600;
}
/* 末尾の余白で「最後のログ」が中途半端に隠れないようにする */
#narrative::after {
  content: "";
  flex: 0 0 1px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* === 戦闘パネル === */
.combat-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 2px 6px;
  background: var(--bg3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  font-weight: 500;
}
.combat-bar .vs { color: var(--dim); margin: 0 4px; }
.mhp { color: var(--red); }

/* === アクション === */
#actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}
.btn {
  width: 100%;
  min-height: 48px;
  padding: 10px 14px;
  font-size: 15px;
  font-weight: 500;
  font-family: inherit;
  background: var(--bg3);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.05s, background 0.15s;
  text-align: left;
  line-height: 1.35;
  overflow-wrap: anywhere;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}
.btn:active { transform: scale(0.98); background: #2a2745; }
.btn.primary { background: linear-gradient(180deg, #4b3aaf, #38298a); border-color: #5b4ad0; }
.btn.danger  { background: linear-gradient(180deg, #a73a3a, #802a2a); border-color: #d05a5a; }
.btn.small   { min-height: 36px; padding: 6px 10px; font-size: 13px; }
.btn .num { color: var(--accent); margin-right: 8px; font-weight: 700; }
.btn .desc { color: var(--dim); font-size: 11px; margin-top: 2px; display: block; }

input.text-input {
  width: 100%;
  padding: 10px 12px;
  font-size: 16px;
  font-family: inherit;
  background: var(--bg2);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 10px;
  outline: none;
}
input.text-input:focus { border-color: var(--accent); }

/* === タイトル === */
.title-logo {
  font-size: 30px;
  font-weight: 800;
  background: linear-gradient(120deg, var(--accent), var(--magenta));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.title-sub { color: var(--dim); font-size: 13px; }

/* === 終了画面・記録カード === */
.endcard {
  text-align: center;
  padding: 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.endcard h1 {
  margin: 0 0 16px;
  font-size: 26px;
  background: linear-gradient(120deg, var(--accent), var(--magenta));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.endcard h1.dead {
  background: linear-gradient(120deg, var(--red), #ff8a8a);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.endcard h2 {
  margin: 0 0 10px;
  font-size: 18px;
  color: var(--accent);
}
.endcard h3 {
  margin: 14px 0 6px;
  font-size: 13px;
  color: var(--cyan);
  text-align: left;
  letter-spacing: 0.05em;
}
.endcard .reason {
  margin: 6px 0 14px;
  padding: 8px 12px;
  background: var(--bg3);
  border-radius: 8px;
  font-size: 13px;
  color: var(--dim);
}
.endcard table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  table-layout: fixed;
}
.endcard td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  overflow-wrap: anywhere;
  word-break: break-word;
}
.endcard td:first-child { color: var(--dim); text-align: left; width: 38%; }
.endcard td:last-child  { text-align: right; font-weight: 500; }
.endcard tr.ach-row td { padding: 4px 10px; font-size: 12px; }
.score { font-size: 22px; font-weight: 700; color: var(--accent); }
.badge-list {
  display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 8px;
}
.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg3);
  color: var(--accent);
  border: 1px solid var(--border);
}

/* === 実績トースト === */
#toast-container {
  position: fixed;
  top: env(safe-area-inset-top);
  left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: none;
  z-index: 1000;
  padding: 8px;
  gap: 6px;
}
.ach-toast {
  display: flex;
  gap: 10px;
  align-items: center;
  background: linear-gradient(135deg, #ffce5e, #c879ff);
  color: #1a0d2e;
  border-radius: 12px;
  padding: 10px 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.45);
  max-width: 92vw;
  width: 320px;
  opacity: 0;
  transform: translateY(-30px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: auto;
}
.ach-toast.visible { opacity: 1; transform: translateY(0); }
.ach-icon { font-size: 28px; line-height: 1; }
.ach-title { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; opacity: 0.7; }
.ach-name { font-size: 16px; font-weight: 700; line-height: 1.2; }
.ach-desc { font-size: 11px; opacity: 0.85; }

/* iPhone safe-area + scrollbar tidy */
#narrative::-webkit-scrollbar { width: 4px; }
#narrative::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
@media (max-height: 600px) { .title-logo { font-size: 22px; } }
@media (max-width: 430px) {
  #game { padding: 6px; gap: 6px; }
  .panel { border-radius: 8px; padding: 8px 10px; }
  .story { padding: 9px 10px; font-size: 14px; }
  .status-grid { gap: 3px 8px; font-size: 12px; }
  .combat-bar { font-size: 12px; padding: 7px 9px; }
  .btn { min-height: 48px; padding: 10px 12px; font-size: 15px; border-radius: 8px; }
  .btn.small { min-height: 44px; padding: 8px 10px; }
  .endcard { padding: 12px; border-radius: 8px; }
  .endcard h1 { font-size: 22px; }
  .endcard table { font-size: 13px; }
  .endcard td { padding: 6px 6px; }
  .endcard td:first-child { width: 34%; }
  .score { font-size: 20px; }
}
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="game">
  <div id="status-panel" class="panel" style="display:none;">
    <div class="panel-title"><span class="floor-tag" id="floor-tag">B1F</span> &nbsp; <span id="char-summary"></span></div>
    <div class="status-grid" id="status-grid"></div>
  </div>
  <div id="narrative"></div>
  <div id="actions"></div>
</div>

<script>

const MONSTERS = {
  "スライム":     { name: "スライム",     hp: 12, atk:  4, defense: 1, exp:  6, gold:  5, drops: [["ポーション", 0.15]],                                flavor: "ぷるぷる震える青い塊。", tags: [] },
  "コウモリ":     { name: "コウモリ",     hp:  8, atk:  5, defense: 0, exp:  5, gold:  4, drops: [["毒消し草", 0.10]],                                  flavor: "鋭い爪で襲いかかってくる。", tags: [] },
  "ゴブリン":     { name: "ゴブリン",     hp: 18, atk:  7, defense: 2, exp: 10, gold: 12, drops: [["木の棒", 0.08], ["ポーション", 0.10]],              flavor: "緑色の小鬼。下卑た笑みを浮かべる。", tags: [] },

  "トロル":       { name: "トロル",       hp: 55, atk: 16, defense: 6, exp: 35, gold: 45, drops: [["ハイポーション", 0.20], ["鎖帷子", 0.05]],          flavor: "再生する皮膚を持つ巨人。", tags: [] },

  "ダークエルフ": { name: "ダークエルフ", hp: 45, atk: 20, defense: 5, exp: 38, gold: 55, drops: [["魔法の巻物", 0.15], ["鋼の剣", 0.04]],              flavor: "影に紛れる弓使い。", tags: [] },

// === 難易度 ===

// === 記憶の商人 ===
// 武器・防具・消耗品・特殊枠の候補プール。weight は抽選確率の重み。
// allowRare(竜殺しの槍/聖なる鎧) は 初回クリア後 or 挑戦難易度のみ低確率で混入。
// allowSage(賢者の石) は 初回クリア後のみ低確率で混入。

  { slot: "weapon", item: "鉄の剣",     cost: 2, weight: 5 },

const MM_ARMORS = [
  { slot: "armor", item: "鎖帷子",     cost: 2, weight: 5 },

const SAVE_VERSION = 1;
const SAVE_KEY    = `gemini-rogue:save:v${SAVE_VERSION}`;
const RECORDS_KEY = `gemini-rogue:records:v${SAVE_VERSION}`;
const ACH_KEY     = `gemini-rogue:achievements:v${SAVE_VERSION}`;
const META_KEY    = `gemini-rogue:meta:v${SAVE_VERSION}`;

function lsAvailable() {
  try {
    const k = "__gr_test__";
    localStorage.setItem(k, "1");
    localStorage.removeItem(k);
    return true;
  } catch { return false; }
}
const LS_OK = lsAvailable();

function loadJSON(key, fallback) {
  if (!LS_OK) return fallback;
  try {
    const raw = localStorage.getItem(key);
    if (raw == null) return fallback;
    const v = JSON.parse(raw);
    if (v == null) return fallback;
    return v;
  } catch (e) {
    console.warn("[storage] load failed:", key, e);
    try { localStorage.removeItem(key); } catch {}
    return fallback;
  }
}
function saveJSON(key, value) {
  if (!LS_OK) return;
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.warn("[storage] save failed:", key, e); }
}
function removeKey(key) {
  if (!LS_OK) return;
  try { localStorage.removeItem(key); } catch {}
}

// ---- セーブデータ ----
function saveGame() {
  if (!player || player.hp <= 0) return;
  if (runStats) runStats.mode = player.mode || "story";
  saveJSON(SAVE_KEY, {
    version: SAVE_VERSION,
    player: player,
    runStats: runStats,
    savedAt: Date.now(),
  });
}
function loadSave() {
  const data = loadJSON(SAVE_KEY, null);
  if (!data || data.version !== SAVE_VERSION || !data.player || typeof data.player.hp !== "number") {
    if (data) removeKey(SAVE_KEY);
    return null;
  }
  return data;
}
function hasSave()   { return !!loadSave(); }
function clearSave() { removeKey(SAVE_KEY); }

const DEFAULT_RECORDS = {
  highestFloor: 0,
  highestScore: 0,
  clears: 0,
  deaths: 0,
  classBest:   { "戦士": 0, "盗賊": 0, "魔導士": 0 },
  classClears: { "戦士": 0, "盗賊": 0, "魔導士": 0 },
  byDiff: {
    story:     { highestFloor: 0, highestScore: 0, clears: 0, deaths: 0 },
    normal:    { highestFloor: 0, highestScore: 0, clears: 0, deaths: 0 },
    challenge: { highestFloor: 0, highestScore: 0, clears: 0, deaths: 0 },
  },
  // 深層探索 専用記録（本編記録とは混ざらない）
  endlessBestFloor:     0,
  endlessBestScore:     0,
  endlessBestKills:     0,
  endlessBestBossKills: 0,
  endlessBestByClass:   { "戦士": 0, "盗賊": 0, "魔導士": 0 },
  endlessBestByDifficulty: {
    story:     { highestFloor: 0, highestScore: 0, runs: 0, deaths: 0 },
    normal:    { highestFloor: 0, highestScore: 0, runs: 0, deaths: 0 },
    challenge: { highestFloor: 0, highestScore: 0, runs: 0, deaths: 0 },
  },
  endlessRuns:          0,
  endlessDeaths:        0,
  endlessLastResult:    null,
  lastResult: null,
};
function loadRecords() {
  const r = loadJSON(RECORDS_KEY, null);
  const def = JSON.parse(JSON.stringify(DEFAULT_RECORDS));
  if (!r || typeof r !== "object") return def;
  const merged = {
    ...def,
    ...r,
    classBest:   { ...def.classBest,   ...(r.classBest   || {}) },
    classClears: { ...def.classClears, ...(r.classClears || {}) },
    byDiff: {
      story:     { ...def.byDiff.story,     ...((r.byDiff && r.byDiff.story)     || {}) },
      normal:    { ...def.byDiff.normal,    ...((r.byDiff && r.byDiff.normal)    || {}) },
      challenge: { ...def.byDiff.challenge, ...((r.byDiff && r.byDiff.challenge) || {}) },
    },
    endlessBestByClass: { ...def.endlessBestByClass, ...(r.endlessBestByClass || {}) },
    endlessBestByDifficulty: {
      story:     { ...def.endlessBestByDifficulty.story,     ...((r.endlessBestByDifficulty && r.endlessBestByDifficulty.story)     || {}) },
      normal:    { ...def.endlessBestByDifficulty.normal,    ...((r.endlessBestByDifficulty && r.endlessBestByDifficulty.normal)    || {}) },
      challenge: { ...def.endlessBestByDifficulty.challenge, ...((r.endlessBestByDifficulty && r.endlessBestByDifficulty.challenge) || {}) },
    },
  };
  return merged;
}
function saveRecords(r) { saveJSON(RECORDS_KEY, r); }
function hasClearedStory() {
  const r = loadRecords();
  const a = loadAchievements();
  return (r.clears || 0) > 0 || !!a.savior;
}

function recordRunResult(kind, score, reason) {
  const r = loadRecords();
  const fl  = (player && player.floor) || 1;
  const cls = (player && player.cls)   || "戦士";
  const diff = (player && player.difficulty && DIFFICULTIES[player.difficulty]) ? player.difficulty : DEFAULT_DIFFICULTY;
  const isEndless = (player && player.mode === "endless");

  // 強化フラグ
  const meta = loadMeta();
  const hasUpgrades = Object.values(meta.upgrades).some(v => v > 0);

  // 共通の lastResult ペイロード
  const payload = {
    kind, reason: reason || "",
    name: player.name, cls, difficulty: diff, mode: player.mode || "story",
    floor: fl, level: player.level, score,
    kills:     runStats ? runStats.kills           : 0,
    maxDamage: runStats ? runStats.maxDamage       : 0,
    gold:      runStats ? runStats.totalGoldGained : 0,
    earnedShards: runStats ? (runStats.earnedShards || 0) : 0,
    title:     runStats ? (runStats.title || "")   : "",
    depthBossKills: runStats ? (runStats.depthBossKills || 0) : 0,
    classEventSuccess: runStats ? (runStats.classEventSuccess || {warrior:0,rogue:0,mage:0}) : {warrior:0,rogue:0,mage:0},
    growthSummary: (player.classUpgrades && Object.keys(player.classUpgrades).length > 0)
      ? Object.entries(player.classUpgrades).map(([k,v]) => `${k} Lv${v}`).join(" / ") : "",
    memoryMerchantPurchases: runStats ? (runStats.memoryMerchantPurchases || []) : [],
    hasUpgrades,
    weapon: player.weapon, armor: player.armor,
    date: Date.now(),
  };

  if (isEndless) {
    // 深層探索専用集計（本編記録は触らない）
    if (fl > (r.endlessBestFloor || 0)) r.endlessBestFloor = fl;
    if (score > (r.endlessBestScore || 0)) r.endlessBestScore = score;
    const k = runStats ? runStats.kills : 0;
    if (k > (r.endlessBestKills || 0)) r.endlessBestKills = k;
    const bk = runStats ? (runStats.depthBossKills || 0) : 0;
    if (bk > (r.endlessBestBossKills || 0)) r.endlessBestBossKills = bk;
    if (fl > (r.endlessBestByClass[cls] || 0)) r.endlessBestByClass[cls] = fl;
    const ebd = r.endlessBestByDifficulty[diff];
    if (ebd) {
      if (fl > ebd.highestFloor) ebd.highestFloor = fl;
      if (score > ebd.highestScore) ebd.highestScore = score;
      ebd.runs = (ebd.runs || 0) + 1;
      if (kind === "loss") ebd.deaths = (ebd.deaths || 0) + 1;
    }
    r.endlessRuns = (r.endlessRuns || 0) + 1;
    if (kind === "loss") r.endlessDeaths = (r.endlessDeaths || 0) + 1;
    r.endlessLastResult = payload;
  } else {
    // 本編記録
    if (fl > r.highestFloor) r.highestFloor = fl;
    if (score > r.highestScore) r.highestScore = score;
    if (fl > (r.classBest[cls] || 0)) r.classBest[cls] = fl;
    if (kind === "win") {
      r.clears += 1;
      r.classClears[cls] = (r.classClears[cls] || 0) + 1;
    } else {
      r.deaths += 1;
    }
    const bd = r.byDiff[diff];
    if (bd) {
      if (fl > bd.highestFloor) bd.highestFloor = fl;
      if (score > bd.highestScore) bd.highestScore = score;
      if (kind === "win") bd.clears += 1; else bd.deaths += 1;
    }
    r.lastResult = payload;
  }

  saveRecords(r);
  return r;
}

// ---- メタプログレッション（記憶の欠片＆強化）----
const DEFAULT_META = {
  shards: 0,
  totalShards: 0,
  upgrades: { potion: 0, vitality: 0, purse: 0, amulet: 0 },
  memoryMerchant: {
    currentStock: [],     // 一時の在庫
    rerolled: false,      // 1冒険1回までのリロール使用フラグ
    purchasedCount: 0,    // 0..2
    purchasedGear: false, // 武器・防具を1つ買ったか
    purchasedItems: [],   // 再ロード時に再適用するための購入履歴
  },
};
function loadMeta() {
  const m = loadJSON(META_KEY, null);
  const def = JSON.parse(JSON.stringify(DEFAULT_META));
  if (!m || typeof m !== "object") return def;
  const mm = (m.memoryMerchant && typeof m.memoryMerchant === "object") ? m.memoryMerchant : {};
  return {
    ...def,
    ...m,
    upgrades: { ...def.upgrades, ...(m.upgrades || {}) },
    memoryMerchant: {
      ...def.memoryMerchant,
      ...mm,
      currentStock:   Array.isArray(mm.currentStock)   ? mm.currentStock   : [],
      purchasedItems: Array.isArray(mm.purchasedItems) ? mm.purchasedItems : [],
    },
  };
}
function saveMeta(m) { saveJSON(META_KEY, m); }
function addShards(amount) {
  if (amount <= 0) return;
  const m = loadMeta();
  m.shards += amount;
  m.totalShards += amount;
  saveMeta(m);
}

}

let runStats = null;
function newRunStats(mode = "story") {
  return {
    mode: mode === "endless" ? "endless" : "story",
    kills: 0, maxDamage: 0, totalGoldGained: 0, lastDamageSource: "",
    // クラス特技の発動回数（旧セーブ互換のため normalizeRunStats で補完）
    warriorCounters: 0,
    rogueTrapAvoids: 0,
    mageScrollSaves: 0,
    // メタプログレッション関連（今回の冒険で稼いだ欠片）
    earnedShards: 0,
    shardLog: [],          // [{reason, amount}]
    shardMarks: {},        // {5:true,10:true,15:true} 一度きり付与の管理
    amuletAvailable: false,// 旅の護符をこの冒険でまだ使えるか
    classEventPity: 0,     // クラス専用イベント未発生階の連続数（5で次階発生率UP）
    // 記憶の商人 関連（1冒険分のみ）
    memoryMerchantPurchases: [], // [{item, qty, cost}]
    merchantIntroAvailable: false, // 商人の紹介状: 次の通常商人で初購入10%引き
    // 深層探索モード関連
    depthBossKills: 0, // この冒険で撃破した深層ボス数
    // クラス別追加トラッカ
    pendingGrowth: [],                // 未消化のクラス成長選択 [3,5,...]
    classGrowthChoices: [],           // [{level, id}] 終了画面表示用
    classEventSeen:    { warrior: 0, rogue: 0, mage: 0 },
    classEventSuccess: { warrior: 0, rogue: 0, mage: 0 },
    equipmentSynergyTriggers: 0,
    title: "",
    // 称号判定用カウンタ
    defendingTimes: 0,
    fleeSuccessCount: 0,
    scrollUseCount: 0,
  };
}
// 旧フォーマットのrunStatsを安全に正規化する。古いキーは温存しつつ
// 不足しているフィールドだけ追加する。
function normalizeRunStats(rs) {
  const base = newRunStats();
  if (!rs || typeof rs !== "object") return base;
  const out = Object.assign(base, rs);
  if (!Array.isArray(out.shardLog)) out.shardLog = [];
  if (!out.shardMarks || typeof out.shardMarks !== "object") out.shardMarks = {};
  if (!Array.isArray(out.pendingGrowth)) out.pendingGrowth = [];
  if (!Array.isArray(out.classGrowthChoices)) out.classGrowthChoices = [];
  if (!out.classEventSeen    || typeof out.classEventSeen    !== "object") out.classEventSeen    = { warrior: 0, rogue: 0, mage: 0 };
  if (!out.classEventSuccess || typeof out.classEventSuccess !== "object") out.classEventSuccess = { warrior: 0, rogue: 0, mage: 0 };
  // 旧フィールドを温存しつつ、新キーが欠けてれば0で埋める
  ["warrior","rogue","mage"].forEach(k => {
    if (typeof out.classEventSeen[k]    !== "number") out.classEventSeen[k]    = 0;
    if (typeof out.classEventSuccess[k] !== "number") out.classEventSuccess[k] = 0;
  });
  if (typeof out.equipmentSynergyTriggers !== "number") out.equipmentSynergyTriggers = 0;
  if (typeof out.title !== "string") out.title = "";
  if (typeof out.defendingTimes  !== "number") out.defendingTimes  = 0;
  if (typeof out.fleeSuccessCount!== "number") out.fleeSuccessCount = 0;
  if (typeof out.scrollUseCount  !== "number") out.scrollUseCount  = 0;
  if (typeof out.classEventPity  !== "number") out.classEventPity  = 0;
  if (!Array.isArray(out.memoryMerchantPurchases)) out.memoryMerchantPurchases = [];
  if (typeof out.merchantIntroAvailable !== "boolean") out.merchantIntroAvailable = false;
  if (typeof out.depthBossKills !== "number") out.depthBossKills = 0;
  if (out.mode !== "story" && out.mode !== "endless") {
    out.mode = (player && (player.mode === "story" || player.mode === "endless")) ? player.mode : "story";
  }
  return out;
}
// player に classUpgrades / mode を補完
function normalizePlayer(p) {
  if (!p || typeof p !== "object") return p;
  if (!p.classUpgrades || typeof p.classUpgrades !== "object") p.classUpgrades = {};
  // 旧セーブで mode が無ければ "story"。本編20F煙玉バグで進めた状態でも story 扱い維持。
  if (p.mode !== "story" && p.mode !== "endless") p.mode = "story";
  return p;
}
// 現在のクラス成長Lvを返す
function growthLv(id) {
  return (player && player.classUpgrades && player.classUpgrades[id]) || 0;
}
// 1冒険分の欠片獲得をログに残しつつ runStats に積む
function addShardsToRun(reason, amount) {
  if (!runStats || amount <= 0) return;
  runStats.earnedShards = (runStats.earnedShards || 0) + amount;
  runStats.shardLog = runStats.shardLog || [];
  runStats.shardLog.push({ reason, amount });
}
function setLastDamage(src) { if (runStats && src) runStats.lastDamageSource = src; }
function trackKill() {
  if (!runStats) return;
  runStats.kills += 1;
  if (runStats.kills === 1) unlockAch("first_blood");
  if (runStats.kills >= 30) unlockAch("slayer");
}
function trackDamageDealt(d) {
  if (!runStats) return;
  if (d > runStats.maxDamage) runStats.maxDamage = d;
  if (d >= 50) unlockAch("berserker");
}
function trackGoldGain(g) {
  if (!runStats || g <= 0) return;
  runStats.totalGoldGained += g;
  if (runStats.totalGoldGained >= 1000) unlockAch("rich");
}

// ====================================================================
// ヘルパ
// ====================================================================
const rand    = (n) => Math.floor(Math.random() * n);
const randInt = (a, b) => a + rand(b - a + 1);
const choice  = (arr) => arr[rand(arr.length)];
function weightedChoice(pairs) {
  const total = pairs.reduce((s, p) => s + p[1], 0);
  let r = Math.random() * total;
  for (const [v, w] of pairs) { r -= w; if (r <= 0) return v; }
  return pairs[pairs.length - 1][0];
}
function floorTier(f) {
  if (f <= 3)  return 1;
  if (f <= 6)  return 2;
  if (f <= 9)  return 3;
  if (f <= 14) return 4;
  return 5;
}
function bossFor(f) { return ({ 5: "スライム王", 10: "ゴブリン将軍", 15: "古龍", 20: "魔王ザロス" })[f]; }
function currentDifficulty() {
  const d = (player && player.difficulty) || DEFAULT_DIFFICULTY;
  return DIFFICULTIES[d] ? d : DEFAULT_DIFFICULTY;
}
function diffCfg() { return DIFFICULTIES[currentDifficulty()]; }

// === 深層探索モード ===
function isEndlessMode() { return player && player.mode === "endless"; }
function isEndlessBossFloor(f) { return f > 20 && (f % 5) === 0; }
function isBossBattleFloor(f) {
  return isEndlessMode() ? isEndlessBossFloor(f) : BOSS_FLOORS.has(f);
}
// 深層ボスは既存4ボスをローテーション。階に応じて表示名を変える。
const DEPTH_BOSS_ROTATION = ["スライム王", "ゴブリン将軍", "古龍", "魔王ザロス"];
const DEPTH_BOSS_NAMES = {
  "スライム王":   "深淵のスライム王",
  "ゴブリン将軍": "亡霊ゴブリン将軍",
  "古龍":         "腐敗した古龍",
  "魔王ザロス":   "魔王の残響",
};
function depthBossKeyFor(floor) {
  // 25→0, 30→1, 35→2, 40→3, 45→0,...
  const i = Math.floor((floor - 25) / 5) % DEPTH_BOSS_ROTATION.length;
  return DEPTH_BOSS_ROTATION[(i + DEPTH_BOSS_ROTATION.length) % DEPTH_BOSS_ROTATION.length];
}
function scaleMonsterForDepth(m, floor, mode) {
  if (mode !== "endless" || floor <= 20) return m;
  const depth = floor - 20;
  m.hp  = Math.max(1, Math.floor(m.hp  * (1 + depth * 0.06)));
  m.atk = Math.max(1, Math.floor(m.atk * (1 + depth * 0.04)));
  m.defense += Math.floor(floor / 10);
  m.exp  = Math.max(1, Math.floor(m.exp  * (1 + depth * 0.05)));
  m.gold = Math.max(1, Math.floor(m.gold * (1 + depth * 0.05)));
  return m;
}
function makeEndlessBoss(floor) {
  const bossKey = depthBossKeyFor(floor);
  const m = makeMonster(bossKey);
  if (DEPTH_BOSS_NAMES[bossKey]) m.name = DEPTH_BOSS_NAMES[bossKey];
  return m;
}

function makeMonster(name) {
  const m = JSON.parse(JSON.stringify(MONSTERS[name]));
  const d = diffCfg();
  m.hp  = Math.max(1, Math.floor(m.hp  * d.enemyHP));
  m.atk = Math.max(1, Math.floor(m.atk * d.enemyAtk));
  // 深層モード時は階層に応じた追加スケール
  if (player && player.mode === "endless") {
    scaleMonsterForDepth(m, player.floor, "endless");
  }
  return m;
}

// ====================================================================
// プレイヤー
// ====================================================================
function newPlayer(name, cls) {
  const c = CLASSES[cls];
  const p = {
    name, cls,
    mode: "story",          // "story" | "endless"
    level: 1, exp: 0, floor: 1,
    hp: c.hp, max_hp: c.hp,
    base_atk: c.atk, base_def: c.defense,
    gold: c.gold,
    inventory: [...c.start],
    weapon: null, armor: null,
    effects: [],
    classUpgrades: {},      // {鉄壁:N, 反撃術:N, ...} 取得済みLv
  };
  for (const it of [...p.inventory]) {
    const info = ITEMS[it];
    if (info.category === "weapon" && !p.weapon) {
      p.weapon = it; p.inventory.splice(p.inventory.indexOf(it), 1);
    } else if (info.category === "armor" && !p.armor) {
      p.armor = it;  p.inventory.splice(p.inventory.indexOf(it), 1);
    }
  }
  return p;
}
function pAtk(p) {
  let a = p.base_atk + (p.weapon ? ITEMS[p.weapon].atk : 0);
  for (const e of p.effects) if (e.name === "buff_atk") a += e.power;
  return a;
}
function pDef(p) {
  let d = p.base_def + (p.armor ? ITEMS[p.armor].defense : 0);
  for (const e of p.effects) if (e.name === "buff_def") d += e.power;
  return d;
}
function hasEffect(p, name) { return p.effects.some(e => e.name === name); }
function addEffect(p, name, turns, power = 0) {
  const ex = p.effects.find(e => e.name === name);
  if (ex) { ex.turns = Math.max(ex.turns, turns); ex.power = Math.max(ex.power, power); return; }
  p.effects.push({ name, turns, power });
}
function tickEffects(p) {
  const msgs = [];
  const surv = [];
  for (const e of p.effects) {
    if (e.name === "poison") {
      if (p.armor === "聖なる鎧") { msgs.push("聖なる鎧が毒を浄化した。"); continue; }
      applyDamage(p, 2, "毒");
      msgs.push("毒で2のダメージ。");
    }
    e.turns -= 1;
    if (e.turns > 0) surv.push(e);
    else msgs.push(`[${effLabel(e.name)}]の効果が切れた。`);
  }
  p.effects = surv;
  if (p.hp < 0) p.hp = 0;
  return msgs;
}
function effLabel(n) { return ({ poison: "毒", buff_atk: "攻↑", buff_def: "防↑" })[n] || n; }
function needExp(p) { return p.level * 20 + (p.level - 1) * 5; }
function gainExp(p, exp) {
  const msgs = [];
  p.exp += exp;
  while (p.exp >= needExp(p)) {
    p.exp -= needExp(p);
    p.level += 1;
    p.max_hp += 8;
    p.hp = p.max_hp;
    p.base_atk += 2;
    p.base_def += 1;
    msgs.push(`★ レベルアップ！ Lv${p.level} (HP+8 / 攻+2 / 防+1)`);
    if (p.level >= 10) unlockAch("level_master");
    // クラス成長選択をキューに積む（メインループでawait消化）
    if (GROWTH_TRIGGER_LEVELS.indexOf(p.level) >= 0 && runStats) {
      runStats.pendingGrowth = runStats.pendingGrowth || [];
      runStats.pendingGrowth.push(p.level);
    }
  }
  return msgs;
}
function heal(p, amt) {
  const before = p.hp;
  p.hp = Math.min(p.max_hp, p.hp + amt);
  return p.hp - before;
}
function addGold(p, g) {
  if (g <= 0) return;
  p.gold += g;
  trackGoldGain(g);
}

// ---- ダメージ適用（旅の護符チェックを集約） ----
// すべての player 側ダメージを必ずこの関数経由にすることで、
// 1冒険1回の致命傷耐えロジックを副作用なく差し込める。
function applyDamage(p, amount, source) {
  if (amount <= 0) return 0;
  if (source) setLastDamage(source);
  // 旅の護符：致命傷を1回だけHP1で耐える
  if (p === player && runStats && runStats.amuletAvailable && (p.hp - amount) <= 0) {
    p.hp = 1;
    runStats.amuletAvailable = false;
    tell("✦ 旅の護符が砕け散った！ HP1で踏みとどまった。", "heal");
    return amount;
  }
  p.hp = Math.max(0, p.hp - amount);
  return amount;
}

// ---- 強化適用（新規開始時に1度だけ呼ぶ） ----
function applyUpgrades(p) {
  const meta = loadMeta();
  const u = meta.upgrades;
  // 旅支度
  for (let i = 0; i < (u.potion || 0); i++) p.inventory.push("ポーション");
  // 体力修練
  const hpb = (u.vitality || 0) * 5;
  if (hpb > 0) { p.max_hp += hpb; p.hp += hpb; }
  // 小銭袋
  if ((u.purse || 0) > 0) p.gold += (u.purse || 0) * 20;
  // 旅の護符はrunStatsで管理
  if (runStats) runStats.amuletAvailable = (u.amulet || 0) > 0;
}

// ---- クラス補正ヘルパ ----
const ROGUE_BUY_RATE  = 0.9;   // 仕入れ -10%
const ROGUE_SELL_RATE = 1.1;   // 売値 +10%
function buyPrice(item) {
  const base = ITEMS[item].price;
  let mult = 1.0;
  if (player && player.cls === "盗賊") mult *= ROGUE_BUY_RATE;
  // 商人の紹介状：通常商人で初購入だけ10%引き
  if (runStats && runStats.merchantIntroAvailable) mult *= 0.9;
  // 紹介状＋盗賊で重なっても最低70%まで
  if (mult < 0.70) mult = 0.70;
  return Math.max(1, Math.floor(base * mult));
}
function sellPrice(item) {
  const base = Math.floor(ITEMS[item].price / 2);
  if (player && player.cls === "盗賊") return Math.floor(base * ROGUE_SELL_RATE);
  return base;
}

const $status      = document.getElementById("status-panel");
const $statusGrid  = document.getElementById("status-grid");
const $charSummary = document.getElementById("char-summary");
const $floorTag    = document.getElementById("floor-tag");
const $narrative   = document.getElementById("narrative");
const $actions     = document.getElementById("actions");
const $toastWrap   = document.getElementById("toast-container");

let player = null;

function renderStatus() {
  if (!player) { $status.style.display = "none"; return; }
  $status.style.display = "";
  $floorTag.textContent = `B${player.floor}F`;
  $charSummary.textContent = `${player.name} (${player.cls}) Lv${player.level}`;

  const hpRatio = player.hp / player.max_hp;
  const hpColor = hpRatio > 0.5 ? "var(--hp-good)" : hpRatio > 0.25 ? "var(--hp-mid)" : "var(--hp-bad)";

  const fx = player.effects.length
    ? `<div class="effects">状態: ${player.effects.map(e => `${effLabel(e.name)}(${e.turns})`).join(", ")}</div>`

  $statusGrid.innerHTML = `

    <span class="lbl">EXP</span><span class="val">${player.exp}/${needExp(player)}</span>
    <span class="lbl">攻/防</span><span class="val">${pAtk(player)} / ${pDef(player)}</span>
    <span class="lbl">所持金</span><span class="val" style="color:var(--accent)">${player.gold}G</span>
    <span class="lbl">武器</span><span class="val">${player.weapon || "なし"}</span>
    <span class="lbl">防具</span><span class="val">${player.armor || "なし"}</span>
    <span class="lbl">所持品</span><span class="val" style="grid-column: span 3; font-size:11px;">${player.inventory.length ? compactInv(player.inventory) : "空"}</span>
    <div class="hp-bar"><div style="width:${hpRatio*100}%; background:${hpColor};"></div></div>
    ${fx}
  `;
}
function compactInv(inv) {
  const counts = {};
  for (const it of inv) counts[it] = (counts[it] || 0) + 1;
  return Object.entries(counts).map(([k, v]) => v > 1 ? `${k}×${v}` : k).join(", ");
}

function clearNarrative() { $narrative.innerHTML = ""; }

// iOS Safariでも確実に最下部までスクロールするための関数。
// rAFを2段重ねしレイアウト確定後にscrollTopを更新、
// さらにsetTimeoutで保険をかける。
function scrollNarrativeToBottom() {
  const go = () => { $narrative.scrollTop = $narrative.scrollHeight + 9999; };
  go();
  requestAnimationFrame(() => {
    go();
    requestAnimationFrame(go);
  });
  setTimeout(go, 80);
  setTimeout(go, 200);
}

function tellRaw(html, cls = "") {
  const div = document.createElement("div");
  div.className = "story " + cls;
  div.innerHTML = html;
  $narrative.appendChild(div);
  while ($narrative.children.length > 60) $narrative.removeChild($narrative.firstChild);
  scrollNarrativeToBottom();
}
function tell(text, cls = "") { tellRaw(escapeHtml(text), cls); }
function tellTitle(t)         { tellRaw(escapeHtml(t), "title"); }
function tellEvent(title, body, cls = "") {
  tellRaw(`<h3>${escapeHtml(title)}</h3>${escapeHtml(body)}`, cls);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]);
}

function setActions(html) { $actions.innerHTML = html; }
function clearActions()   { $actions.innerHTML = ""; }

function ask(options, opts = {}) {
  return new Promise(resolve => {
    const cls = opts.danger ? "danger" : "";
    $actions.innerHTML = options.map((o, i) => {
      const label = typeof o === "string" ? o : o.label;
      const desc  = typeof o === "object" && o.desc ? `<span class="desc">${escapeHtml(o.desc)}</span>` : "";
      const dis   = typeof o === "object" && o.disabled ? "disabled style='opacity:0.4;'" : "";
      return `<button class="btn ${cls}" data-i="${i}" ${dis}><span class="num">${i+1}</span>${escapeHtml(label)}${desc}</button>`;
    }).join("");
    $actions.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => {
        if (b.hasAttribute("disabled")) return;
        clearActions();
        resolve(parseInt(b.dataset.i, 10));
      }, { once: true });
    });
    // 行動表示直後にも最下部へスクロール（行動が画面外にあると気づかれない対策）
    scrollNarrativeToBottom();
  });
}

function askText(placeholder = "") {
  return new Promise(resolve => {
    $actions.innerHTML = `
      <input class="text-input" id="ti" placeholder="${escapeHtml(placeholder)}" autocomplete="off">
      <button class="btn primary" id="ti-ok">決定</button>
    `;
    const inp = document.getElementById("ti");
    const ok  = document.getElementById("ti-ok");
    inp.focus();
    const submit = () => { const v = inp.value; clearActions(); resolve(v); };
    ok.addEventListener("click", submit, { once: true });
    inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    scrollNarrativeToBottom();
  });
}

function pause(label = "次へ") {
  return new Promise(resolve => {
    $actions.innerHTML = `<button class="btn primary">${escapeHtml(label)}</button>`;
    $actions.querySelector("button").addEventListener("click", () => { clearActions(); resolve(); }, { once: true });
    scrollNarrativeToBottom();
  });
}

// 実績トースト
function showAchievementToast(def) {
  const el = document.createElement("div");
  el.className = "ach-toast";

// ====================================================================
// アイテム使用
// ====================================================================
function removeOne(arr, x) { const i = arr.indexOf(x); if (i >= 0) arr.splice(i, 1); }

function useItem(p, item, inCombat = false, target = null, canFlee = true) {
  const info = ITEMS[item];
  if (info.category === "weapon") {
    const old = p.weapon; p.weapon = item; removeOne(p.inventory, item);
    if (old) p.inventory.push(old);
    return [true, `${item} を装備した。${old ? `（${old} を外した）` : ""}`];
  }
  if (info.category === "armor") {
    const old = p.armor; p.armor = item; removeOne(p.inventory, item);
    if (old) p.inventory.push(old);
    return [true, `${item} を装備した。${old ? `（${old} を外した）` : ""}`];
  }
  switch (info.effect) {
    case "heal": {
      const g = heal(p, info.power); removeOne(p.inventory, item);
      return [true, `${item} を使った。HPが ${g} 回復した。`];
    }
    case "full_heal": {
      const g = heal(p, p.max_hp); removeOne(p.inventory, item);
      return [true, `エリクサーの輝き！ HPが ${g} 回復した。`];
    }
    case "cure_poison": {
      if (hasEffect(p, "poison")) {
        p.effects = p.effects.filter(e => e.name !== "poison");
        removeOne(p.inventory, item);
        return [true, "毒消し草を噛んだ。毒が消えた。"];
      }
      return [false, "今は毒に侵されていない。"];
    }
    case "buff_atk": addEffect(p, "buff_atk", 5, info.power); removeOne(p.inventory, item); return [true, "力の薬！ 5ターン攻撃力が上昇した。"];
    case "buff_def": addEffect(p, "buff_def", 5, info.power); removeOne(p.inventory, item); return [true, "鉄壁の薬！ 5ターン防御力が上昇した。"];
    case "escape":
      if (!inCombat) return [false, "戦闘中にしか使えない。"];
      // ボス戦・スフィンクス戦など canFlee=false ではそもそも使えない（誤タップで煙玉消費しない）
      if (!canFlee) return [false, "この戦いからは逃げられない！ 煙玉は無効だ。"];
      removeOne(p.inventory, item);
      return [true, "煙玉を投げつけた！ 視界が遮られる。"];
    case "magic": {
      if (!inCombat || !target) return [false, "戦闘中にしか使えない。"];
      const isMage = p.cls === "魔導士";
      const ampLv  = isMage ? Math.min(4, growthLv("魔力増幅")) : 0;
      // 魔導士+木の棒シナジー
      const wandBonus = (isMage && p.weapon === "木の棒") ? 5 : 0;
      const power = info.power + (isMage ? 10 : 0) + ampLv * 5 + wandBonus;
      target.hp  -= power;
      trackDamageDealt(power);
      if (runStats) runStats.scrollUseCount += 1;
      // 魔導節約：基礎20% + Lv*10%（上限60%）
      const saveLv  = isMage ? Math.min(4, growthLv("魔導節約")) : 0;
      const conserveRate = isMage ? Math.min(0.60, 0.20 + saveLv * 0.10) : 0;
      const conserve = isMage && Math.random() < conserveRate;
      if (!conserve) removeOne(p.inventory, item);
      else if (runStats) runStats.mageScrollSaves += 1;
      // 巻物術師実績
      if (isMage && runStats && (runStats.scrollUseCount + runStats.mageScrollSaves) >= 5) {
        unlockAch("mage_scrollmaster");
      }
      let tail = "";
      if (wandBonus > 0) {
        if (runStats) runStats.equipmentSynergyTriggers += 1;
        tail += "  木の棒を杖代わりに掲げた。";
      }
      if (conserve) tail += "  魔導士の知恵で巻物は崩れずに残った！";
      return [true, `魔法の巻物が炸裂！ ${target.name} に ${power} のダメージ！${tail}`];
    }
    case "level_up": {
      p.exp = needExp(p);
      const msgs = gainExp(p, 0);
      removeOne(p.inventory, item);
      return [true, "賢者の石が砕けた！ " + msgs.join(" ")];
    }
  }
  return [false, "何も起こらなかった。"];
}

async function openInventory(inCombat = false, target = null, canFlee = true) {
  if (player.inventory.length === 0) {
    tell("所持品は空だ。", "dim");
    return null;
  }
  const items = [...new Set(player.inventory)];
  const opts = items.map(it => {
    const cnt = player.inventory.filter(x => x === it).length;
    const info = ITEMS[it];
    return { label: `${it}${cnt > 1 ? ` ×${cnt}` : ""}`, desc: info.desc };
  });
  opts.push({ label: "やめる" });
  const idx = await ask(opts);
  if (idx === opts.length - 1) return null;
  const item = items[idx];
  const [consumed, msg] = useItem(player, item, inCombat, target, canFlee);
  tell(msg, consumed ? "shop" : "dim");
  renderStatus();
  // 戦闘中のアイテム使用は combat() の終了時に saveGame() するため
  // ここでは戦闘外のアイテム使用のみ保存する（戦闘ターン中保存は避ける）
  if (consumed && !inCombat) saveGame();
  // null は「キャンセル」、false は「選んだが使えなかった」。
  // ボス戦の煙玉失敗などを無料ターンスキップにしないため区別する。
  return consumed ? item : false;
}

// ====================================================================
// 戦闘
// ====================================================================
function calcDamage(atk, def, variance = 0.25) {
  const base   = Math.max(1, atk - Math.floor(def / 2));
  const spread = Math.max(1, Math.floor(base * variance));
  return Math.max(1, base + randInt(-spread, spread));
}

async function combat(m, canFlee = true) {
  tellEvent(`⚔ ${m.name} が現れた`, `${m.flavor}\nHP ${m.hp}  攻撃 ${m.atk}  防御 ${m.defense}`, "combat");
  let turn = 0;
  while (m.hp > 0 && player.hp > 0) {
    turn += 1;
    const hpR = player.hp / player.max_hp;
    const hpColor = hpR > 0.5 ? "var(--hp-good)" : hpR > 0.25 ? "var(--hp-mid)" : "var(--hp-bad)";
    tellRaw(`<div class="combat-bar">
        <span>ターン ${turn}</span>
        <span class="vs">⚔</span>
        <span><span class="mhp">${m.name} HP ${m.hp}</span></span>
        <span class="vs">vs</span>
        <span style="color:${hpColor}">あなた ${player.hp}/${player.max_hp}</span>
      </div>`);

    const opts = [
      { label: "攻撃" },
      { label: "防御", desc: "次のダメージ半減" },
      { label: "アイテム" },
    ];
    if (canFlee) opts.push({ label: "逃げる" });
    const idx = await ask(opts);

    let defending = false, skipEnemy = false;

    if (idx === 0) {
      const crit = Math.random() < 0.10;
      let dmg = calcDamage(pAtk(player), m.defense);
      if (m.tags.includes("dragon") && player.weapon === "竜殺しの槍") {
        dmg *= 2; tell("竜殺しの槍が輝く！", "shop");
      }
      // 炎の剣：魔導士装備で発動率UP
      const fireRate = (player.cls === "魔導士") ? 0.45 : 0.30;
      if (player.weapon === "炎の剣" && Math.random() < fireRate) {
        dmg += 6;
        if (player.cls === "魔導士") runStats.equipmentSynergyTriggers += 1;
        tell("炎の刃が燃え上がる！", "danger");
      }
      if (crit) { dmg = Math.floor(dmg * 1.8); tell("会心の一撃！", "shop"); }
      m.hp -= dmg;
      trackDamageDealt(dmg);
      tell(`あなたの攻撃 → ${m.name} に ${dmg} ダメージ。`);
      // 盗賊+木の棒：10%でひるませる
      if (player.cls === "盗賊" && player.weapon === "木の棒" && m.hp > 0 && Math.random() < 0.10) {
        skipEnemy = true;
        runStats.equipmentSynergyTriggers += 1;
        tell(`怯みの一撃！ ${m.name} は反撃できない。`, "shop");
      }
    } else if (idx === 1) {
      defending = true;
      runStats.defendingTimes += 1;
      tell("構えを取った。", "shop");
    } else if (idx === 2) {
      const consumed = await openInventory(true, m, canFlee);
      if (consumed === null) skipEnemy = true;
      // 煙玉が成立するのは canFlee=true 時のみ。canFlee=false なら useItem が消費せず
      // ガード済みなので、ここに "煙玉" の consumed が届かない（保険として canFlee 確認）
      else if (consumed === "煙玉" && canFlee) { tell(`${m.name} を撒いて逃げ切った！`, "shop"); runStats.fleeSuccessCount += 1; saveGame(); return false; }
      else if (m.hp <= 0) break;
    } else if (idx === 3) {
      const isRogue = player.cls === "盗賊";
      // 盗賊+革の鎧：+5%
      const armorBonus = (isRogue && player.armor === "革の鎧") ? 0.05 : 0;
      const ashiSabaki = isRogue ? Math.min(0.40, 0.10 * growthLv("足さばき")) : 0;
      const raw = 0.4 + player.level * 0.03 + (isRogue ? 0.20 : 0) + armorBonus + ashiSabaki;
      // 難易度別の逃走率上限：物語95% / 標準90% / 挑戦85%
      const cap = ({ story: 0.95, normal: 0.90, challenge: 0.85 })[currentDifficulty()];
      const chance = Math.min(cap, raw);
      if (Math.random() < chance) {
        if (isRogue) tell("盗賊の脚で素早く距離を取った。", "shop");
        if (armorBonus > 0) { runStats.equipmentSynergyTriggers += 1; tell("革の鎧が音を抑え、滑るように離脱した。", "shop"); }
        tell(`${m.name} を撒いて逃げ切った！`, "shop");
        runStats.fleeSuccessCount += 1;
        saveGame();
        return false;
      }
      tell("逃げられなかった！", "danger");
    }

    if (skipEnemy) continue;
    if (m.hp <= 0) break;

    if (Math.random() < 0.10) {
      tell(`${m.name} の攻撃は外れた！`);
    } else {
      let edmg = calcDamage(m.atk, pDef(player));
      if (defending) {
        edmg = Math.max(1, Math.floor(edmg / 2));
        // 戦士成長「鉄壁」：Lv毎 -2
        if (player.cls === "戦士") {
          const tessei = growthLv("鉄壁");
          if (tessei > 0) edmg = Math.max(1, edmg - 2 * tessei);
          // 戦士+鋼の鎧：防御時 -2 追加
          if (player.armor === "鋼の鎧") {
            edmg = Math.max(1, edmg - 2);
            runStats.equipmentSynergyTriggers += 1;
          }
        }
        // ボス戦は最低2ダメ保証（防御無双による作業化防止）
        if (isBossBattleFloor(player.floor)) edmg = Math.max(2, edmg);
      }
      // 戦士+聖なる鎧：ボス戦の初撃 -5
      if (player.cls === "戦士" && player.armor === "聖なる鎧"
          && isBossBattleFloor(player.floor) && turn === 1) {
        edmg = Math.max(1, edmg - 5);
        runStats.equipmentSynergyTriggers += 1;
        tell("聖なる鎧が初撃の力を吸収した。", "shop");
      }
      applyDamage(player, edmg, m.name);
      tell(`${m.name} の攻撃 → あなたに ${edmg} ダメージ。`, "danger");
      if (m.tags.includes("poison") && !hasEffect(player, "poison") && Math.random() < 0.35) {
        if (player.armor !== "聖なる鎧") {
          addEffect(player, "poison", 4);
          tell("あなたは毒に侵された！", "danger");
        }
      }
      // 戦士の反撃：防御選択中・敵が攻撃を当てた直後
      // ベース30% + 反撃術Lv*10%（最大70%）、ダメは通常攻撃の50%
      if (defending && player.cls === "戦士" && m.hp > 0 && player.hp > 0) {
        const cRate = 0.30 + Math.min(0.40, growthLv("反撃術") * 0.10);
        if (Math.random() < cRate) {
          let cdmg = Math.max(1, Math.floor(calcDamage(pAtk(player), m.defense) * 0.5));
          // 戦士+鋼の剣：反撃ダメ +2
          if (player.weapon === "鋼の剣") {
            cdmg += 2;
            runStats.equipmentSynergyTriggers += 1;
          }
          m.hp -= cdmg;
          trackDamageDealt(cdmg);
          if (runStats) runStats.warriorCounters += 1;
          tell(`戦士のカウンター！ ${m.name} に ${cdmg} の反撃ダメージ。`, "shop");
        }
      }
    }
    for (const msg of tickEffects(player)) tell(msg, "dim");
    renderStatus();
  }

  if (player.hp <= 0) return false;

  trackKill();
  const lines = [`${m.name} を倒した！`, `経験値 ${m.exp} と ${m.gold}G を得た。`];
  addGold(player, m.gold);
  for (const msg of gainExp(player, m.exp)) lines.push(msg);
  for (const [item, prob] of m.drops) {
    if (Math.random() < prob) { player.inventory.push(item); lines.push(`${m.name} は ${item} を落とした！`); }
  }
  tellEvent("勝利！", lines.join("\n"), "victory");
  renderStatus();
  saveGame();
  return true;
}

async function eventTreasure() {
  tellEvent("宝箱", `${choice(EVENT_FLAVOR.treasure)}\n古びた宝箱が部屋の中央に置かれている。`);
  const idx = await ask([
    "開ける",
    { label: "罠を疑って蹴り倒す", desc: "罠回避だが破損リスク" },
    "立ち去る",
  ]);
  if (idx === 2) return;
  let trapped = Math.random() < 0.20 + player.floor * 0.01;
  // 盗賊補正：察知率は基礎50%+「罠抜け」Lv*10% (上限90%)
  if (trapped && player.cls === "盗賊") {
    const detectRate = Math.min(0.90, 0.50 + growthLv("罠抜け") * 0.10);
    if (Math.random() < detectRate) {
      trapped = false;
      if (runStats) runStats.rogueTrapAvoids += 1;
      tell("盗賊の勘 — 細工の匂いを察知し、針を弾き返した。", "shop");
    }
  }
  if (idx === 1) {
    if (trapped) { tell("蹴り倒した宝箱から針が飛び出すが、当たらなかった！", "shop"); trapped = false; }
    else if (Math.random() < 0.4) { tell("中身が壊れてしまった…", "dim"); return; }
  }
  if (trapped) {
    const dmg = randInt(5, 12);
    applyDamage(player, dmg, "宝箱の罠");
    tell(`宝箱は罠だった！ ${dmg} のダメージ。`, "danger");
    if (player.hp <= 0) return;
  }
  const rolls = 1 + (Math.random() < 0.3 ? 1 : 0);
  const gained = [];
  for (let i = 0; i < rolls; i++) {
    const it = weightedChoice(TREASURE_POOL);
    player.inventory.push(it);
    gained.push(it);
  }
  // 盗賊「目利き」: Lv*15%で高品質アイテム追加（上限50%）
  if (player.cls === "盗賊" && growthLv("目利き") > 0) {
    const upRate = Math.min(0.50, growthLv("目利き") * 0.15);
    if (Math.random() < upRate) {
      const goodPool = [["ハイポーション", 0.40], ["魔法の巻物", 0.30], ["鋼の剣", 0.15], ["鎖帷子", 0.10], ["エリクサー", 0.05]];
      const extra = weightedChoice(goodPool);
      player.inventory.push(extra);
      gained.push(extra);
      tell("目利きが活きた！ 質の良い品も見つけた。", "shop");
    }
  }
  const gold = randInt(5, 15) * player.floor;
  addGold(player, gold);
  tell(`${gold}G と ${gained.join(", ")} を手に入れた！`, "gold");
}

async function eventTrap() {
  const t = choice(TRAP_TYPES);
  tellEvent("罠", `${choice(EVENT_FLAVOR.trap)}\nこれは…${t.name}か？`);
  let idx = await ask([
    { label: "慎重に避ける", desc: "成功率: 防御依存" },
    { label: "走って駆け抜ける", desc: "半ダメージ" },
    { label: `アイテムで対処`, desc: `所持品 ${player.inventory.length} 個` },
  ]);
  if (idx === 2) {
    await openInventory(false);
    idx = await ask([{ label: "慎重に避ける" }, { label: "駆け抜ける" }]);
  }
  // 盗賊「罠抜け」：基礎成功率に+5%/Lv（上限90%）
  let sr = Math.min(0.85, 0.45 + pDef(player) * 0.02);
  if (player.cls === "盗賊" && growthLv("罠抜け") > 0) {
    sr = Math.min(0.95, sr + growthLv("罠抜け") * 0.05);
  }
  let actual;
  if (idx === 0) {
    if (Math.random() < sr) {
      tell(`${t.desc} だがあなたは見切って避けた！`, "shop");
      if (player.cls === "盗賊" && growthLv("罠抜け") > 0) tell("罠抜けの呼吸が活きた。", "shop");
      gainExp(player, 3); renderStatus();
      return;
    }
    tell(t.desc, "danger");
    actual = t.dmg;
  } else {
    tell(`${t.desc} 駆け抜けた！`, "danger");
    actual = Math.floor(t.dmg / 2);
  }
  if (t.kind === "phys") {
    // 盗賊+鎖帷子：物理罠ダメ -2
    if (player.cls === "盗賊" && player.armor === "鎖帷子") {
      actual = Math.max(1, actual - 2);
      runStats.equipmentSynergyTriggers += 1;
    }
    applyDamage(player, actual, t.name);
    tell(`${actual} のダメージ。`, "danger");
  } else if (t.kind === "poison") {
    if (player.armor === "聖なる鎧") tell("聖なる鎧が霧を弾いた。", "shop");
    else { addEffect(player, "poison", 5); setLastDamage(t.name); tell("毒に侵された！", "danger"); }
  } else if (t.kind === "curse") {
    const loss = Math.min(player.gold, randInt(10, 30));
    player.gold -= loss;
    tell(`呪いで ${loss}G が消失した！`, "danger");
  }
}

async function eventMerchant() {
  tellEvent("行商人", "フードを被った行商人が荷物を広げている。\n「ふむ、生きて帰れる客は久しぶりだ。何を見ていく？」", "shop");
  if (player.cls === "盗賊") {
    tell("「お、盗賊か。話の分かる客は値段の話も分かるってもんだ。」（仕入れ-10% / 売値+10%）", "shop");
  }
  let pool = ["ポーション", "ハイポーション", "毒消し草", "力の薬", "煙玉", "魔法の巻物", "鉄の剣", "鋼の剣", "革の鎧", "鎖帷子"];
  if (player.floor >= 8)  pool = pool.concat(["炎の剣", "鋼の鎧", "エリクサー"]);
  if (player.floor >= 14) pool = pool.concat(["竜殺しの槍", "聖なる鎧"]);
  const stock = Array.from({ length: 5 }, () => choice(pool));
  // 盗賊「目利き」: 5品中の指定数を高品質枠に置換（最大2枠まで）
  // 偏りすぎ防止のため、プール拡張ではなく「枠の置換」方式に変更
  if (player.cls === "盗賊" && growthLv("目利き") > 0) {
    const goods = ["ハイポーション","エリクサー","魔法の巻物","鎖帷子"];
    const replaces = Math.min(2, growthLv("目利き") >= 3 ? 2 : 1);
    for (let i = 0; i < replaces; i++) stock[i] = choice(goods);
    tell("「目利きの客には、いい物を用意してある」", "shop");
  }

  while (true) {
    const opts = stock.map(it => {
      const bp = buyPrice(it);
      return {
        label: `${it}  ${bp}G`,
        desc: ITEMS[it].desc,
        disabled: player.gold < bp,
      };
    });
    opts.push({ label: `売る`, desc: `所持品 ${player.inventory.length} 個` });
    opts.push({ label: "立ち去る" });
    const idx = await ask(opts);
    if (idx === opts.length - 1) { tell("「またのご来店を。生きてればな。」"); return; }
    if (idx === opts.length - 2) {
      if (player.inventory.length === 0) { tell("売れる物が無い。", "dim"); continue; }
      const items = [...new Set(player.inventory)];
      const sopts = items.map(it => ({ label: `${it} → ${sellPrice(it)}G` }));
      sopts.push({ label: "やめる" });
      const j = await ask(sopts);
      if (j === sopts.length - 1) continue;
      const sold = items[j];
      const sp = sellPrice(sold);
      removeOne(player.inventory, sold);
      addGold(player, sp);
      tell(`${sold} を ${sp}G で売却した。`, "gold");
      renderStatus();
      saveGame();
      continue;
    }
    const item = stock[idx];
    const price = buyPrice(item);
    if (player.gold < price) { tell("「金が足りないようだな。」", "danger"); continue; }
    player.gold -= price;
    player.inventory.push(item);
    stock.splice(idx, 1);
    tell(`${item} を ${price}G で購入した。`, "gold");
    // 商人の紹介状は初購入で消費
    if (runStats.merchantIntroAvailable) {
      runStats.merchantIntroAvailable = false;
      tell("(紹介状の効果はここまでだ。)", "dim");
    }
    renderStatus();
    saveGame();
    if (stock.length === 0) { tell("「これで打ち止めだ。気をつけてな。」"); return; }
  }
}

async function eventFountain() {
  tellEvent("不思議な泉", "七色に光る泉がある。");
  const idx = await ask([
    { label: "飲む", desc: "ランダム効果" },
    { label: "見つめる", desc: "経験値+10" },
    "立ち去る",
  ]);
  if (idx === 2) return;
  if (idx === 1) {
    const msgs = gainExp(player, 10);
    tell("古の知恵が流れ込んできた。 " + msgs.join(" "), "shop");
    return;
  }
  // 魔導士補正：良効果ゾーン(0..0.75)を 0..0.85 に拡張、悪効果ゾーンは縮小
  // さらに「叡智」Lv毎に良効果範囲を +0.02
  const isMage = player.cls === "魔導士";
  const eichi  = isMage ? growthLv("叡智") : 0;
  if (isMage) tell("魔導士の素養が泉の力を引き寄せる…", "shop");
  const shift = eichi * 0.02;
  const t1 = (isMage ? 0.34 : 0.30) + shift;
  const t2 = (isMage ? 0.62 : 0.55) + shift;
  const t3 = (isMage ? 0.85 : 0.75) + shift;
  const t4 = (isMage ? 0.93 : 0.90) + shift;
  const r = Math.random();
  if (r < t1) { player.max_hp += 10; player.hp = player.max_hp; tell("最大HPが10上昇した！", "heal"); }
  else if (r < t2) { player.base_atk += 2; tell("攻撃力が永続的に2上昇した！", "heal"); }
  else if (r < t3) { player.base_def += 2; tell("防御力が永続的に2上昇した！", "heal"); }
  else if (r < t4) {
    let l = randInt(5, 15);
    // 魔導士+聖なる鎧：泉の悪効果ダメ -50%
    if (isMage && player.armor === "聖なる鎧") {
      l = Math.max(1, Math.floor(l / 2));
      runStats.equipmentSynergyTriggers += 1;
      tell("聖なる鎧が泉の悪意を吸収した。", "shop");
    }
    player.hp = Math.max(1, player.hp - l);
    setLastDamage("腐った水");
    tell(`水は腐っていた！ ${l} のダメージ。`, "danger");
  }
  else {
    let down = 5;
    if (isMage && player.armor === "聖なる鎧") {
      down = 3;
      runStats.equipmentSynergyTriggers += 1;
      tell("聖なる鎧が呪詛を弱めた。", "shop");
    }
    player.max_hp = Math.max(10, player.max_hp - down);
    player.hp = Math.min(player.hp, player.max_hp);
    tell(`最大HPが${down}下がった…`, "danger");
  }
}

async function offerGrowthChoice(level) {
  const list = CLASS_GROWTH[player.cls];
  if (!list) return;
  // 上限到達済みは選択肢から除外する（残ってる項目だけ提示）
  const candidates = list.filter(g => (player.classUpgrades[g.id] || 0) < g.maxLv);
  if (candidates.length === 0) return;
  tellEvent(`✦ クラス成長 (Lv${level})`, `${player.cls}としての歩みが深まる。1つ選べ。`, "shop");
  const opts = candidates.map(g => {
    const cur = player.classUpgrades[g.id] || 0;
    const maxTag = (g.maxLv === 99) ? "" : ` (現Lv${cur}/${g.maxLv})`;
    return { label: `${g.id}${maxTag}`, desc: g.desc };
  });
  const idx = await ask(opts);
  const chosen = candidates[idx];
  player.classUpgrades[chosen.id] = (player.classUpgrades[chosen.id] || 0) + 1;
  // 武勇は即時HP/最大HP+10
  if (chosen.id === "武勇") {
    player.max_hp += 10;
    player.hp += 10;
  }
  runStats.classGrowthChoices.push({ level, id: chosen.id });
  tell(`✦ ${chosen.id} を習得！ (現Lv${player.classUpgrades[chosen.id]})`, "heal");
  // 4回成長で実績
  if (runStats.classGrowthChoices.length >= 4) unlockAch("class_growth_master");
  saveGame();
  renderStatus();
}
async function processGrowthQueue() {
  if (!runStats || !runStats.pendingGrowth) return;
  while (runStats.pendingGrowth.length > 0 && player.hp > 0) {
    const lvl = runStats.pendingGrowth.shift();
    await offerGrowthChoice(lvl);
  }
}

// 記憶の商人
// ====================================================================
function generateMemoryMerchantStock() {
  const hasCleared = hasClearedStory();
  const isChallenge = player && player.difficulty === "challenge";
  const allowRare = hasCleared || isChallenge;
  const allowSage = hasCleared;
  const pickWeighted = (pool) => {
    if (pool.length === 0) return null;
    return weightedChoice(pool.map(p => [p, p.weight]));
  };
  const weapons = MM_WEAPONS.concat(allowRare ? MM_WEAPONS_RARE : []);
  const armors  = MM_ARMORS.concat(allowRare ? MM_ARMORS_RARE : []);
  const specials = MM_SPECIALS.concat(allowSage ? MM_SPECIALS_SAGE : []);
  const cons = MM_CONSUMABLES;

  const stock = [];
  stock.push(pickWeighted(weapons));
  stock.push(pickWeighted(armors));
  // 消耗品2枠（重複は許容するが、なるべく異なるものを優先）
  const c1 = pickWeighted(cons);
  let c2 = pickWeighted(cons);
  for (let tries = 0; tries < 4 && c2.item === c1.item; tries++) c2 = pickWeighted(cons);
  stock.push(c1);
  stock.push(c2);
  stock.push(pickWeighted(specials));
  return stock.filter(Boolean);
}

// 購入アイテムをプレイヤーへ反映する。shards 減算はここでは行わない。
function applyMemoryMerchantPurchase(it) {
  const info = ITEMS[it.item];
  if (info && info.category === "weapon") {
    const curAtk = player.weapon ? (ITEMS[player.weapon].atk || 0) : -1;
    if (info.atk > curAtk) {
      const old = player.weapon;
      player.weapon = it.item;
      if (old) player.inventory.push(old);
    } else {
      player.inventory.push(it.item);
    }
  } else if (info && info.category === "armor") {
    const curDef = player.armor ? (ITEMS[player.armor].defense || 0) : -1;
    if (info.defense > curDef) {
      const old = player.armor;
      player.armor = it.item;
      if (old) player.inventory.push(old);
    } else {
      player.inventory.push(it.item);
    }
  } else if (info && info.category === "consumable") {
    const qty = it.qty || 1;
    for (let i = 0; i < qty; i++) player.inventory.push(it.item);
  } else if (it.item === "幸運の小袋") {
    const lucky = ["ポーション", "毒消し草", "煙玉", "魔法の巻物", "力の薬", "鉄壁の薬"];
    for (let i = 0; i < 2; i++) player.inventory.push(choice(lucky));
  } else if (it.item === "商人の紹介状") {
    runStats.merchantIntroAvailable = true;
  }
}

async function showMemoryMerchant() {
  const meta0 = loadMeta();
  // shards も既購入もリロール痕跡もない＝初プレイユーザは静かにスキップ
  if ((meta0.shards || 0) === 0
      && meta0.memoryMerchant.currentStock.length === 0
      && meta0.memoryMerchant.purchasedItems.length === 0
      && !meta0.memoryMerchant.rerolled) {
    return;
  }

  // 在庫初期化
  let meta = loadMeta();
  let mm = meta.memoryMerchant;
  if (!Array.isArray(mm.currentStock) || mm.currentStock.length === 0) {
    mm.currentStock = generateMemoryMerchantStock();
    saveMeta(meta);
  }
  // リロード復元：既に購入済みなら player に再適用
  if (Array.isArray(mm.purchasedItems) && mm.purchasedItems.length > 0) {
    for (const p of mm.purchasedItems) {
      applyMemoryMerchantPurchase(p);
      runStats.memoryMerchantPurchases.push({ item: p.item, qty: p.qty || 1, cost: p.cost });
    }
    tell(`(前回ここで選んだ品を引き継いだ：${mm.purchasedItems.map(p => p.item).join(", ")})`, "dim");
    saveGame();
  }

  tellEvent("📦 記憶の商人", "「次の冒険の支度はどうするね？ 記憶の欠片で売ってやるよ。」", "shop");

  while (true) {
    meta = loadMeta();
    mm = meta.memoryMerchant;
    tell(`💎 残: ${meta.shards}　購入: ${mm.purchasedCount}/2${mm.purchasedGear ? "（武具購入済）" : ""}`, "shop");

    const opts = mm.currentStock.map((it) => {
      const isGear = (it.slot === "weapon" || it.slot === "armor");
      const reason = (meta.shards < it.cost) ? "（欠片不足）"
                   : (mm.purchasedCount >= 2) ? "（購入上限）"
                   : (isGear && mm.purchasedGear) ? "（武具購入済）"
                   : "";
      const dis = reason !== "";
      const qtyTag = (it.qty && it.qty > 1) ? `×${it.qty}` : "";
      const baseDesc = it.desc || (ITEMS[it.item] && ITEMS[it.item].desc) || "";
      return {
        label: `${it.item}${qtyTag}　${it.cost}欠片`,
        desc: baseDesc + reason,
        disabled: dis,
      };
    });
    opts.push({
      label: `🔄 リロール  1欠片`,
      desc: mm.rerolled ? "（既に使用済み）" : (meta.shards < 1 ? "（欠片不足）" : "在庫を入れ替える（1冒険1回）"),
      disabled: mm.rerolled || meta.shards < 1,
    });
    opts.push({ label: "🚶 買わずに出発", desc: "迷宮へ向かう" });

    const idx = await ask(opts);

    if (idx === opts.length - 1) {
      // 出発：商人の状態をクリーンアップ
      wipeMemoryMerchant();
      saveGame();
      tell("「達者でな」", "shop");
      break;
    } else if (idx === opts.length - 2) {
      // リロール
      meta.shards -= 1;
      mm.currentStock = generateMemoryMerchantStock();
      mm.rerolled = true;
      saveMeta(meta);
      tell("商品が入れ替わった。", "shop");
      continue;
    } else {
      // 購入
      const it = mm.currentStock[idx];
      meta.shards -= it.cost;
      mm.purchasedCount += 1;
      if (it.slot === "weapon" || it.slot === "armor") mm.purchasedGear = true;
      mm.purchasedItems = mm.purchasedItems || [];
      mm.purchasedItems.push({ ...it });
      mm.currentStock.splice(idx, 1);
      saveMeta(meta);
      applyMemoryMerchantPurchase(it);
      runStats.memoryMerchantPurchases.push({ item: it.item, qty: it.qty || 1, cost: it.cost });
      saveGame();
      const qtyTag = (it.qty && it.qty > 1) ? `×${it.qty}` : "";
      tell(`✦ ${it.item}${qtyTag} を ${it.cost}欠片で購入した。`, "gold");
      if (mm.purchasedCount >= 2) {
        tell("「これで2品。あとは生きて戻ってくることだ」", "shop");
      }
    }
  }
}

// 称号判定
// ====================================================================
function determineTitle() {
  if (!runStats || !player) return "";
  const cls = player.cls;
  const cs = runStats;
  // 深層モード時は深層専用称号を優先
  if (player.mode === "endless") {
    if (player.floor >= 100) return "果てなき者";
    if ((cs.depthBossKills || 0) >= 5) return "残響砕き";
    if (player.floor >= 30) return "深層帰り";
  }
  if (cls === "戦士") {
    if (cs.warriorCounters >= 8) return "反撃の戦士";
    if (cs.defendingTimes  >= 12) return "鉄壁の戦士";
    if (cs.classEventSuccess.warrior >= 1) return "決闘の戦士";
  } else if (cls === "盗賊") {
    if (cs.fleeSuccessCount >= 8) return "影渡り";
    if ((cs.classEventSuccess.rogue + cs.rogueTrapAvoids) >= 6) return "宝探し";
    if (cs.classEventSuccess.rogue >= 1) return "鍵師";
  } else if (cls === "魔導士") {
    if (cs.scrollUseCount >= 6) return "巻物術師";
    if ((cs.classEventSuccess.mage) >= 1) return "賢者";
    if (cs.mageScrollSaves >= 4) return "節約の魔導士";
  }
  return "";
}
// 終了処理の前に runStats.title を確定する（recordRunResult より先に呼ぶ）
function finalizeTitle() {
  if (runStats) runStats.title = determineTitle();
}

      tell("魔術書の文字は普通の古い記述にすぎなかった。", "dim");

      setLastDamage("禁書の呪い");
      tell("読んではいけない呪文を口にしてしまった！毒に侵された。", "danger");
    }
  } else {
    const reward = 25 + growthLv("叡智") * 10;
    const msgs = gainExp(player, reward);

    tell(`古文書を解読した！ 経験値 +${reward}。 ` + msgs.join(" "), "shop");

      addGold(player, g);
      tell(`叡智により ${g}G の追加報酬！`, "gold");
    }
    unlockAch("mage_archivist");
    checkClassEventMaster();
  }
}

function fmtDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, "0");
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function titleScreen() {
  $status.style.display = "none";
  while (true) {
    clearNarrative();
    tellRaw(`
      <div style="text-align:center;border:none;background:transparent;padding:14px 0;">
        <div class="title-logo">Gemini Rogue</div>
        <div class="title-sub">〜 全${FINAL_FLOOR}階の迷宮で魔王ザロスを討て 〜</div>
      </div>
    `);
    if (!LS_OK) tell("⚠ ローカル保存が利用できない環境です。セーブと記録は保持されません。", "danger");

    const meta = loadMeta();
    if (meta.shards > 0 || meta.totalShards > 0) {
      tell(`💎 記憶の欠片: ${meta.shards}（累計 ${meta.totalShards}）`, "shop");
    }

    const save = loadSave();
    const hasCleared = hasClearedStory();

    const opts = [{ label: "はじめから", desc: save ? "現在のセーブは破棄される" : "新しい冒険を始める" }];
    if (save) {
      const p = save.player;
      const dl = (p.difficulty && DIFFICULTIES[p.difficulty]) ? DIFFICULTIES[p.difficulty].label : "挑戦";
      const modeTag = (p.mode === "endless") ? "深層" : "本編";
      opts.push({
        label: "続きから",
        desc: `[${modeTag}] ${p.name}(${p.cls}/${dl}) Lv${p.level} B${p.floor}F  保存 ${fmtDate(save.savedAt)}`,
      });
    } else {
      opts.push({ label: "続きから", desc: "セーブデータなし", disabled: true });
    }
    // 深層探索：本編クリア後に解放
    if (hasCleared) {
      opts.push({ label: "🌑 深層探索", desc: "B21Fから果てなき深層へ。死亡まで続く。" });
    } else {
      opts.push({ label: "🔒 深層探索", desc: "本編を1度クリアすると解放", disabled: true });
    }
    opts.push({ label: "冒険記録",   desc: "実績・最高記録を見る" });
    opts.push({ label: "記憶の強化", desc: `欠片で永続強化（所持 ${meta.shards}）` });
    opts.push({ label: "記録を消す", desc: "セーブのみ／全記録を選択" });

    const idx = await ask(opts);
    if (idx === 0) {
      if (save) {
        clearNarrative();
        tellEvent("⚠ 上書き確認", "現在のセーブを破棄して新しい冒険を始める。良いか？", "danger");
        const c = await ask([{ label: "破棄して開始" }, { label: "やめる" }]);
        if (c !== 0) continue;
      }
      const ok = await startNewGame("story");
      if (ok) return "new";
    } else if (idx === 1) {
      const ok = await resumeGame();
      if (ok) return "resume";
    } else if (idx === 2) {
      // 深層探索（未解放時はdisabledなのでここに来ないが、二重チェック）
      if (!hasCleared) continue;
      if (save) {
        clearNarrative();
        tellEvent("⚠ 上書き確認", "現在のセーブを破棄して深層探索を始める。良いか？", "danger");
        const c = await ask([{ label: "破棄して開始" }, { label: "やめる" }]);
        if (c !== 0) continue;
      }
      const ok = await startNewGame("endless");
      if (ok) return "new";
    } else if (idx === 3) {
      await showRecords();
    } else if (idx === 4) {
      await showUpgradeShop();
    } else if (idx === 5) {
      await deleteMenu();
    }
  }
}

async function startNewGame(mode = "story") {
  clearSave();
  // 新規開始時は念のため記憶の商人の一時状態もクリア（前回の出発で消し漏れ対策）
  wipeMemoryMerchant();
  clearNarrative();
  if (mode === "endless") {
    tellEvent("深層探索", "魔王の残響が呼んでいる。光無き深層へ。", "boss");
  }
  tellTitle("主人公の名前を入力");
  const name = (await askText("冒険者")).trim() || "冒険者";
  tellTitle("クラス選択");
  const opts = Object.entries(CLASSES).map(([k, v]) => ({
    label: k,
    desc: `${v.desc}　HP${v.hp}/攻${v.atk}/防${v.defense}/${v.gold}G`,
  }));
  const idx = await ask(opts);
  const cls = Object.keys(CLASSES)[idx];

  // 難易度選択
  tellTitle("難易度選択");
  const dKeys = Object.keys(DIFFICULTIES);
  const dOpts = dKeys.map(k => {
    const d = DIFFICULTIES[k];
    const detail = `敵HP×${d.enemyHP}/敵攻×${d.enemyAtk}/階回復${Math.round(d.floorHeal*100)}%/スコア×${d.scoreMul}`;
    return { label: d.label, desc: `${d.desc}　(${detail})` };
  });
  const dIdx = await ask(dOpts);
  const difficulty = dKeys[dIdx];

  player = newPlayer(name, cls);
  player.difficulty = difficulty;
  player.mode = mode;
  if (mode === "endless") player.floor = 21;
  runStats = newRunStats(mode);
  // 強化適用
  applyUpgrades(player);
  // 商人画面中のリロードでも購入済み装備・アイテムを復元できるように先に保存する。
  saveGame();

  // 適用結果を簡潔に通知
  const meta = loadMeta();
  const u = meta.upgrades;
  const upMsgs = [];
  if (u.potion)   upMsgs.push(`旅支度 Lv${u.potion}：ポーション+${u.potion}`);
  if (u.vitality) upMsgs.push(`体力修練 Lv${u.vitality}：最大HP+${u.vitality*5}`);
  if (u.purse)    upMsgs.push(`小銭袋 Lv${u.purse}：所持金+${u.purse*20}G`);
  if (u.amulet)   upMsgs.push("旅の護符：1冒険1回、致命傷をHP1で耐える");

  clearNarrative();
  const intro = (mode === "endless")
    ? `${name}（${cls}）は B21F の深層から這い上がるべく踏み出した。`
    : `${name}（${cls}）は ${DIFFICULTIES[difficulty].label} の迷宮へ向かった。`;
  tellEvent("冒険の始まり", intro);
  if (upMsgs.length) tell("✦ 記憶の強化が発動: " + upMsgs.join(" / "), "shop");

  // 記憶の商人（欠片で開始準備を整える機会）— 深層探索でも使える
  await showMemoryMerchant();

  await pause(mode === "endless" ? "深層へ降りる" : "迷宮に入る");
  return true;
}

async function resumeGame() {
  const data = loadSave();
  if (!data) {
    tell("セーブデータが見つからない。", "danger");
    await pause("戻る");
    return false;
  }
  try {
    player   = data.player;
    normalizePlayer(player);
    runStats = normalizeRunStats(data.runStats);
    runStats.mode = player.mode;
    if (typeof player.hp !== "number" || player.hp <= 0) throw new Error("invalid save");
    // 旧セーブ互換：difficultyが無い／未知の値ならchallenge扱い（既存プレイ感維持）
    if (!player.difficulty || !DIFFICULTIES[player.difficulty]) player.difficulty = DEFAULT_DIFFICULTY;
    // 旧セーブで階を進めていた場合、その階の欠片マークを既得扱いにする
    // （retroactive grantはしない＝悪用防止）
    const f = player.floor;
    runStats.shardMarks = runStats.shardMarks || {};
    if (f >= 5  && runStats.shardMarks[5]  === undefined) runStats.shardMarks[5]  = true;
    if (f >= 10 && runStats.shardMarks[10] === undefined) runStats.shardMarks[10] = true;
    if (f >= 15 && runStats.shardMarks[15] === undefined) runStats.shardMarks[15] = true;
    // normalize後の補完済みデータを保存して、次回読込でも整合を保つ
    saveGame();
    // 進行中セーブからの再開では記憶の商人を再表示しないため、一時状態を片付ける。
    wipeMemoryMerchant();
    clearNarrative();
    const dl = DIFFICULTIES[player.difficulty].label;
    tellEvent("冒険の再開", `${player.name}（${player.cls}/${dl}）は B${player.floor}F で目を覚ました。`);
    await pause("続ける");
    return true;
  } catch (e) {
    console.warn("resume failed", e);
    clearSave();
    wipeMemoryMerchant();
    tell("セーブデータが破損していたため初期化した。", "danger");
    await pause("戻る");
    return false;
  }
}
